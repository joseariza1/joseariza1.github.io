<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Toolbox OS - Gradient Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    
    <style>
        :root {
            --win-bg: #ffffff;
            --win-accent: #0078d4;
            --win-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: 'Segoe UI Variable Display', system-ui, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            height: 100vh;
            overflow: hidden;
            touch-action: none;
            background-size: cover;
            background-position: center;
            transition: background 0.5s ease;
        }

        #desktop {
            height: 100%;
            padding: 40px 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            grid-template-rows: repeat(auto-fill, minmax(110px, 1fr));
            gap: 15px;
            z-index: 1;
        }

        .tool-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            text-align: center;
            cursor: pointer;
            padding: 10px;
            border-radius: 12px;
        }

        .tool-icon i { font-size: 42px; margin-bottom: 8px; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4)); }
        .tool-icon span { font-size: 0.85rem; font-weight: 500; text-shadow: 0 2px 4px rgba(0,0,0,0.7); }

        /* Barra de activación */
        .drawer-handle {
            position: fixed;
            bottom: 0; left: 0; width: 100%; height: 40px;
            display: flex; justify-content: center; align-items: center;
            z-index: 999;
        }

        .handle-bar { width: 45px; height: 5px; background: rgba(255,255,255,0.3); border-radius: 10px; }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(15px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            padding: 20px;
        }

        .window {
            background: var(--win-bg);
            width: 100%;
            max-width: 420px;
            border-radius: 24px;
            padding: 25px;
            box-shadow: var(--win-shadow);
            transform: scale(0.9);
            transition: transform 0.2s ease;
        }

        .window.active { transform: scale(1); }

        .tabs { display: flex; gap: 8px; margin-bottom: 20px; background: #f0f0f0; padding: 5px; border-radius: 12px; }
        .tab-btn { flex: 1; padding: 10px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; font-size: 0.9rem; }
        .tab-btn.active { background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); color: var(--win-accent); }

        input { width: 100%; padding: 14px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; user-select: auto; }

        .gradient-controls {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 15px;
        }

        .color-circle {
            width: 100%;
            height: 50px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .btn { border: none; padding: 15px; border-radius: 12px; cursor: pointer; font-weight: 700; width: 100%; }
        .btn-save { background: var(--win-accent); color: white; margin-top: 10px; }
        .btn-delete { background: #ff4757; color: white; margin-top: 15px; font-size: 0.8rem; }
        .btn-close { background: #eee; color: #333; margin-top: 10px; }

        .hidden { display: none; }
    </style>
</head>
<body id="mainBody">

    <div id="desktop"></div>

    <div class="drawer-handle" onclick="openModal()">
        <div class="handle-bar"></div>
    </div>

    <div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
        <div class="window" id="toolWindow" onclick="event.stopPropagation()">
            <div class="tabs">
                <button class="tab-btn active" id="btnApps" onclick="switchTab('apps')">Iconos</button>
                <button class="tab-btn" id="btnBg" onclick="switchTab('bg')">Fondo</button>
            </div>

            <!-- Panel Iconos -->
            <div id="pane-apps">
                <h3 id="mTitle" style="margin-bottom:15px">Añadir</h3>
                <input type="text" id="tName" placeholder="Nombre">
                <input type="text" id="tUrl" placeholder="URL (https://...)">
                <input type="text" id="tIcon" placeholder="Icono (fa-solid fa-...)">
                <button class="btn btn-save" onclick="saveApp()">Guardar</button>
                <button class="btn btn-delete hidden" id="delBtn" onclick="deleteApp()">Eliminar Herramienta</button>
            </div>

            <!-- Panel Fondo -->
            <div id="pane-bg" class="hidden">
                <h3 style="margin-bottom:15px">Personalización</h3>
                
                <p style="font-size: 0.8rem; margin-bottom: 5px; color: #666;">Degradado:</p>
                <div class="gradient-controls">
                    <input type="color" id="grad1" class="color-circle" value="#2c3e50" onchange="applyGradient()">
                    <i class="fa-solid fa-arrow-right"></i>
                    <input type="color" id="grad2" class="color-circle" value="#000000" onchange="applyGradient()">
                </div>

                <p style="font-size: 0.8rem; margin-bottom: 5px; color: #666;">O Imagen (URL):</p>
                <input type="text" id="bgImgInp" placeholder="https://...">
                <button class="btn btn-save" onclick="setBgImg()">Aplicar Imagen</button>
                
                <button class="btn" style="background:#f9f9f9; margin-top:10px; border:1px solid #ddd" onclick="resetBg()">Restablecer</button>
            </div>

            <button class="btn btn-close" onclick="closeModal()">Cerrar</button>
        </div>
    </div>

    <script>
        let config = JSON.parse(localStorage.getItem('toolbox_v4')) || {
            apps: [{name: 'Configurar', url: '#', icon: 'fa-solid fa-gear'}],
            bg: { type: 'gradient', val1: '#2c3e50', val2: '#000000' }
        };

        let editIdx = null;
        let startY = 0;

        function init() {
            render();
            updateVisuals();
            
            window.addEventListener('touchstart', e => startY = e.touches[0].clientY);
            window.addEventListener('touchend', e => {
                if (startY - e.changedTouches[0].clientY > 80) openModal();
            });

            new Sortable(document.getElementById('desktop'), {
                animation: 200, delay: 100, delayOnTouchOnly: true,
                onEnd: () => {
                    const icons = [...document.querySelectorAll('.tool-icon')];
                    config.apps = icons.map(el => config.apps[el.dataset.idx]);
                    save();
                }
            });
        }

        // --- Lógica de Fondo ---
        function applyGradient() {
            const color1 = document.getElementById('grad1').value;
            const color2 = document.getElementById('grad2').value;
            config.bg = { type: 'gradient', val1: color1, val2: color2 };
            updateVisuals();
            save();
        }

        function setBgImg() {
            const url = document.getElementById('bgImgInp').value;
            if(url) {
                config.bg = { type: 'image', val: url };
                updateVisuals();
                save();
            }
        }

        function resetBg() {
            config.bg = { type: 'gradient', val1: '#2c3e50', val2: '#000000' };
            updateVisuals();
            save();
        }

        function updateVisuals() {
            const b = document.getElementById('mainBody');
            if(config.bg.type === 'gradient') {
                b.style.backgroundImage = `linear-gradient(135deg, ${config.bg.val1}, ${config.bg.val2})`;
            } else {
                b.style.backgroundImage = `url('${config.bg.val}')`;
            }
        }

        // --- UI & Apps ---
        function openModal(idx = null) {
            editIdx = idx;
            document.getElementById('modalOverlay').style.display = 'flex';
            if(idx !== null) {
                const a = config.apps[idx];
                document.getElementById('tName').value = a.name;
                document.getElementById('tUrl').value = a.url;
                document.getElementById('tIcon').value = a.icon;
                document.getElementById('delBtn').classList.remove('hidden');
                document.getElementById('mTitle').innerText = "Editar App";
            } else {
                document.getElementById('tName').value = '';
                document.getElementById('tUrl').value = '';
                document.getElementById('tIcon').value = 'fa-solid fa-star';
                document.getElementById('delBtn').classList.add('hidden');
                document.getElementById('mTitle').innerText = "Nuevo Icono";
            }
            setTimeout(() => document.getElementById('toolWindow').classList.add('active'), 10);
        }

        function closeModal() {
            document.getElementById('toolWindow').classList.remove('active');
            setTimeout(() => document.getElementById('modalOverlay').style.display = 'none', 200);
        }

        function switchTab(t) {
            document.getElementById('pane-apps').classList.toggle('hidden', t !== 'apps');
            document.getElementById('pane-bg').classList.toggle('hidden', t !== 'bg');
            document.getElementById('btnApps').classList.toggle('active', t === 'apps');
            document.getElementById('btnBg').classList.toggle('active', t === 'bg');
        }

        function saveApp() {
            const app = {
                name: document.getElementById('tName').value,
                url: document.getElementById('tUrl').value,
                icon: document.getElementById('tIcon').value
            };
            if(!app.name || !app.url) return;
            if(editIdx !== null) config.apps[editIdx] = app;
            else config.apps.push(app);
            save(); render(); closeModal();
        }

        function deleteApp() {
            if(confirm("¿Eliminar?")) {
                config.apps.splice(editIdx, 1);
                save(); render(); closeModal();
            }
        }

        function render() {
            const cont = document.getElementById('desktop');
            cont.innerHTML = '';
            config.apps.forEach((a, i) => {
                const div = document.createElement('div');
                div.className = 'tool-icon';
                div.dataset.idx = i;
                div.innerHTML = `<i class="${a.icon}"></i><span>${a.name}</span>`;
                div.onclick = () => { if(a.url !== '#') window.open(a.url.startsWith('http') ? a.url : 'https://'+a.url, '_blank'); };
                div.oncontextmenu = (e) => { e.preventDefault(); openModal(i); };
                cont.appendChild(div);
            });
        }

        function save() { localStorage.setItem('toolbox_v4', JSON.stringify(config)); }

        init();
    </script>
</body>
</html>
