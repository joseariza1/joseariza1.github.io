<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selector de Cámara</title>
    
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    
    <style>
        /* Estilos de Alto Contraste y UI Optimizada para Legibilidad */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: #000000;
            color: #FFFFFF;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        header {
            width: 100%;
            text-align: center;
            padding: 10px 0;
        }

        h1 {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Contenedor del Video */
        .video-container {
            position: relative;
            width: 100%;
            max-width: 640px;
            aspect-ratio: 4 / 3;
            background-color: #111111;
            border: 4px solid #FFFFFF;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Controles de la UI */
        .controls {
            width: 100%;
            max-width: 640px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
            margin-bottom: 20px;
        }

        .select-wrapper {
            width: 100%;
        }

        label {
            display: block;
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        select {
            width: 100%;
            padding: 16px;
            font-size: 18px;
            font-weight: 700;
            background-color: #000000;
            color: #FFFFFF;
            border: 3px solid #FFFFFF;
            border-radius: 8px;
            appearance: none;
            cursor: pointer;
        }

        /* Botón de alternancia rápida */
        button {
            width: 100%;
            padding: 20px;
            font-size: 20px;
            font-weight: 900;
            background-color: #FFFFFF;
            color: #000000;
            border: none;
            border-radius: 8px;
            text-transform: uppercase;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        button:active {
            background-color: #CCCCCC;
        }

        .error-message {
            color: #FF3333;
            font-size: 16px;
            font-weight: 700;
            text-align: center;
            padding: 15px;
            border: 2px dashed #FF3333;
            border-radius: 8px;
            background-color: #110000;
            display: none; /* Se activa dinámicamente */
        }
    </style>
</head>
<body>

    <header>
        <h1>Cámaras</h1>
    </header>

    <div class="video-container">
        <video id="video" autoplay playsinline muted></video>
    </div>

    <div class="controls">
        <div id="errorLog" class="error-message"></div>

        <div class="select-wrapper">
            <label for="videoSource">Seleccionar Dispositivo:</label>
            <select id="videoSource"></select>
        </div>
        
        <button id="switchBtn">Siguiente Cámara</button>
    </div>

    <script>
        const videoElement = document.getElementById('video');
        const videoSelect = document.getElementById('videoSource');
        const switchButton = document.getElementById('switchBtn');
        const errorLog = document.getElementById('errorLog');
        
        let currentStream = null;
        let videoDevices = [];
        let currentDeviceIndex = 0;

        function showError(message) {
            errorLog.innerHTML = message;
            errorLog.style.display = "block";
        }

        function clearError() {
            errorLog.innerHTML = "";
            errorLog.style.display = "none";
        }

        // Detener la transmisión actual para liberar hardware
        function stopCurrentStream() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }
        }

        // Obtener la lista de cámaras disponibles
        async function getDevices() {
            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                videoDevices = devices.filter(device => device.kind === 'videoinput');
                
                videoSelect.innerHTML = '';
                
                if (videoDevices.length === 0) {
                    showError("No se detectaron cámaras físicas conectadas.");
                    return;
                }

                videoDevices.forEach((device, index) => {
                    const option = document.createElement('option');
                    option.value = device.deviceId;
                    option.text = device.label || `Cámara ${index + 1}`;
                    videoSelect.appendChild(option);
                });
            } catch (error) {
                showError("Error al listar cámaras: " + error.message);
            }
        }

        // Iniciar el video con el ID del dispositivo seleccionado
        async function startVideo(deviceId) {
            stopCurrentStream();
            
            const constraints = {
                video: {
                    deviceId: deviceId ? { exact: deviceId } : undefined,
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                }
            };

            try {
                currentStream = await navigator.mediaDevices.getUserMedia(constraints);
                videoElement.srcObject = currentStream;
                
                // Forzar re-lectura para mapear etiquetas si no estaban listas
                if (videoDevices.length > 0 && !videoDevices[0].label) {
                    await getDevices();
                    videoSelect.value = deviceId;
                }
                clearError();
            } catch (error) {
                showError("Error de hardware: " + error.name + " - " + error.message);
            }
        }

        // Inicialización y diagnóstico de seguridad
        async function init() {
            // Verificar protocolo seguro obligatorio
            if (window.location.protocol === 'file:') {
                showError("<strong>¡Bloqueo de Seguridad!</strong> Las cámaras no funcionan abriendo el archivo directamente.<br><br>Debes usar un servidor local (ej. Live Server en VS Code) o subirlo a un entorno HTTPS.");
                return;
            }

            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                showError("Tu navegador no soporta el acceso a cámaras o está bloqueado por políticas de seguridad.");
                return;
            }

            try {
                // Solicitar permisos explícitos primero
                const initialStream = await navigator.mediaDevices.getUserMedia({ video: true });
                initialStream.getTracks().forEach(track => track.stop());
                
                await getDevices();
                
                if (videoDevices.length > 0) {
                    await startVideo(videoDevices[0].deviceId);
                }
            } catch (error) {
                showError("Permiso denegado. Por favor, desbloquea el acceso a la cámara en el icono del candado junto a la barra de direcciones.");
            }
        }

        // Cambio manual por el select
        videoSelect.onchange = () => {
            currentDeviceIndex = videoDevices.findIndex(d => d.deviceId === videoSelect.value);
            startVideo(videoSelect.value);
        };

        // Ciclado veloz con el botón principal
        switchButton.onclick = () => {
            if (videoDevices.length === 0) return;
            
            currentDeviceIndex = (currentDeviceIndex + 1) % videoDevices.length;
            const nextDeviceId = videoDevices[currentDeviceIndex].deviceId;
            videoSelect.value = nextDeviceId;
            startVideo(nextDeviceId);
        };

        // Auto-registro de Service Worker "In-Line" PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const swCode = `
                    self.addEventListener('install', e => self.skipWaiting());
                    self.addEventListener('fetch', e => e.respondWith(fetch(e.request)));
                `;
                const blob = new Blob([swCode], { type: 'application/javascript' });
                const swUrl = URL.createObjectURL(blob);
                navigator.serviceWorker.register(swUrl).catch(err => console.log("SW error:", err));
            });
        }

        init();
    </script>
</body>
</html>
