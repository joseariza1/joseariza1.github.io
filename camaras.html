<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Switcher Auto-Automatizado</title>
    
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: #050507;
            color: #FFFFFF;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-y: auto;
        }

        header {
            width: 100%;
            max-width: 1000px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #FFFFFF;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 20px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .live-indicator {
            background-color: #FF0000;
            color: #FFFFFF;
            padding: 4px 10px;
            font-weight: 900;
            font-size: 11px;
            border-radius: 4px;
            text-transform: uppercase;
            animation: blink 1.5s infinite;
        }

        @keyframes blink { 50% { opacity: 0.3; } }

        h2 {
            font-size: 12px;
            font-weight: 900;
            text-transform: uppercase;
            margin: 15px 0 8px 0;
            letter-spacing: 0.5px;
            width: 100%;
            max-width: 1000px;
            color: #AAAAAA;
        }

        /* Layout Principal */
        .main-layout {
            display: grid;
            grid-template-columns: 3fr 1fr;
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }

        /* Monitor de Programa */
        .program-monitor {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #000000;
            border: 4px solid #FF0000;
            border-radius: 6px;
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #stingerTransition {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 10;
            display: none;
            pointer-events: none;
        }

        /* Panel Lateral de Estado */
        .side-panel {
            background-color: #111114;
            border: 2px solid #222227;
            padding: 15px;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .status-box {
            font-size: 11px;
            text-transform: uppercase;
            font-weight: 700;
            color: #888888;
            background-color: #09090b;
            padding: 10px;
            border-radius: 4px;
            border-left: 3px solid #FF0000;
        }

        .status-box span {
            display: block;
            color: #FFFFFF;
            font-size: 13px;
            font-weight: 900;
            margin-top: 3px;
        }

        .btn-action {
            width: 100%;
            padding: 10px;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            border-radius: 4px;
            cursor: pointer;
            border: none;
            background-color: #FFFFFF;
            color: #000000;
        }
        .btn-secondary { background-color: #222226; color: #FFFFFF; border: 2px solid #44444a; margin-top: 5px;}
        .btn-danger { background-color: #221111; color: #FF3333; border: 2px solid #FF3333; margin-top: auto;}
        .btn-danger:hover { background-color: #FF3333; color: #FFFFFF; }

        /* Mosaico Estricto 4x2 */
        .grid-channels {
            width: 100%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }

        .channel-box {
            position: relative;
            background-color: #111114;
            border: 3px solid #333338;
            border-radius: 6px;
            aspect-ratio: 4 / 3;
            overflow: hidden;
            cursor: pointer;
        }

        /* Indicador de Transmisión Activa */
        .channel-box.on-air {
            border-color: #FF0000;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
        }

        .channel-box video, .channel-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }

        .channel-label {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            font-size: 9px;
            font-weight: 700;
            padding: 5px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-transform: uppercase;
        }

        .badge-type {
            position: absolute;
            top: 5px;
            left: 5px;
            background-color: rgba(0, 0, 0, 0.8);
            padding: 2px 5px;
            font-size: 8px;
            font-weight: 900;
            border-radius: 3px;
            text-transform: uppercase;
        }

        .empty-slot {
            background-color: #08080a;
            border: 3px dashed #1c1c22;
            border-radius: 6px;
            aspect-ratio: 4 / 3;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #444449;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
        }

        .error-message {
            color: #FF3333;
            font-size: 14px;
            font-weight: 700;
            text-align: center;
            padding: 12px;
            border: 2px dashed #FF3333;
            border-radius: 6px;
            background-color: #110000;
            max-width: 1000px;
            width: 100%;
            margin-bottom: 15px;
            display: none;
        }

        .file-hidden { display: none; }
    </style>
</head>
<body>

    <header>
        <h1>Master Switcher Automatizado</h1>
        <div class="live-indicator">● EN AIRE</div>
    </header>

    <div id="errorLog" class="error-message"></div>

    <div class="main-layout">
        <div>
            <h2>Monitor de Salida (PGM)</h2>
            <div class="program-monitor">
                <canvas id="programCanvas"></canvas>
                <video id="stingerTransition" muted playsinline></video>
            </div>
        </div>

        <div class="side-panel">
            <h2>Estado de la Señal</h2>
            <div class="status-box">
                Fondo Actual
                <span id="txtCurrentBg">Ninguno</span>
            </div>
            <div class="status-box" style="border-left-color: #00FF00;">
                Capa Overlay
                <span id="txtCurrentOverlay">Ninguna (Apagada)</span>
            </div>

            <div style="margin-top: 10px;">
                <h2>Administrar Mosaico</h2>
                <button class="btn-action" id="btnLoadMedia">Cargar Video / Imagen</button>
                <button class="btn-action btn-secondary" id="btnLoadCamera">Asignar Cámara</button>
            </div>
            
            <button class="btn-action btn-danger" id="btnClearSelected">Limpiar Recuadro</button>
        </div>
    </div>

    <h2>Mosaico de Medios e Insumos (Fijo 4x2 — Clic para mandar al Aire)</h2>
    <div id="channelsGrid" class="grid-channels">
        </div>

    <input type="file" id="universalFileInput" class="file-hidden" accept="video/mp4, image/png, image/jpeg, image/gif">

    <script>
        const canvas = document.getElementById('programCanvas');
        const ctx = canvas.getContext('2d');
        const stingerVideo = document.getElementById('stingerTransition');
        const channelsGrid = document.getElementById('channelsGrid');
        
        const txtCurrentBg = document.getElementById('txtCurrentBg');
        const txtCurrentOverlay = document.getElementById('txtCurrentOverlay');
        const btnLoadMedia = document.getElementById('btnLoadMedia');
        const btnLoadCamera = document.getElementById('btnLoadCamera');
        const btnClearSelected = document.getElementById('btnClearSelected');
        const universalFileInput = document.getElementById('universalFileInput');
        const errorLog = document.getElementById('errorLog');

        const TOTAL_SLOTS = 8;
        let slotsData = [];
        let systemCameras = [];
        
        let onAirSlotId = null;         // Canal asignado al fondo de la pantalla
        let overlayActiveSlotId = null;   // Canal asignado a la capa superior
        let targetSlotToConfigure = null; // Cuál recuadro vacío estamos poblando
        
        let stingerSrcUrl = null;       // Archivo de transición guardado
        let pendingAirSlotId = null;

        function showError(message) {
            errorLog.innerHTML = message;
            errorLog.style.display = "block";
        }

        // Inicializar slots vacíos de la tabla 4x2
        function initSlotsStructure() {
            for (let i = 0; i < TOTAL_SLOTS; i++) {
                slotsData.push({
                    id: i,
                    type: 'empty', // empty, camera, video, image
                    name: `Ranura ${i + 1}`,
                    element: null,
                    streamObject: null,
                    objectUrl: null
                });
            }
        }

        // BUCLE DE RENDERIZADO DEL MASTER CANVAS (60 FPS)
        function masterRenderLoop() {
            ctx.fillStyle = "#000000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 1. Capa Inferior: Fondo de Programa
            const activeSlot = slotsData.find(s => s.id === onAirSlotId);
            if (activeSlot && activeSlot.element) {
                let srcWidth = activeSlot.element.videoWidth || activeSlot.element.naturalWidth || 1280;
                let srcHeight = activeSlot.element.videoHeight || activeSlot.element.naturalHeight || 720;
                if (canvas.width !== srcWidth) {
                    canvas.width = srcWidth;
                    canvas.height = srcHeight;
                }
                ctx.drawImage(activeSlot.element, 0, 0, canvas.width, canvas.height);
            }

            // 2. Capa Superior: Superposición (Overlay)
            const overlaySlot = slotsData.find(s => s.id === overlayActiveSlotId);
            if (overlaySlot && overlaySlot.type === 'image' && overlaySlot.element) {
                ctx.drawImage(overlaySlot.element, 0, 0, canvas.width, canvas.height);
            }

            requestAnimationFrame(masterRenderLoop);
        }

        // DIBUJAR LA PARRILLA VISUAL FIJA
        function drawGridHTML() {
            channelsGrid.innerHTML = '';
            slotsData.forEach(slot => {
                const box = document.createElement('div');
                box.className = 'channel-box';
                if (slot.id === onAirSlotId) box.classList.add('on-air');

                if (slot.type !== 'empty' && slot.element) {
                    const visualClone = slot.element.cloneNode(true);
                    if (slot.type === 'camera' || slot.type === 'video') {
                        visualClone.muted = true;
                        visualClone.autoplay = true;
                        visualClone.playsInline = true;
                        if (slot.streamObject) visualClone.srcObject = slot.streamObject;
                    }

                    const badge = document.createElement('div');
                    badge.className = 'badge-type';
                    badge.textContent = slot.type === 'camera' ? 'En Vivo' : slot.type;

                    const label = document.createElement('div');
                    label.className = 'channel-label';
                    label.textContent = slot.name;

                    box.appendChild(visualClone);
                    box.appendChild(badge);
                    box.appendChild(label);

                    // AL HACER CLIC EN UN MEDIO CARGADO: SE VA DIRECTO AL AIRE CON LA NUEVA LÓGICA
                    box.onclick = () => processLiveSwitch(slot);
                } else {
                    // Si está vacío, al hacer clic permite cargarle un archivo o cámara
                    const emptyContent = document.createElement('div');
                    emptyContent.className = 'empty-slot';
                    emptyContent.innerHTML = `<span>[Recuadro ${slot.id + 1}]</span><span style="font-size:8px;color:#333;margin-top:3px;">+ Asignar</span>`;
                    box.appendChild(emptyContent);
                    
                    box.onclick = () => {
                        targetSlotToConfigure = slot.id;
                        btnLoadMedia.click();
                    };
                }

                channelsGrid.appendChild(box);
            });

            // Actualizar textos del panel lateral
            const bgSlot = slotsData.find(s => s.id === onAirSlotId);
            txtCurrentBg.textContent = bgSlot ? bgSlot.name : "Ninguno";
            
            const ovSlot = slotsData.find(s => s.id === overlayActiveSlotId);
            txtCurrentOverlay.textContent = ovSlot ? `[ACTIVO] ${ovSlot.name}` : "Ninguna (Apagada)";
        }

        // CONTROL INTELIGENTE DE CORTES Y MULTIMEDIA EN VIVO
        function processLiveSwitch(slot) {
            // CASO 1: ES UNA CÁMARA EN VIVO
            if (slot.type === 'camera') {
                programWithTransition(slot.id);
            } 
            
            // CASO 2: ES UN VIDEO O GIF ANIMADO
            else if (slot.type === 'video') {
                const isStinger = confirm(`¿Cómo deseas usar este video ("${slot.name}")?\n\n✔ Presiona ACEPTAR si es un VIDEO DE TRANSICIÓN (Stinger).\n\n❌ Presiona CANCELAR si es un VIDEO DE FONDO normal.`);
                
                if (isStinger) {
                    // Se guarda como la cortinilla de transición global
                    if (stingerSrcUrl) URL.revokeObjectURL(stingerSrcUrl);
                    stingerSrcUrl = slot.objectUrl;
                    stingerVideo.src = stingerSrcUrl;
                    alert("¡Video configurado como Transición Estilo Stinger con éxito!");
                } else {
                    // Es un video normal: Va al aire de inmediato
                    programWithTransition(slot.id);
                    
                    // Escuchar el final del video para regresar automáticamente a la cámara principal (Slot 0)
                    slot.element.onended = () => {
                        console.log("El video de fondo ha terminado. Regresando a la Cámara Principal.");
                        // Verificamos si la cámara principal está disponible
                        if (slotsData[0].type !== 'empty') {
                            programWithTransition(0);
                        }
                    };
                }
            } 
            
            // CASO 3: ES UNA IMAGEN ESTÁTICA
            else if (slot.type === 'image') {
                const overlayMode = confirm(`¿Deseas SUPERPONER esta imagen como capa flotante?\n\n✔ Presiona ACEPTAR para usarla como LOGO/OVERLAY.\n\n❌ Presiona CANCELAR para mostrarla en la PANTALLA PRINCIPAL completa.`);
                
                if (overlayMode) {
                    // Si ya estaba activa la quitamos, si no, la encendemos
                    if (overlayActiveSlotId === slot.id) {
                        overlayActiveSlotId = null;
                    } else {
                        overlayActiveSlotId = slot.id;
                    }
                    drawGridHTML();
                } else {
                    // Se manda al fondo completo
                    programWithTransition(slot.id);
                }
            }
        }

        // LÓGICA DE CONMUTACIÓN CON ENLACE STINGER
        function programWithTransition(slotId) {
            if (stingerSrcUrl) {
                pendingAirSlotId = slotId;
                stingerVideo.style.display = "block";
                stingerVideo.currentTime = 0;
                stingerVideo.play();
            } else {
                executeAirSwitch(slotId);
            }
        }

        function executeAirSwitch(slotId) {
            onAirSlotId = slotId;
            drawGridHTML();
        }

        stingerVideo.ontimeupdate = () => {
            if (pendingAirSlotId && stingerVideo.currentTime >= (stingerVideo.duration / 2)) {
                executeAirSwitch(pendingAirSlotId);
                pendingAirSlotId = null;
            }
        };
        stingerVideo.onended = () => { stingerVideo.style.display = "none"; };

        // ASIGNACIÓN DE RECURSOS DESDE EL PANEL LATERAL O CLIC VACÍO
        btnLoadMedia.onclick = () => {
            if (targetSlotToConfigure === null) targetSlotToConfigure = 0;
            universalFileInput.click();
        };

        universalFileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const fileUrl = URL.createObjectURL(file);
            const isVideo = file.type.startsWith('video/');
            const slot = slotsData[targetSlotToConfigure];

            clearSlotData(slot);

            if (isVideo) {
                const videoEl = document.createElement('video');
                videoEl.src = fileUrl;
                videoEl.autoplay = true;
                videoEl.loop = false; // Desactivamos bucle infinito para que funcione el evento .onended
                videoEl.muted = true;
                videoEl.playsInline = true;

                slot.type = 'video';
                slot.element = videoEl;
                slot.objectUrl = fileUrl;
            } else {
                const imgEl = document.createElement('img');
                imgEl.src = fileUrl;
                imgEl.onload = () => {
                    slot.type = 'image';
                    slot.element = imgEl;
                    slot.objectUrl = fileUrl;
                    drawGridHTML();
                };
            }

            slot.name = file.name;
            if (onAirSlotId === null) onAirSlotId = slot.id;

            drawGridHTML();
            universalFileInput.value = '';
            targetSlotToConfigure = null; // reset
        };

        // Asignar Cámara de Hardware de forma manual
        btnLoadCamera.onclick = () => {
            let slotNum = prompt("Escribe el número de recuadro (1 al 8) donde deseas asignar la cámara:");
            slotNum = parseInt(slotNum) - 1;
            if (slotNum >= 0 && slotNum < TOTAL_SLOTS) {
                targetSlotToConfigure = slotNum;
                
                if (systemCameras.length === 0) return alert("No hay cámaras de hardware detectadas.");
                let msg = "Elige la cámara física:\n";
                systemCameras.forEach((c, idx) => msg += `${idx + 1}: ${c.label || `Cámara ${idx + 1}`}\n`);
                const sel = parseInt(prompt(msg)) - 1;
                if (sel >= 0 && sel < systemCameras.length) {
                    connectCameraToSlot(systemCameras[sel]);
                }
            }
        };

        async function connectCameraToSlot(deviceInfo) {
            const slot = slotsData[targetSlotToConfigure];
            clearSlotData(slot);

            const videoEl = document.createElement('video');
            videoEl.autoplay = true;
            videoEl.playsInline = true;
            videoEl.muted = true;

            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { deviceId: { exact: deviceInfo.deviceId }, width: 1280, height: 720 }
                });
                videoEl.srcObject = stream;
                
                slot.type = 'camera';
                slot.name = deviceInfo.label || `Cámara ${slot.id + 1}`;
                slot.element = videoEl;
                slot.streamObject = stream;

                if (onAirSlotId === null) onAirSlotId = slot.id;
                drawGridHTML();
            } catch (err) {
                showError("Error de hardware: " + err.message);
            }
            targetSlotToConfigure = null;
        }

        // Limpiar Recuadro manual
        btnClearSelected.onclick = () => {
            let num = prompt("Escribe el número de recuadro (1 al 8) que deseas vaciar:");
            num = parseInt(num) - 1;
            if (num >= 0 && num < TOTAL_SLOTS) {
                clearSlotData(slotsData[num]);
                drawGridHTML();
            }
        };

        function clearSlotData(slot) {
            if (slot.streamObject) {
                slot.streamObject.getTracks().forEach(t => t.stop());
            }
            if (slot.objectUrl) {
                URL.revokeObjectURL(slot.objectUrl);
            }
            if (onAirSlotId === slot.id) onAirSlotId = null;
            if (overlayActiveSlotId === slot.id) overlayActiveSlotId = null;

            slot.type = 'empty';
            slot.name = `Ranura ${slot.id + 1}`;
            slot.element = null;
            slot.streamObject = null;
            slot.objectUrl = null;
        }

        // INICIALIZACIÓN
        async function init() {
            if (window.location.protocol === 'file:') {
                showError("<strong>¡Bloqueo de Seguridad!</strong> Para automatizar eventos multimedia cruzados necesitas correr este archivo usando un servidor local (Live Server en VS Code).");
                return;
            }

            initSlotsStructure();

            try {
                const initialStream = await navigator.mediaDevices.getUserMedia({ video: true });
                initialStream.getTracks().forEach(track => track.stop());

                const devices = await navigator.mediaDevices.enumerateDevices();
                systemCameras = devices.filter(d => d.kind === 'videoinput');

                // Auto-cargar la cámara principal por defecto en el Recuadro 1
                if (systemCameras.length > 0) {
                    targetSlotToConfigure = 0;
                    await connectCameraToSlot(systemCameras[0]);
                }

                drawGridHTML();
                masterRenderLoop();
            } catch (error) {
                showError("Modo sin cámaras: Permiso denegado al hardware.");
                drawGridHTML();
                masterRenderLoop();
            }
        }

        init();
    </script>
</body>
</html>
