<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Production Switcher Pro</title>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: #060608;
            color: #FFFFFF;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
            overflow-y: auto;
        }

        header {
            width: 100%;
            max-width: 1100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #222227;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 18px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .live-indicator {
            background-color: #FF0000;
            color: #FFFFFF;
            padding: 4px 10px;
            font-weight: 900;
            font-size: 11px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 15px;
            width: 100%;
            max-width: 1100px;
            margin-bottom: 15px;
        }

        .program-monitor {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #000000;
            border: 4px solid #FF0000;
            border-radius: 6px;
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #stingerTransition {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 10;
            display: none;
            pointer-events: none;
        }

        /* Panel de Control Lateral */
        .side-panel {
            background-color: #111114;
            border: 2px solid #222227;
            padding: 15px;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .panel-section {
            margin-bottom: 15px;
        }

        h2 {
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            color: #888888;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .status-display {
            background-color: #09090b;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 700;
            border-left: 3px solid #FF0000;
            margin-bottom: 10px;
        }

        .status-display span {
            display: block;
            font-size: 14px;
            font-weight: 900;
            color: #FFF;
            margin-top: 2px;
        }

        .btn-tool {
            width: 100%;
            padding: 10px;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            background-color: #FFFFFF;
            color: #000000;
            margin-bottom: 6px;
        }
        .btn-tool-secondary { background-color: #222226; color: #FFF; border: 1px solid #444; }

        /* Mosaico Táctil 4x2 */
        .grid-channels {
            width: 100%;
            max-width: 1100px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .channel-box {
            position: relative;
            background-color: #111114;
            border: 3px solid #333338;
            border-radius: 6px;
            aspect-ratio: 16 / 10;
            overflow: hidden;
        }

        /* Indicador de En el Aire */
        .channel-box.on-air {
            border-color: #FF0000;
            box-shadow: 0 0 12px rgba(255, 0, 0, 0.6);
        }

        /* Zona de click principal del medio */
        .channel-trigger {
            width: 100%;
            height: 100%;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .channel-trigger video, .channel-trigger img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }

        /* Barra de herramientas flotante por canal */
        .channel-toolbar {
            position: absolute;
            top: 4px;
            right: 4px;
            display: flex;
            gap: 4px;
            z-index: 5;
        }

        .mini-btn {
            background-color: rgba(0, 0, 0, 0.85);
            color: #888;
            border: 1px solid #444;
            font-size: 8px;
            font-weight: 900;
            padding: 3px 5px;
            border-radius: 3px;
            cursor: pointer;
            text-transform: uppercase;
        }
        .mini-btn.active {
            background-color: #00FF00;
            color: #000;
            border-color: #00FF00;
        }
        .mini-btn.active-stinger {
            background-color: #FFaa00;
            color: #000;
            border-color: #FFaa00;
        }
        .mini-btn-danger:hover {
            background-color: #FF3333;
            color: #FFF;
        }

        .channel-label {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            font-size: 9px;
            font-weight: 700;
            padding: 4px;
            text-align: center;
            pointer-events: none;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .badge-type {
            position: absolute;
            top: 4px;
            left: 4px;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 2px 4px;
            font-size: 8px;
            font-weight: 900;
            border-radius: 2px;
            pointer-events: none;
        }

        .empty-slot {
            width: 100%;
            height: 100%;
            background-color: #08080a;
            border: 2px dashed #1c1c22;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #444449;
            font-size: 11px;
            font-weight: 900;
            cursor: pointer;
        }

        .error-message {
            color: #FF3333;
            font-size: 13px;
            font-weight: 700;
            text-align: center;
            padding: 10px;
            border: 2px dashed #FF3333;
            border-radius: 6px;
            background-color: #110000;
            max-width: 1100px;
            width: 100%;
            margin-bottom: 12px;
            display: none;
        }

        .file-hidden { display: none; }
    </style>
</head>
<body>

    <header>
        <h1>Switcher de Transmisión Directa (Un Clic)</h1>
        <div class="live-indicator">● LIVE PGM</div>
    </header>

    <div id="errorLog" class="error-message"></div>

    <div class="main-layout">
        <!-- MONITOR CENTRAL -->
        <div>
            <h2>Salida Principal de Video (Program)</h2>
            <div class="program-monitor">
                <canvas id="programCanvas"></canvas>
                <video id="stingerTransition" muted playsinline></video>
            </div>
        </div>

        <!-- PANEL DE ESTADO -->
        <div class="side-panel">
            <div class="panel-section">
                <h2>Monitoreo de Capas</h2>
                <div class="status-display">
                    Fondo PGM
                    <span id="txtCurrentBg">Vacío</span>
                </div>
                <div class="status-display" style="border-left-color: #00FF00;">
                    Overlay PNG
                    <span id="txtCurrentOverlay">Inactivo</span>
                </div>
            </div>

            <div class="panel-section" style="margin-top: auto;">
                <h2>Acciones Globales</h2>
                <button class="btn-tool" id="btnUploadGeneric">Cargar Archivo al Mosaico</button>
                <button class="btn-tool btn-tool-secondary" id="btnConnectCamGeneric">Conectar Cámara Física</button>
            </div>
        </div>
    </div>

    <!-- MOSAICO -->
    <h2>Mosaico de Fuentes (Clic en el centro para mandar al Aire)</h2>
    <div id="channelsGrid" class="grid-channels"></div>

    <!-- Elementos Mecánicos Ocultos -->
    <input type="file" id="universalFileInput" class="file-hidden" accept="video/mp4, image/png, image/jpeg, image/gif">

    <script>
        const canvas = document.getElementById('programCanvas');
        const ctx = canvas.getContext('2d');
        const stingerVideo = document.getElementById('stingerTransition');
        const channelsGrid = document.getElementById('channelsGrid');
        
        const txtCurrentBg = document.getElementById('txtCurrentBg');
        const txtCurrentOverlay = document.getElementById('txtCurrentOverlay');
        const btnUploadGeneric = document.getElementById('btnUploadGeneric');
        const btnConnectCamGeneric = document.getElementById('btnConnectCamGeneric');
        const universalFileInput = document.getElementById('universalFileInput');
        const errorLog = document.getElementById('errorLog');

        const TOTAL_SLOTS = 8;
        let slotsData = [];
        let systemCameras = [];
        
        let onAirSlotId = null; 
        let overlayActiveSlotId = null;
        let activeStingerSlotId = null; // Almacena qué canal actúa como cortinilla Stinger
        
        let slotTargetToLoad = null;
        let pendingAirSlotId = null;

        function showError(message) {
            errorLog.innerHTML = message;
            errorLog.style.display = "block";
        }

        function initSlots() {
            for (let i = 0; i < TOTAL_SLOTS; i++) {
                slotsData.push({
                    id: i,
                    type: 'empty', // empty, camera, video, image
                    name: `Canal ${i + 1}`,
                    element: null,
                    streamObject: null,
                    objectUrl: null,
                    // Configuraciones de comportamiento sin ventanas emergentes:
                    autoReturnToCam: true, // Si es video, ¿regresa al terminar?
                    isOverlayMode: false    // Si es imagen, ¿se monta encima o va al fondo?
                });
            }
        }

        // BUCLE DE RENDERIZADO DEL MONITOR PRINCIPAL (60 FPS)
        function masterRenderLoop() {
            ctx.fillStyle = "#000000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 1. Renderizar Fondo Activo
            const bgSlot = slotsData.find(s => s.id === onAirSlotId);
            if (bgSlot && bgSlot.element) {
                let srcWidth = bgSlot.element.videoWidth || bgSlot.element.naturalWidth || 1280;
                let srcHeight = bgSlot.element.videoHeight || bgSlot.element.naturalHeight || 720;
                if (canvas.width !== srcWidth) {
                    canvas.width = srcWidth;
                    canvas.height = srcHeight;
                }
                ctx.drawImage(bgSlot.element, 0, 0, canvas.width, canvas.height);
            }

            // 2. Renderizar Overlay Activo
            const ovSlot = slotsData.find(s => s.id === overlayActiveSlotId);
            if (ovSlot && ovSlot.type === 'image' && ovSlot.element) {
                ctx.drawImage(ovSlot.element, 0, 0, canvas.width, canvas.height);
            }

            requestAnimationFrame(masterRenderLoop);
        }

        // CONSTRUCCIÓN DINÁMICA DEL MOSAICO TÁCTIL
        function drawGridHTML() {
            channelsGrid.innerHTML = '';
            
            slotsData.forEach(slot => {
                const box = document.createElement('div');
                box.className = 'channel-box';
                if (slot.id === onAirSlotId) box.classList.add('on-air');

                if (slot.type !== 'empty' && slot.element) {
                    // CONTENEDOR DE DISPARO DIRECTO (Clic central envía al aire)
                    const trigger = document.createElement('div');
                    trigger.className = 'channel-trigger';
                    
                    const visualClone = slot.element.cloneNode(true);
                    if (slot.type === 'camera' || slot.type === 'video') {
                        visualClone.muted = true;
                        visualClone.autoplay = true;
                        visualClone.playsInline = true;
                        if (slot.streamObject) visualClone.srcObject = slot.streamObject;
                    }
                    trigger.appendChild(visualClone);

                    const badge = document.createElement('div');
                    badge.className = 'badge-type';
                    badge.textContent = slot.type;
                    trigger.appendChild(badge);

                    const label = document.createElement('div');
                    label.className = 'channel-label';
                    label.textContent = slot.name;
                    trigger.appendChild(label);

                    // AL CLICAR EL MEDIO SE ENVÍA DIRECTAMENTE AL AIRE
                    trigger.onclick = () => sendSlotToAir(slot);
                    box.appendChild(trigger);

                    // BARRA DE HERRAMIENTAS INTEGRADA EN EL CUADRO (Sin popups)
                    const toolbar = document.createElement('div');
                    toolbar.className = 'channel-toolbar';

                    // Herramientas específicas según el tipo de medio
                    if (slot.type === 'video') {
                        // Botón de Transición (Stinger)
                        const btnStinger = document.createElement('button');
                        btnStinger.className = `mini-btn ${activeStingerSlotId === slot.id ? 'active-stinger' : ''}`;
                        btnStinger.textContent = "Stinger";
                        btnStinger.title = "Usar este video como transición global";
                        btnStinger.onclick = (e) => {
                            e.stopPropagation();
                            toggleStingerMode(slot.id);
                        };
                        toolbar.appendChild(btnStinger);

                        // Botón Auto-Retorno a Cámara Principal
                        const btnReturn = document.createElement('button');
                        btnReturn.className = `mini-btn ${slot.autoReturnToCam ? 'active' : ''}`;
                        btnReturn.textContent = "Auto-Cam";
                        btnReturn.title = "Volver a la Cámara 1 automáticamente al terminar el video";
                        btnReturn.onclick = (e) => {
                            e.stopPropagation();
                            slot.autoReturnToCam = !slot.autoReturnToCam;
                            drawGridHTML();
                        };
                        toolbar.appendChild(btnReturn);
                    }

                    if (slot.type === 'image') {
                        // Botón modo Overlay vs Modo Fondo Completo
                        const btnMode = document.createElement('button');
                        btnMode.className = `mini-btn ${slot.isOverlayMode ? 'active' : ''}`;
                        btnMode.textContent = slot.isOverlayMode ? "Modo: Logo" : "Modo: Fondo";
                        btnMode.title = "Cambiar si se superpone como logo o va a pantalla completa";
                        btnMode.onclick = (e) => {
                            e.stopPropagation();
                            slot.isOverlayMode = !slot.isOverlayMode;
                            drawGridHTML();
                        };
                        toolbar.appendChild(btnMode);
                    }

                    // Botón para vaciar ranura directamente
                    const btnDel = document.createElement('button');
                    btnDel.className = 'mini-btn mini-btn-danger';
                    btnDel.textContent = "X";
                    btnDel.onclick = (e) => {
                        e.stopPropagation();
                        clearSlotData(slot);
                        drawGridHTML();
                    };
                    toolbar.appendChild(btnDel);

                    box.appendChild(toolbar);

                } else {
                    // Ranura Vacía
                    const empty = document.createElement('div');
                    empty.className = 'empty-slot';
                    empty.innerHTML = `<span>[Ranura ${slot.id + 1}]</span><span style="font-size:8px;color:#444;margin-top:2px;">+ Cargar</span>`;
                    empty.onclick = () => {
                        slotTargetToLoad = slot.id;
                        universalFileInput.click();
                    };
                    box.appendChild(empty);
                }

                channelsGrid.appendChild(box);
            });

            // Actualizar labels del Panel de Control
            const currentBgSlot = slotsData.find(s => s.id === onAirSlotId);
            txtCurrentBg.textContent = currentBgSlot ? currentBgSlot.name : "Vacío";
            
            const currentOvSlot = slotsData.find(s => s.id === overlayActiveSlotId);
            txtCurrentOverlay.textContent = currentOvSlot ? currentOvSlot.name : "Inactivo";
        }

        // CONTROL DE TRANSMISIÓN DE UN SOLO CLIC
        function sendSlotToAir(slot) {
            // IMÁGENES
            if (slot.type === 'image') {
                if (slot.isOverlayMode) {
                    // Si está configurado como Logo/Overlay, se activa o desactiva la capa superior de inmediato
                    overlayActiveSlotId = (overlayActiveSlotId === slot.id) ? null : slot.id;
                    drawGridHTML();
                } else {
                    // Modo pantalla completa
                    executeTransition(slot.id);
                }
                return;
            }

            // VIDEOS / CÁMARAS
            if (slot.type === 'video' && slot.id === activeStingerSlotId) {
                // Prevenir enviar al aire de fondo el video que se usa como transición stinger activa
                return;
            }

            executeTransition(slot.id);

            // Escuchador de término automático si es un video de fondo
            if (slot.type === 'video') {
                slot.element.currentTime = 0;
                slot.element.play();
                
                slot.element.onended = () => {
                    if (slot.autoReturnToCam && slotsData[0].type !== 'empty') {
                        // Regresa de forma automática al Canal 1 (Cámara Principal)
                        executeTransition(0);
                    }
                };
            }
        }

        // GESTIÓN DE TRANSICIÓN GLOBAL (STINGER)
        function toggleStingerMode(slotId) {
            if (activeStingerSlotId === slotId) {
                activeStingerSlotId = null;
                stingerVideo.src = "";
            } else {
                activeStingerSlotId = slotId;
                stingerVideo.src = slotsData[slotId].objectUrl;
            }
            drawGridHTML();
        }

        function executeTransition(slotId) {
            if (activeStingerSlotId !== null && slotsData[activeStingerSlotId].objectUrl) {
                pendingAirSlotId = slotId;
                stingerVideo.style.display = "block";
                stingerVideo.currentTime = 0;
                stingerVideo.play();
            } else {
                onAirSlotId = slotId;
                drawGridHTML();
            }
        }

        stingerVideo.ontimeupdate = () => {
            if (pendingAirSlotId && stingerVideo.currentTime >= (stingerVideo.duration / 2)) {
                onAirSlotId = pendingAirSlotId;
                pendingAirSlotId = null;
                drawGridHTML();
            }
        };
        stingerVideo.onended = () => { stingerVideo.style.display = "none"; };

        // CARGA DIRECTA DE ARCHIVOS (MECÁNICA)
        btnUploadGeneric.onclick = () => {
            // Busca la primera ranura vacía si no se seleccionó una directamente
            const firstEmpty = slotsData.find(s => s.type === 'empty');
            slotTargetToLoad = firstEmpty ? firstEmpty.id : 0;
            universalFileInput.click();
        };

        universalFileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (!file || slotTargetToLoad === null) return;

            const fileUrl = URL.createObjectURL(file);
            const isVideo = file.type.startsWith('video/');
            const slot = slotsData[slotTargetToLoad];

            clearSlotData(slot);

            if (isVideo) {
                const videoEl = document.createElement('video');
                videoEl.src = fileUrl;
                videoEl.autoplay = true;
                videoEl.loop = false;
                videoEl.muted = true;
                videoEl.playsInline = true;

                slot.type = 'video';
                slot.element = videoEl;
                slot.objectUrl = fileUrl;
            } else {
                const imgEl = document.createElement('img');
                imgEl.src = fileUrl;
                imgEl.onload = () => {
                    slot.type = 'image';
                    slot.element = imgEl;
                    slot.objectUrl = fileUrl;
                    drawGridHTML();
                };
            }

            slot.name = file.name;
            if (onAirSlotId === null) onAirSlotId = slot.id;

            drawGridHTML();
            universalFileInput.value = '';
            slotTargetToLoad = null;
        };

        // ENLAZAR CÁMARAS DE HARDWARE
        btnConnectCamGeneric.onclick = async () => {
            if (systemCameras.length === 0) return alert("No se encontraron cámaras físicas de hardware.");
            
            const targetStr = prompt("Introduce el número de recuadro (1 al 8) para esta cámara:");
            const targetIdx = parseInt(targetStr) - 1;
            
            if (targetIdx >= 0 && targetIdx < TOTAL_SLOTS) {
                let msg = "Selecciona la cámara física:\n";
                systemCameras.forEach((c, idx) => msg += `${idx + 1}: ${c.label || `Cámara ${idx + 1}`}\n`);
                const sel = parseInt(prompt(msg)) - 1;
                
                if (sel >= 0 && sel < systemCameras.length) {
                    await connectCamera(targetIdx, systemCameras[sel]);
                }
            }
        };

        async function connectCamera(slotId, deviceInfo) {
            const slot = slotsData[slotId];
            clearSlotData(slot);

            const videoEl = document.createElement('video');
            videoEl.autoplay = true;
            videoEl.playsInline = true;
            videoEl.muted = true;

            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { deviceId: { exact: deviceInfo.deviceId }, width: 1280, height: 720 }
                });
                videoEl.srcObject = stream;
                
                slot.type = 'camera';
                slot.name = deviceInfo.label || `Cámara In Vivo ${slotId + 1}`;
                slot.element = videoEl;
                slot.streamObject = stream;

                if (onAirSlotId === null) onAirSlotId = slot.id;
                drawGridHTML();
            } catch (err) {
                showError("No se pudo conectar la cámara: " + err.message);
            }
        }

        function clearSlotData(slot) {
            if (slot.streamObject) slot.streamObject.getTracks().forEach(t => t.stop());
            if (slot.objectUrl) URL.revokeObjectURL(slot.objectUrl);
            
            if (onAirSlotId === slot.id) onAirSlotId = null;
            if (overlayActiveSlotId === slot.id) overlayActiveSlotId = null;
            if (activeStingerSlotId === slot.id) {
                activeStingerSlotId = null;
                stingerVideo.src = "";
            }

            slot.type = 'empty';
            slot.name = `Canal ${slot.id + 1}`;
            slot.element = null;
            slot.streamObject = null;
            slot.objectUrl = null;
        }

        // INICIALIZACIÓN DE ENTORNO
        async function init() {
            if (window.location.protocol === 'file:') {
                showError("<strong>¡Bloqueo de Seguridad!</strong> Este mezclador requiere cargarse mediante un servidor local (ej. Live Server en VS Code) para gestionar los flujos de video y cámara.");
                return;
            }

            initSlots();

            try {
                const initialStream = await navigator.mediaDevices.getUserMedia({ video: true });
                initialStream.getTracks().forEach(t => t.stop());

                const devices = await navigator.mediaDevices.enumerateDevices();
                systemCameras = devices.filter(d => d.kind === 'videoinput');

                // Asignar por defecto la primera cámara real detectada al Canal 1
                if (systemCameras.length > 0) {
                    await connectCamera(0, systemCameras[0]);
                }

                drawGridHTML();
                masterRenderLoop();
            } catch (error) {
                showError("Modo limitado: Acceso a cámaras bloqueado o ausente.");
                drawGridHTML();
                masterRenderLoop();
            }
        }

        init();
    </script>
</body>
</html>
