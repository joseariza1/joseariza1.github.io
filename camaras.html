<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudio de Producción Unificado</title>
    
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: #060608;
            color: #FFFFFF;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-y: auto;
        }

        header {
            width: 100%;
            max-width: 1000px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #FFFFFF;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 20px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .live-indicator {
            background-color: #FF0000;
            color: #FFFFFF;
            padding: 4px 10px;
            font-weight: 900;
            font-size: 11px;
            border-radius: 4px;
            text-transform: uppercase;
            animation: blink 1.5s infinite;
        }

        @keyframes blink { 50% { opacity: 0.3; } }

        h2 {
            font-size: 13px;
            font-weight: 900;
            text-transform: uppercase;
            margin: 15px 0 8px 0;
            letter-spacing: 0.5px;
            width: 100%;
            max-width: 1000px;
            color: #AAAAAA;
        }

        /* Layout Principal */
        .main-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }

        /* Monitor de Programa */
        .program-monitor {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #000000;
            border: 4px solid #FF0000;
            border-radius: 6px;
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #stingerTransition {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 10;
            display: none;
            pointer-events: none;
        }

        /* Panel de Edición/Control del Recuadro Seleccionado */
        .control-panel {
            background-color: #111114;
            border: 2px solid #222227;
            padding: 15px;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .slot-indicator {
            font-size: 14px;
            font-weight: 900;
            text-transform: uppercase;
            color: #FF0000;
            border-bottom: 2px solid #222227;
            padding-bottom: 5px;
        }

        label {
            display: block;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            color: #888888;
            margin-bottom: 4px;
        }

        .btn-action {
            width: 100%;
            padding: 10px;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            border-radius: 4px;
            cursor: pointer;
            border: none;
            text-align: center;
        }
        .btn-primary { background-color: #FFFFFF; color: #000000; }
        .btn-secondary { background-color: #222226; color: #FFFFFF; border: 2px solid #44444a; }
        .btn-danger { background-color: #221111; color: #FF3333; border: 2px solid #FF3333; }
        .btn-danger:hover { background-color: #FF3333; color: #FFFFFF; }
        
        .btn-overlay-toggle {
            background-color: #112211;
            color: #00FF00;
            border: 2px solid #00FF00;
        }
        .btn-overlay-toggle.active {
            background-color: #00FF00;
            color: #000000;
        }

        /* Mosaico Universal Fijo (4x2) */
        .grid-channels {
            width: 100%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .channel-box {
            position: relative;
            background-color: #111114;
            border: 3px solid #333338;
            border-radius: 6px;
            aspect-ratio: 4 / 3;
            overflow: hidden;
            cursor: pointer;
        }

        /* Borde Rojo si el canal está en la pantalla grande (Al aire) */
        .channel-box.on-air {
            border-color: #FF0000;
            box-shadow: 0 0 8px rgba(255, 0, 0, 0.5);
        }

        /* Borde Blanco si el canal está seleccionado para editarse */
        .channel-box.selected-edit {
            border-color: #FFFFFF;
        }

        .channel-box video, .channel-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }

        .channel-label {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            font-size: 9px;
            font-weight: 700;
            padding: 5px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-transform: uppercase;
        }

        .badge-type {
            position: absolute;
            top: 5px;
            left: 5px;
            background-color: rgba(0, 0, 0, 0.75);
            padding: 2px 5px;
            font-size: 8px;
            font-weight: 900;
            border-radius: 3px;
            text-transform: uppercase;
        }

        .empty-slot {
            background-color: #08080a;
            border: 3px dashed #1c1c22;
            border-radius: 6px;
            aspect-ratio: 4 / 3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #444449;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
        }

        .error-message {
            color: #FF3333;
            font-size: 14px;
            font-weight: 700;
            text-align: center;
            padding: 12px;
            border: 2px dashed #FF3333;
            border-radius: 6px;
            background-color: #110000;
            max-width: 1000px;
            width: 100%;
            margin-bottom: 15px;
            display: none;
        }

        .file-hidden { display: none; }
    </style>
</head>
<body>

    <header>
        <h1>Master Switcher Studio Unificado</h1>
        <div class="live-indicator">● EN AIRE</div>
    </header>

    <div id="errorLog" class="error-message"></div>

    <div class="main-layout">
        <div>
            <h2>Salida de Transmisión (PGM)</h2>
            <div class="program-monitor">
                <canvas id="programCanvas"></canvas>
                <video id="stingerTransition" muted playsinline></video>
            </div>
        </div>

        <div class="side-panel">
            <h2>Inspector de Canal</h2>
            <div class="control-panel" id="inspectorPanel">
                <div class="slot-indicator" id="inspectTitle">Recuadro 1</div>
                
                <div style="margin-top: 5px;">
                    <label>Acción Principal</label>
                    <button class="btn-action btn-primary" id="btnAir">Enviar al Aire</button>
                </div>

                <div id="imageOverlayControls" style="display: none;">
                    <label>Control de Capas (Imágenes)</label>
                    <button class="btn-action btn-overlay-toggle" id="btnOverlayToggle">Superponer sobre Video</button>
                </div>

                <div style="margin-top: 10px; border-top: 1px solid #222227; padding-top: 10px;">
                    <label>Asignar / Cambiar Medio</label>
                    <button class="btn-action btn-secondary" id="btnLoadMedia">Cargar Video / Imagen</button>
                    <button class="btn-action btn-secondary" id="btnLoadCamera" style="margin-top: 6px;">Asignar Cámara</button>
                </div>

                <div style="margin-top: auto;">
                    <button class="btn-action btn-danger" id="btnClearSlot">Limpiar Recuadro</button>
                </div>
            </div>
        </div>
    </div>

    <h2>Mosaico Universal de Canales (Fijo 4x2)</h2>
    <div id="channelsGrid" class="grid-channels">
        </div>

    <div style="width:100%; max-width:1000px; background-color:#111114; padding:12px; border-radius:6px; border:2px solid #222227;">
        <label>Video de Transición Stinger (MP4 Global)</label>
        <input type="file" id="stingerInput" accept="video/mp4">
    </div>

    <input type="file" id="universalFileInput" class="file-hidden" accept="video/mp4, image/png, image/jpeg, image/gif">

    <script>
        const canvas = document.getElementById('programCanvas');
        const ctx = canvas.getContext('2d');
        const stingerVideo = document.getElementById('stingerTransition');
        const channelsGrid = document.getElementById('channelsGrid');
        
        // Elementos del Inspector
        const inspectTitle = document.getElementById('inspectTitle');
        const btnAir = document.getElementById('btnAir');
        const btnLoadMedia = document.getElementById('btnLoadMedia');
        const btnLoadCamera = document.getElementById('btnLoadCamera');
        const btnClearSlot = document.getElementById('btnClearSlot');
        const imageOverlayControls = document.getElementById('imageOverlayControls');
        const btnOverlayToggle = document.getElementById('btnOverlayToggle');

        const universalFileInput = document.getElementById('universalFileInput');
        const stingerInput = document.getElementById('stingerInput');
        const errorLog = document.getElementById('errorLog');

        const TOTAL_SLOTS = 8; // Matriz 4x2 rígida
        let slotsData = [];    // Almacena el estado de los 8 slots
        
        let systemCameras = [];
        let onAirSlotId = null;       // Qué recuadro provee el fondo al aire
        let editingSlotId = 0;        // Qué recuadro está seleccionado en el Inspector
        let overlayActiveSlotId = null; // Qué recuadro de tipo imagen está superpuesto

        let stingerSrcUrl = null;
        let pendingAirSlotId = null;

        function showError(message) {
            errorLog.innerHTML = message;
            errorLog.style.display = "block";
        }

        // Inicializar la estructura vacía de los 8 slots
        function initSlotsStructure() {
            for (let i = 0; i < TOTAL_SLOTS; i++) {
                slotsData.push({
                    id: i,
                    type: 'empty', // empty, camera, video, image
                    name: `Línea ${i + 1}`,
                    element: null,
                    streamObject: null,
                    objectUrl: null
                });
            }
        }

        // BUCLE DE RENDERIZADO (60 FPS)
        function masterRenderLoop() {
            ctx.fillStyle = "#000000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 1. Capa de Fondo (Canal On Air)
            const activeSlot = slotsData.find(s => s.id === onAirSlotId);
            if (activeSlot && activeSlot.element) {
                let srcWidth = activeSlot.element.videoWidth || activeSlot.element.naturalWidth || 1280;
                let srcHeight = activeSlot.element.videoHeight || activeSlot.element.naturalHeight || 720;
                if (canvas.width !== srcWidth) {
                    canvas.width = srcWidth;
                    canvas.height = srcHeight;
                }
                ctx.drawImage(activeSlot.element, 0, 0, canvas.width, canvas.height);
            }

            // 2. Capa de Superposición (Overlay)
            const overlaySlot = slotsData.find(s => s.id === overlayActiveSlotId);
            if (overlaySlot && overlaySlot.type === 'image' && overlaySlot.element) {
                ctx.drawImage(overlaySlot.element, 0, 0, canvas.width, canvas.height);
            }

            requestAnimationFrame(masterRenderLoop);
        }

        // RE-RENDERIZAR LA PARRILLA VISUAL 4x2
        function drawGridHTML() {
            channelsGrid.innerHTML = '';
            slotsData.forEach(slot => {
                const box = document.createElement('div');
                box.className = 'channel-box';
                
                // Aplicar estilos de estados estructurales
                if (slot.id === onAirSlotId) box.classList.add('on-air');
                if (slot.id === editingSlotId) box.classList.add('selected-edit');
                box.dataset.id = slot.id;

                if (slot.type !== 'empty' && slot.element) {
                    // Crear clon visual para la miniatura en tiempo real
                    const visualClone = slot.element.cloneNode(true);
                    if (slot.type === 'camera' || slot.type === 'video') {
                        visualClone.muted = true;
                        visualClone.autoplay = true;
                        visualClone.playsInline = true;
                        if (slot.streamObject) visualClone.srcObject = slot.streamObject;
                    }
                    
                    const badge = document.createElement('div');
                    badge.className = 'badge-type';
                    badge.textContent = slot.type;

                    const label = document.createElement('div');
                    label.className = 'channel-label';
                    label.textContent = slot.name;

                    box.appendChild(visualClone);
                    box.appendChild(badge);
                    box.appendChild(label);
                } else {
                    const emptyContent = document.createElement('div');
                    emptyContent.className = 'empty-slot';
                    emptyContent.innerHTML = `<span>[Slot ${slot.id + 1}]</span><span style="font-size:9px;color:#222227;margin-top:4px;">Vacío</span>`;
                    box.appendChild(emptyContent);
                }

                // Al tocar cualquier recuadro, cambia el foco de edición del Inspector
                box.onclick = () => {
                    editingSlotId = slot.id;
                    updateInspectorUI();
                    drawGridHTML();
                };

                channelsGrid.appendChild(box);
            });
        }

        // ACTUALIZAR EL PANEL INSPECTOR LATERAL
        function updateInspectorUI() {
            const slot = slotsData[editingSlotId];
            inspectTitle.textContent = `Recuadro ${slot.id + 1}`;

            if (slot.type === 'empty') {
                btnAir.style.display = "none";
                imageOverlayControls.style.display = "none";
                btnClearSlot.style.display = "none";
            } else {
                btnAir.style.display = "block";
                btnClearSlot.style.display = "block";
                
                // Si es una imagen, habilitar controles de Overlay independientes
                if (slot.type === 'image') {
                    imageOverlayControls.style.display = "block";
                    if (slot.id === overlayActiveSlotId) {
                        btnOverlayToggle.textContent = "Quitar Capa Overlay";
                        btnOverlayToggle.classList.add('active');
                    } else {
                        btnOverlayToggle.textContent = "Superponer sobre Video";
                        btnOverlayToggle.classList.remove('active');
                    }
                } else {
                    imageOverlayControls.style.display = "none";
                }
            }
        }

        // CONTROL DE ENVÍO AL AIRE CON TRANSICIÓN STINGER
        btnAir.onclick = () => {
            if (stingerSrcUrl) {
                pendingAirSlotId = editingSlotId;
                stingerVideo.style.display = "block";
                stingerVideo.currentTime = 0;
                stingerVideo.play();
            } else {
                executeAirSwitch(editingSlotId);
            }
        };

        function executeAirSwitch(slotId) {
            onAirSlotId = slotId;
            drawGridHTML();
        }

        stingerVideo.ontimeupdate = () => {
            if (pendingAirSlotId && stingerVideo.currentTime >= (stingerVideo.duration / 2)) {
                executeAirSwitch(pendingAirSlotId);
                pendingAirSlotId = null;
            }
        };
        stingerVideo.onended = () => { stingerVideo.style.display = "none"; };

        // ACCIONES DE EDICIÓN Y CARGA DE MEDIOS
        btnLoadMedia.onclick = () => universalFileInput.click();

        universalFileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const fileUrl = URL.createObjectURL(file);
            const isVideo = file.type.startsWith('video/');
            const slot = slotsData[editingSlotId];

            // Limpiar datos previos del slot si existían
            clearSlotData(slot);

            if (isVideo) {
                const videoEl = document.createElement('video');
                videoEl.src = fileUrl;
                videoEl.autoplay = true;
                videoEl.loop = true;
                videoEl.muted = true;
                videoEl.playsInline = true;

                slot.type = 'video';
                slot.element = videoEl;
                slot.objectUrl = fileUrl;
            } else {
                const imgEl = document.createElement('img');
                imgEl.src = fileUrl;
                imgEl.onload = () => {
                    slot.type = 'image';
                    slot.element = imgEl;
                    slot.objectUrl = fileUrl;
                    drawGridHTML();
                };
            }

            slot.name = file.name;
            if (onAirSlotId === null) onAirSlotId = slot.id; // Enviar al aire automáticamente si está todo vacío
            
            updateInspectorUI();
            drawGridHTML();
            universalFileInput.value = '';
        };

        // Asignar Cámara de Hardware
        btnLoadCamera.onclick = () => {
            if (systemCameras.length === 0) return alert("No se detectaron cámaras físicas.");
            
            let msg = "Selecciona la cámara física que deseas asignar a este recuadro:\n";
            systemCameras.forEach((cam, idx) => msg += `${idx + 1}: ${cam.label || `Cámara ${idx + 1}`}\n`);
            
            const selection = parseInt(prompt(msg)) - 1;
            if (selection >= 0 && selection < systemCameras.length) {
                connectCameraToSlot(systemCameras[selection]);
            }
        };

        async function connectCameraToSlot(deviceInfo) {
            const slot = slotsData[editingSlotId];
            clearSlotData(slot);

            const videoEl = document.createElement('video');
            videoEl.autoplay = true;
            videoEl.playsInline = true;
            videoEl.muted = true;

            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { deviceId: { exact: deviceInfo.deviceId }, width: 1280, height: 720 }
                });
                videoEl.srcObject = stream;
                
                slot.type = 'camera';
                slot.name = deviceInfo.label || `Cámara ${slot.id + 1}`;
                slot.element = videoEl;
                slot.streamObject = stream;

                if (onAirSlotId === null) onAirSlotId = slot.id;

                updateInspectorUI();
                drawGridHTML();
            } catch (err) {
                showError("No se pudo enlazar la cámara elegida: " + err.message);
            }
        }

        // Alternar el estado del Overlay de la imagen seleccionada
        btnOverlayToggle.onclick = () => {
            if (overlayActiveSlotId === editingSlotId) {
                overlayActiveSlotId = null; // Desactivar
            } else {
                overlayActiveSlotId = editingSlotId; // Activar encima del programa actual
            }
            updateInspectorUI();
        };

        // Limpiar Recuadro (Resetear línea)
        btnClearSlot.onclick = () => {
            const slot = slotsData[editingSlotId];
            clearSlotData(slot);
            updateInspectorUI();
            drawGridHTML();
        };

        function clearSlotData(slot) {
            if (slot.streamObject) {
                slot.streamObject.getTracks().forEach(t => t.stop());
            }
            if (slot.objectUrl) {
                URL.revokeObjectURL(slot.objectUrl);
            }
            
            if (onAirSlotId === slot.id) onAirSlotId = null;
            if (overlayActiveSlotId === slot.id) overlayActiveSlotId = null;

            slot.type = 'empty';
            slot.name = `Línea ${slot.id + 1}`;
            slot.element = null;
            slot.streamObject = null;
            slot.objectUrl = null;
        }

        // Cargar animación de Stinger global
        stingerInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                if (stingerSrcUrl) URL.revokeObjectURL(stingerSrcUrl);
                stingerSrcUrl = URL.createObjectURL(file);
                stingerVideo.src = stingerSrcUrl;
            }
        };

        // INICIALIZACIÓN COMPLETA
        async function init() {
            if (window.location.protocol === 'file:') {
                showError("<strong>¡Bloqueo de Seguridad!</strong> Para reconfigurar canales multimedia al vuelo necesitas abrir este archivo a través de un servidor local (Live Server en VS Code).");
                return;
            }

            initSlotsStructure();

            try {
                // Forzar activación de permisos para descubrir hardware real
                const initialStream = await navigator.mediaDevices.getUserMedia({ video: true });
                initialStream.getTracks().forEach(track => track.stop());

                const devices = await navigator.mediaDevices.enumerateDevices();
                systemCameras = devices.filter(d => d.kind === 'videoinput');

                // Llenar por defecto el Recuadro 1 con la cámara principal
                if (systemCameras.length > 0) {
                    editingSlotId = 0;
                    await connectCameraToSlot(systemCameras[0]);
                }

                updateInspectorUI();
                drawGridHTML();
                masterRenderLoop();
            } catch (error) {
                showError("Modo limitado: No se detectó o se bloqueó el acceso a las cámaras físicas.");
                updateInspectorUI();
                drawGridHTML();
                masterRenderLoop();
            }
        }

        init();
    </script>
</body>
</html>
