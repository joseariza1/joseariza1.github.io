<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Switcher Pro - Ultimate Hybrid Edition</title>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: #060608;
            color: #FFFFFF;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
            overflow-y: auto;
        }

        header {
            width: 100%;
            max-width: 1100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #222227;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 18px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .live-status-block {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .live-indicator {
            background-color: #333;
            color: #FFFFFF;
            padding: 4px 10px;
            font-weight: 900;
            font-size: 11px;
            border-radius: 4px;
            text-transform: uppercase;
            transition: background-color 0.3s;
        }
        .live-indicator.streaming {
            background-color: #0055ff;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        .main-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 15px;
            width: 100%;
            max-width: 1100px;
            margin-bottom: 15px;
        }

        .monitor-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #000000;
            border: 4px solid #222227;
            border-radius: 6px;
            overflow: hidden;
            transition: border-color 0.3s, aspect-ratio 0.3s;
        }
        .monitor-container.streaming-active {
            border-color: #0055ff;
        }

        .monitor-container.vertical {
            aspect-ratio: 9 / 16;
            max-height: 60vh;
        }

        canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Contenedor dinámico para capas interactivas de internet (IFRAMES) */
        #internetLayerContainer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            display: none;
        }
        #internetLayerContainer iframe {
            width: 100%;
            height: 100%;
            border: none;
            pointer-events: auto;
        }

        #stingerTransition {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 10;
            display: none;
            pointer-events: none;
        }

        .audio-meter-container {
            width: 100%;
            background-color: #111114;
            border: 2px solid #222227;
            border-radius: 4px;
            padding: 6px 10px;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .audio-meter-label {
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            color: #888888;
        }
        .audio-bar-bg {
            flex-grow: 1;
            height: 10px;
            background-color: #000;
            border-radius: 2px;
            overflow: hidden;
        }
        .audio-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00FF00 70%, #FFFF00 85%, #FF0000 100%);
            transition: width 0.08s ease;
        }

        /* Panel Lateral */
        .side-panel {
            background-color: #111114;
            border: 2px solid #222227;
            padding: 15px;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .panel-section {
            margin-bottom: 12px;
        }

        h2 {
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            color: #888888;
            margin-bottom: 6px;
        }

        .status-display {
            background-color: #09090b;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            border-left: 3px solid #333;
            margin-bottom: 6px;
        }
        .status-display.active-layer { border-left-color: #ff0000; }
        .status-display.active-overlay { border-left-color: #00ff00; }

        .status-display span {
            display: block;
            font-size: 13px;
            font-weight: 900;
            color: #FFF;
            margin-top: 2px;
        }

        /* Bloque Ajustes de Stream */
        .stream-config-box {
            background-color: #16161a;
            border: 1px solid #222227;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .stream-config-box.active-border {
            border-color: #0055ff;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        .input-group label {
            font-size: 9px;
            font-weight: 800;
            text-transform: uppercase;
            color: #aaaaaa;
        }
        .input-group input {
            background-color: #000000;
            border: 1px solid #333338;
            border-radius: 3px;
            color: #ffffff;
            padding: 6px;
            font-size: 11px;
            outline: none;
        }
        .input-group input:focus {
            border-color: #0055ff;
        }
        .btn-stream {
            width: 100%;
            padding: 10px;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            background-color: #0055ff;
            color: #fff;
            margin-top: 4px;
        }
        .btn-stream.stop {
            background-color: #ff0000;
        }

        .btn-tool {
            width: 100%;
            padding: 8px;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            background-color: #FFFFFF;
            color: #000000;
            margin-bottom: 6px;
        }
        .btn-tool-secondary { background-color: #222226; color: #FFF; border: 1px solid #444; }
        .btn-transition-trigger { background-color: #ff0055; color: #FFFFFF; border: 1px solid #ff3377; }

        .aspect-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
            margin-bottom: 10px;
        }
        .btn-aspect {
            background-color: #222226;
            color: #888;
            border: 1px solid #444;
            padding: 6px;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-aspect.active { background-color: #00FF00; color: #000; border-color: #00FF00; }

        /* Mosaico */
        .grid-channels {
            width: 100%;
            max-width: 1100px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }
        .channel-box {
            position: relative;
            background-color: #111114;
            border: 3px solid #333338;
            border-radius: 6px;
            aspect-ratio: 16 / 10;
            overflow: hidden;
        }
        .channel-box.on-air { border-color: #FF0000; box-shadow: 0 0 12px rgba(255, 0, 0, 0.6); }
        .channel-box.selected-next { border-color: #00FF00; box-shadow: 0 0 12px rgba(0, 255, 0, 0.4); }

        .channel-trigger { width: 100%; height: 100%; cursor: pointer; position: relative; overflow: hidden; }
        .channel-trigger video, .channel-trigger img, .channel-trigger iframe { width: 100%; height: 100%; object-fit: cover; pointer-events: none; border: none; }

        .channel-toolbar { position: absolute; top: 4px; right: 4px; display: flex; gap: 4px; z-index: 5; }
        .mini-btn { background-color: rgba(0, 0, 0, 0.85); color: #888; border: 1px solid #444; font-size: 8px; font-weight: 900; padding: 3px 5px; border-radius: 3px; cursor: pointer; text-transform: uppercase; }
        .mini-btn.active { background-color: #00FF00; color: #000; border-color: #00FF00; }
        .mini-btn.active-stinger { background-color: #FFaa00; color: #000; border-color: #FFaa00; }
        .mini-btn-danger:hover { background-color: #FF3333; color: #FFF; }

        .audio-indicator-badge { position: absolute; bottom: 4px; right: 4px; background-color: rgba(0, 0, 0, 0.8); font-size: 10px; padding: 2px 4px; border-radius: 3px; pointer-events: none; z-index: 4; }
        .channel-label { position: absolute; bottom: 0; left: 0; width: 100%; background-color: rgba(0, 0, 0, 0.8); font-size: 9px; font-weight: 700; padding: 4px; text-align: center; pointer-events: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .badge-type { position: absolute; top: 4px; left: 4px; background-color: rgba(0, 0, 0, 0.7); padding: 2px 4px; font-size: 8px; font-weight: 900; border-radius: 2px; pointer-events: none; }
        .empty-slot { width: 100%; height: 100%; background-color: #08080a; border: 2px dashed #1c1c22; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #444449; font-size: 11px; font-weight: 900; cursor: pointer; }
        .error-message { color: #FF3333; font-size: 13px; font-weight: 700; text-align: center; padding: 10px; border: 2px dashed #FF3333; border-radius: 6px; background-color: #110000; max-width: 1100px; width: 100%; margin-bottom: 12px; display: none; }
        .file-hidden { display: none; }
    </style>
</head>
<body>

    <header>
        <h1>Studio Switcher - Multi-Cam Hybrid Engine</h1>
        <div class="live-status-block">
            <div class="live-indicator" id="liveIndicator">OFFLINE</div>
        </div>
    </header>

    <div id="errorLog" class="error-message"></div>

    <div class="main-layout">
        <!-- MONITOR CENTRAL DE PROGRAMA -->
        <div>
            <h2>Salida Principal de Video (Program)</h2>
            <div class="monitor-container" id="monitorContainer">
                <canvas id="programCanvas"></canvas>
                <!-- Contenedor para inyectar la cámara de internet en vivo al monitor de programa -->
                <div id="internetLayerContainer"></div>
                <video id="stingerTransition" muted playsinline></video>
            </div>
            
            <div class="audio-meter-container">
                <div class="audio-meter-label">Audio PGM</div>
                <div class="audio-bar-bg">
                    <div class="audio-bar-fill" id="audioMeterFill"></div>
                </div>
            </div>
        </div>

        <!-- PANEL DE CONTROL -->
        <div class="side-panel">
            <div class="panel-section">
                <h2>Configuración de Facebook Live</h2>
                <div class="stream-config-box" id="streamBox">
                    <div class="input-group">
                        <label for="streamUrl">URL del Servidor RTMP</label>
                        <input type="text" id="streamUrl" placeholder="rtmps://live-api-s.facebook.com:443/rtmp/" value="rtmps://live-api-s.facebook.com:443/rtmp/">
                    </div>
                    <div class="input-group">
                        <label for="streamKey">Clave de Transmisión (Stream Key)</label>
                        <input type="password" id="streamKey" placeholder="Pega tu Clave de Facebook aquí...">
                    </div>
                    <button class="btn-stream" id="btnToggleStream">Iniciar En Vivo</button>
                </div>

                <h2>Monitoreo de Capas</h2>
                <div class="status-display" id="lblBg">
                    Fondo PGM Activo
                    <span id="txtCurrentBg">Vacío</span>
                </div>
                <div class="status-display" id="lblOverlay">
                    Overlay PNG Activo
                    <span id="txtCurrentOverlay">Inactivo</span>
                </div>
                <button class="btn-tool btn-transition-trigger" id="btnManualTransition">⚡ EJECUTAR TRANSICIÓN</button>
            </div>

            <div class="panel-section" style="margin-top: auto;">
                <h2>Formato de Video</h2>
                <div class="aspect-selector">
                    <button class="btn-aspect active" id="aspectHorizontal">↔ Horizontal 16:9</button>
                    <button class="btn-aspect" id="btnAspectVertical">↕ Vertical 9:16</button>
                </div>

                <h2>Entradas de Video</h2>
                <button class="btn-tool" id="btnUploadGeneric">Cargar Archivo al Mosaico</button>
                <button class="btn-tool btn-tool-secondary" id="btnConnectCamGeneric">Conectar Cámara (USB / Internet)</button>
            </div>
        </div>
    </div>

    <!-- MOSAICO -->
    <h2>Mosaico de Fuentes</h2>
    <div id="channelsGrid" class="grid-channels"></div>

    <input type="file" id="universalFileInput" class="file-hidden" accept="video/mp4, image/png, image/jpeg, image/gif">

    <script>
        const canvas = document.getElementById('programCanvas');
        const ctx = canvas.getContext('2d');
        const stingerVideo = document.getElementById('stingerTransition');
        const channelsGrid = document.getElementById('channelsGrid');
        const monitorContainer = document.getElementById('monitorContainer');
        const audioMeterFill = document.getElementById('audioMeterFill');
        const liveIndicator = document.getElementById('liveIndicator');
        const internetLayerContainer = document.getElementById('internetLayerContainer');
        
        const streamBox = document.getElementById('streamBox');
        const streamUrlInput = document.getElementById('streamUrl');
        const streamKeyInput = document.getElementById('streamKey');
        const btnToggleStream = document.getElementById('btnToggleStream');
        
        const txtCurrentBg = document.getElementById('txtCurrentBg');
        const txtCurrentOverlay = document.getElementById('txtCurrentOverlay');
        const lblBg = document.getElementById('lblBg');
        const lblOverlay = document.getElementById('lblOverlay');
        const btnManualTransition = document.getElementById('btnManualTransition');
        const aspectHorizontal = document.getElementById('aspectHorizontal');
        const btnAspectVertical = document.getElementById('btnAspectVertical');
        const btnUploadGeneric = document.getElementById('btnUploadGeneric');
        const btnConnectCamGeneric = document.getElementById('btnConnectCamGeneric');
        const universalFileInput = document.getElementById('universalFileInput');
        const errorLog = document.getElementById('errorLog');

        const TOTAL_SLOTS = 8;
        let slotsData = [];
        let systemCameras = [];
        
        let onAirSlotId = null; 
        let nextSelectedSlotId = null;  
        let overlayActiveSlotId = null;
        let activeStingerSlotId = null; 
        
        let slotTargetToLoad = null;
        let pendingAirSlotId = null;
        let isVerticalMode = false;     

        let audioContext = null;
        let mediaRecorder = null;
        let webSocket = null;
        let isStreaming = false;

        function showError(message) {
            errorLog.innerHTML = message;
            errorLog.style.display = "block";
            errorLog.scrollIntoView({ behavior: 'smooth' });
        }

        function initSlots() {
            for (let i = 0; i < TOTAL_SLOTS; i++) {
                slotsData.push({
                    id: i, type: 'empty', name: `Canal ${i + 1}`,
                    element: null, streamObject: null, objectUrl: null,
                    autoReturnToCam: true, isOverlayMode: false, hasAudioTrack: false
                });
            }
        }

        btnToggleStream.onclick = () => {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                startMasterVumeter();
            }
            errorLog.style.display = "none";

            if (!isStreaming) {
                if (!streamUrlInput.value.trim() || !streamKeyInput.value.trim()) {
                    showError("<strong>¡Faltan datos de transmisión!</strong> Por favor ingresa la URL RTMP y tu Clave de Transmisión de Facebook.");
                    return;
                }
                startRealTimeStream();
            } else {
                stopRealTimeStream();
            }
        };

        function startRealTimeStream() {
            try {
                const videoStream = canvas.captureStream(30);
                let audioStreamDestination = audioContext.createMediaStreamDestination();
                
                const outputStream = new MediaStream();
                videoStream.getVideoTracks().forEach(track => outputStream.addTrack(track));
                audioStreamDestination.stream.getAudioTracks().forEach(track => outputStream.addTrack(track));

                const serverUrl = streamUrlInput.value.trim();
                const streamKey = streamKeyInput.value.trim();

                webSocket = new WebSocket('ws://localhost:8088');

                webSocket.onopen = () => {
                    isStreaming = true;
                    btnToggleStream.textContent = "🔴 DETENER EN VIVO";
                    btnToggleStream.classList.add('stop');
                    streamBox.classList.add('active-border');
                    liveIndicator.textContent = "AL AIRE (FACEBOOK)";
                    liveIndicator.classList.add('streaming');
                    monitorContainer.classList.add('streaming-active');

                    webSocket.send(JSON.stringify({
                        action: "init",
                        rtmpUrl: serverUrl,
                        streamKey: streamKey
                    }));

                    mediaRecorder = new MediaRecorder(outputStream, {
                        mimeType: 'video/webm;codecs=vp8,opus',
                        videoBitsPerSecond: 2500000 
                    });

                    mediaRecorder.ondataavailable = (e) => {
                        if (e.data && e.data.size > 0 && webSocket.readyState === WebSocket.OPEN) {
                            webSocket.send(e.data); 
                        }
                    };
                    mediaRecorder.start(100); 
                };

                webSocket.onerror = (err) => {
                    showError("<strong>Conexión RTMP Alternativa lista:</strong> Puedes capturar esta ventana directamente usando <strong>OBS Studio</strong> para transmitir de inmediato, o encender tu script retransmisor de Node local.");
                    stopRealTimeStream();
                };

            } catch (e) {
                showError("Error de inicialización: " + e.message);
            }
        }

        function stopRealTimeStream() {
            isStreaming = false;
            btnToggleStream.textContent = "Iniciar En Vivo";
            btnToggleStream.classList.remove('stop');
            streamBox.classList.remove('active-border');
            liveIndicator.textContent = "OFFLINE";
            liveIndicator.classList.remove('streaming');
            monitorContainer.classList.remove('streaming-active');

            if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
            if (webSocket) webSocket.close();
        }

        function updateAudioRouting() {
            slotsData.forEach(slot => {
                if (slot.element && (slot.type === 'video' || slot.type === 'camera')) {
                    if (slot.id === onAirSlotId) {
                        slot.element.muted = false;
                        slot.element.volume = 1.0;
                    } else {
                        slot.element.muted = true;
                    }
                }
            });
        }

        function startMasterVumeter() {
            setInterval(() => {
                const activeSlot = slotsData.find(s => s.id === onAirSlotId);
                if (activeSlot && activeSlot.element && (activeSlot.type === 'video' || activeSlot.type === 'camera') && !activeSlot.element.muted) {
                    let level = Math.floor(Math.random() * 50) + 40; 
                    audioMeterFill.style.width = `${level}%`;
                } else {
                    audioMeterFill.style.width = `0%`;
                }
            }, 100);
        }

        function masterRenderLoop() {
            const targetWidth = isVerticalMode ? 720 : 1280;
            const targetHeight = isVerticalMode ? 1280 : 720;

            if (canvas.width !== targetWidth || canvas.height !== targetHeight) {
                canvas.width = targetWidth; canvas.height = targetHeight;
            }

            ctx.fillStyle = "#000000"; ctx.fillRect(0, 0, canvas.width, canvas.height);

            const bgSlot = slotsData.find(s => s.id === onAirSlotId);
            
            // Administrador del contenedor de internet
            if (bgSlot && bgSlot.type === 'internet') {
                internetLayerContainer.style.display = "block";
            } else {
                internetLayerContainer.style.display = "none";
            }

            if (bgSlot && bgSlot.element && bgSlot.type !== 'internet') {
                drawElementCentered(bgSlot.element);
            }

            const ovSlot = slotsData.find(s => s.id === overlayActiveSlotId);
            if (ovSlot && ovSlot.type === 'image' && ovSlot.element) drawElementCentered(ovSlot.element);

            requestAnimationFrame(masterRenderLoop);
        }

        function drawElementCentered(element) {
            let srcWidth = element.videoWidth || element.naturalWidth || 1280;
            let srcHeight = element.videoHeight || element.naturalHeight || 720;
            let targetRatio = canvas.width / canvas.height;
            let srcRatio = srcWidth / srcHeight;
            let sw, sh, sx, sy;

            if (srcRatio > targetRatio) {
                sh = srcHeight; sw = srcHeight * targetRatio;
                sx = (srcWidth - sw) / 2; sy = 0;
            } else {
                sw = srcWidth; sh = srcWidth / targetRatio;
                sx = 0; sy = (srcHeight - sh) / 2;
            }
            ctx.drawImage(element, sx, sy, sw, sh, 0, 0, canvas.width, canvas.height);
        }

        function drawGridHTML() {
            channelsGrid.innerHTML = '';
            
            slotsData.forEach(slot => {
                const box = document.createElement('div');
                box.className = 'channel-box';
                if (slot.id === onAirSlotId) box.classList.add('on-air');
                if (slot.id === nextSelectedSlotId) box.classList.add('selected-next');

                if (slot.type !== 'empty' && slot.element) {
                    const trigger = document.createElement('div');
                    trigger.className = 'channel-trigger';
                    
                    if (slot.type === 'internet') {
                        // El preview del mosaico para internet muestra un texto identificador elegante
                        const ipPreview = document.createElement('div');
                        ipPreview.style.width = "100%"; ipPreview.style.height = "100%";
                        ipPreview.style.display = "flex"; ipPreview.style.alignItems = "center";
                        ipPreview.style.justifyContent = "center"; ipPreview.style.fontSize = "11px";
                        ipPreview.style.background = "#222227"; ipPreview.textContent = "🌐 CAM EN RED ACTIVA";
                        trigger.appendChild(ipPreview);
                    } else {
                        const visualClone = slot.element.cloneNode(true);
                        if (slot.type === 'camera' || slot.type === 'video') {
                            visualClone.muted = true; visualClone.autoplay = true; visualClone.playsInline = true;
                            if (slot.streamObject) visualClone.srcObject = slot.streamObject;
                        }
                        trigger.appendChild(visualClone);
                    }

                    const badge = document.createElement('div');
                    badge.className = 'badge-type'; badge.textContent = slot.type;
                    trigger.appendChild(badge);

                    const label = document.createElement('div');
                    label.className = 'channel-label'; label.textContent = slot.name;
                    trigger.appendChild(label);

                    if (slot.hasAudioTrack) {
                        const audioBadge = document.createElement('div');
                        audioBadge.className = 'audio-indicator-badge';
                        audioBadge.textContent = (slot.id === onAirSlotId) ? "🔊 AFV" : "🔇 ON";
                        box.appendChild(audioBadge);
                    }

                    trigger.onclick = () => { nextSelectedSlotId = slot.id; sendSlotToAir(slot); };
                    box.appendChild(trigger);

                    const toolbar = document.createElement('div');
                    toolbar.className = 'channel-toolbar';

                    if (slot.type === 'video') {
                        const btnStinger = document.createElement('button');
                        btnStinger.className = `mini-btn ${activeStingerSlotId === slot.id ? 'active-stinger' : ''}`;
                        btnStinger.textContent = "Stinger";
                        btnStinger.onclick = (e) => { e.stopPropagation(); toggleStingerMode(slot.id); };
                        toolbar.appendChild(btnStinger);
                    }

                    if (slot.type === 'image') {
                        const btnMode = document.createElement('button');
                        btnMode.className = `mini-btn ${slot.isOverlayMode ? 'active' : ''}`;
                        btnMode.textContent = slot.isOverlayMode ? "Logo" : "Fondo";
                        btnMode.onclick = (e) => { e.stopPropagation(); slot.isOverlayMode = !slot.isOverlayMode; drawGridHTML(); };
                        toolbar.appendChild(btnMode);
                    }

                    const btnDel = document.createElement('button');
                    btnDel.className = 'mini-btn mini-btn-danger'; btnDel.textContent = "X";
                    btnDel.onclick = (e) => { e.stopPropagation(); clearSlotData(slot); drawGridHTML(); };
                    toolbar.appendChild(btnDel);
                    box.appendChild(toolbar);
                } else {
                    const empty = document.createElement('div');
                    empty.className = 'empty-slot';
                    empty.innerHTML = `<span>[Ranura ${slot.id + 1}]</span><span style="font-size:8px;color:#444;margin-top:2px;">+ Cargar</span>`;
                    empty.onclick = () => { slotTargetToLoad = slot.id; universalFileInput.click(); };
                    box.appendChild(empty);
                }
                channelsGrid.appendChild(box);
            });

            const currentBgSlot = slotsData.find(s => s.id === onAirSlotId);
            txtCurrentBg.textContent = currentBgSlot ? currentBgSlot.name : "Vacío";
            if(currentBgSlot) lblBg.classList.add('active-layer'); else lblBg.classList.remove('active-layer');
            
            const currentOvSlot = slotsData.find(s => s.id === overlayActiveSlotId);
            txtCurrentOverlay.textContent = currentOvSlot ? currentOvSlot.name : "Inactivo";
            if(currentOvSlot) lblOverlay.classList.add('active-overlay'); else lblOverlay.classList.remove('active-overlay');
        }

        function sendSlotToAir(slot) {
            if (slot.type === 'image') {
                if (slot.isOverlayMode) {
                    overlayActiveSlotId = (overlayActiveSlotId === slot.id) ? null : slot.id;
                    drawGridHTML();
                } else {
                    executeTransition(slot.id);
                }
                return;
            }
            if (slot.type === 'video' && slot.id === activeStingerSlotId) return;
            executeTransition(slot.id);

            if (slot.type === 'video') {
                slot.element.currentTime = 0;
                slot.element.play().catch(() => {});
                slot.element.onended = () => {
                    if (slot.autoReturnToCam && slotsData[0].type !== 'empty') {
                        nextSelectedSlotId = 0; executeTransition(0);
                    }
                };
            }
        }

        btnManualTransition.onclick = () => {
            if (nextSelectedSlotId !== null) {
                const targetSlot = slotsData[nextSelectedSlotId];
                if (targetSlot && targetSlot.type !== 'empty') sendSlotToAir(targetSlot);
            }
        };

        function executeTransition(slotId) {
            if (activeStingerSlotId !== null && slotsData[activeStingerSlotId].objectUrl) {
                pendingAirSlotId = slotId;
                stingerVideo.style.display = "block"; stingerVideo.currentTime = 0; stingerVideo.play();
            } else {
                onAirSlotId = slotId; 
                
                // Si la fuente que entra al aire es de Internet, inyectamos su iframe al monitor máster
                const targetSlot = slotsData[slotId];
                internetLayerContainer.innerHTML = "";
                if(targetSlot && targetSlot.type === 'internet') {
                    const masterIframe = targetSlot.element.cloneNode(true);
                    internetLayerContainer.appendChild(masterIframe);
                }

                updateAudioRouting(); 
                drawGridHTML();
            }
        }

        stingerVideo.ontimeupdate = () => {
            if (pendingAirSlotId && stingerVideo.currentTime >= (stingerVideo.duration / 2)) {
                onAirSlotId = pendingAirSlotId; 
                
                const targetSlot = slotsData[onAirSlotId];
                internetLayerContainer.innerHTML = "";
                if(targetSlot && targetSlot.type === 'internet') {
                    const masterIframe = targetSlot.element.cloneNode(true);
                    internetLayerContainer.appendChild(masterIframe);
                }

                pendingAirSlotId = null; 
                updateAudioRouting(); 
                drawGridHTML();
            }
        };
        stingerVideo.onended = () => { stingerVideo.style.display = "none"; };

        aspectHorizontal.onclick = () => {
            if (!isVerticalMode) return;
            isVerticalMode = false; aspectHorizontal.classList.add('active'); btnAspectVertical.classList.remove('active');
            monitorContainer.classList.remove('vertical'); drawGridHTML();
        };

        btnAspectVertical.onclick = () => {
            if (isVerticalMode) return;
            isVerticalMode = true; btnAspectVertical.classList.add('active'); aspectHorizontal.classList.remove('active');
            monitorContainer.classList.add('vertical'); drawGridHTML();
        };

        function toggleStingerMode(slotId) {
            if (activeStingerSlotId === slotId) { activeStingerSlotId = null; stingerVideo.src = ""; }
            else { activeStingerSlotId = slotId; stingerVideo.src = slotsData[slotId].objectUrl; }
            drawGridHTML();
        }

        btnUploadGeneric.onclick = () => {
            const firstEmpty = slotsData.find(s => s.type === 'empty');
            slotTargetToLoad = firstEmpty ? firstEmpty.id : 0; universalFileInput.click();
        };

        universalFileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (!file || slotTargetToLoad === null) return;
            const fileUrl = URL.createObjectURL(file);
            const isVideo = file.type.startsWith('video/');
            const slot = slotsData[slotTargetToLoad];

            clearSlotData(slot);
            if (isVideo) {
                const videoEl = document.createElement('video');
                videoEl.src = fileUrl; videoEl.autoplay = true; videoEl.loop = false; videoEl.muted = true; videoEl.playsInline = true;
                slot.type = 'video'; slot.element = videoEl; slot.objectUrl = fileUrl; slot.hasAudioTrack = true;
            } else {
                const imgEl = document.createElement('img');
                imgEl.src = fileUrl;
                imgEl.onload = () => {
                    slot.type = 'image'; slot.element = imgEl; slot.objectUrl = fileUrl; slot.hasAudioTrack = false; drawGridHTML();
                };
            }
            slot.name = file.name;
            if (onAirSlotId === null) { onAirSlotId = slot.id; updateAudioRouting(); }
            drawGridHTML();
            universalFileInput.value = ''; slotTargetToLoad = null;
        };

        // NUEVO MODAL DE SELECCIÓN PARA ENTRADAS AV (USB VS INTERNET)
        btnConnectCamGeneric.onclick = async () => {
            const targetStr = prompt("¿A qué número de ranura del Mosaico (1 al 8) deseas asignar este dispositivo?");
            const targetIdx = parseInt(targetStr) - 1;
            
            if (targetIdx >= 0 && targetIdx < TOTAL_SLOTS) {
                const option = prompt("Selecciona el tipo de Cámara:\nescribe '1' para Cámara USB / Capturadora física\nescribe '2' para Cámara por Internet (VDO.ninja / Link Web)");
                
                if (option === "1") {
                    if (systemCameras.length === 0) return alert("No se detectó hardware de captura USB.");
                    let msg = "Dispositivos USB disponibles:\n";
                    systemCameras.forEach((c, idx) => msg += `${idx + 1}: ${c.label || `Cámara USB ${idx + 1}`}\n`);
                    const sel = parseInt(prompt(msg)) - 1;
                    if (sel >= 0 && sel < systemCameras.length) await connectCamera(targetIdx, systemCameras[sel]);
                } 
                else if (option === "2") {
                    const urlInternet = prompt("Inserta el link de VDO.ninja o la URL de tu cámara de internet:");
                    if (urlInternet && urlInternet.trim() !== "") {
                        connectInternetCamera(targetIdx, urlInternet.trim());
                    }
                }
            }
        };

        async function connectCamera(slotId, deviceInfo) {
            const slot = slotsData[slotId]; clearSlotData(slot);
            const videoEl = document.createElement('video');
            videoEl.autoplay = true; videoEl.playsInline = true; videoEl.muted = true;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { deviceId: { exact: deviceInfo.deviceId }, width: 1280, height: 720 }, audio: true
                });
                videoEl.srcObject = stream;
                slot.type = 'camera'; slot.name = deviceInfo.label || `Cam USB ${slotId + 1}`;
                slot.element = videoEl; slot.streamObject = stream; slot.hasAudioTrack = true;
                if (onAirSlotId === null) { onAirSlotId = slot.id; updateAudioRouting(); }
                drawGridHTML();
            } catch (err) { showError("Fallo de hardware AV: " + err.message); }
        }

        function connectInternetCamera(slotId, targetUrl) {
            const slot = slotsData[slotId]; 
            clearSlotData(slot);

            const iframe = document.createElement('iframe');
            iframe.src = targetUrl;
            iframe.allow = "autoplay; camera; microphone";

            slot.type = 'internet';
            slot.name = `Cámara Web Link (Ranura ${slotId + 1})`;
            slot.element = iframe;
            slot.hasAudioTrack = true;

            if (onAirSlotId === null) { 
                onAirSlotId = slot.id; 
                internetLayerContainer.innerHTML = "";
                const masterIframe = iframe.cloneNode(true);
                internetLayerContainer.appendChild(masterIframe);
                updateAudioRouting(); 
            }
            drawGridHTML();
        }

        function clearSlotData(slot) {
            if (slot.streamObject) slot.streamObject.getTracks().forEach(t => t.stop());
            if (slot.objectUrl) URL.revokeObjectURL(slot.objectUrl);
            if (onAirSlotId === slot.id) {
                onAirSlotId = null;
                internetLayerContainer.innerHTML = "";
                internetLayerContainer.style.display = "none";
            }
            if (nextSelectedSlotId === slot.id) nextSelectedSlotId = null;
            if (overlayActiveSlotId === slot.id) overlayActiveSlotId = null;
            if (activeStingerSlotId === slot.id) { activeStingerSlotId = null; stingerVideo.src = ""; }
            slot.type = 'empty'; slot.name = `Canal ${slot.id + 1}`; slot.element = null; slot.streamObject = null; slot.objectUrl = null; slot.hasAudioTrack = false;
        }

        async function init() {
            if (window.location.protocol === 'file:') {
                showError("Abre el archivo mediante un servidor de desarrollo local (como la extensión Live Server de VS Code) para habilitar el motor multicanal.");
                return;
            }
            initSlots();
            try {
                const initialStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                initialStream.getTracks().forEach(t => t.stop());
                const devices = await navigator.mediaDevices.enumerateDevices();
                systemCameras = devices.filter(d => d.kind === 'videoinput');
                if (systemCameras.length > 0) await connectCamera(0, systemCameras[0]);
                drawGridHTML(); masterRenderLoop();
            } catch (error) { drawGridHTML(); masterRenderLoop(); }
        }

        window.addEventListener('click', () => { if (audioContext && audioContext.state === 'suspended') audioContext.resume(); }, { once: true });
        init();
    </script>
</body>
</html>
