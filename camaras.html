<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudio de Transmisión Profesional</title>
    
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: #050508;
            color: #FFFFFF;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-y: auto;
        }

        header {
            width: 100%;
            max-width: 1000px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #FFFFFF;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 22px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .live-indicator {
            background-color: #FF0000;
            color: #FFFFFF;
            padding: 5px 12px;
            font-weight: 900;
            font-size: 12px;
            border-radius: 4px;
            text-transform: uppercase;
            animation: blink 1.5s infinite;
        }

        @keyframes blink { 50% { opacity: 0.3; } }

        h2 {
            font-size: 13px;
            font-weight: 900;
            text-transform: uppercase;
            margin: 20px 0 10px 0;
            letter-spacing: 0.5px;
            width: 100%;
            max-width: 1000px;
            color: #AAAAAA;
        }

        /* Layout de la Pantalla Principal */
        .main-studio-layout {
            display: grid;
            grid-template-columns: 3fr 1fr;
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }

        .program-monitor {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #000000;
            border: 4px solid #FF0000;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #stingerTransition {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 10;
            display: none;
            pointer-events: none;
        }

        /* Panel de Configuración Lateral */
        .side-panel {
            background-color: #111113;
            border: 2px solid #222226;
            padding: 15px;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .control-group label {
            display: block;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 6px;
            color: #888888;
        }

        .btn-action {
            width: 100%;
            padding: 10px;
            font-size: 12px;
            font-weight: 900;
            text-transform: uppercase;
            border-radius: 4px;
            cursor: pointer;
            border: none;
        }
        .btn-add { background-color: #FFFFFF; color: #000000; }
        .btn-add:active { background-color: #CCCCCC; }

        /* Mosaico Fijo 4x2 para Video/Cámaras (BACKGROUNDS) */
        .grid-video-channels {
            width: 100%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .channel-box {
            position: relative;
            background-color: #111113;
            border: 3px solid #333338;
            border-radius: 6px;
            aspect-ratio: 4 / 3;
            overflow: hidden;
            cursor: pointer;
        }

        .channel-box.active { border-color: #FF0000; }

        .channel-box video, .channel-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }

        .channel-label {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            font-size: 9px;
            font-weight: 700;
            padding: 4px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-transform: uppercase;
        }

        .empty-slot {
            background-color: #08080a;
            border: 3px dashed #1c1c22;
            border-radius: 6px;
            aspect-ratio: 4 / 3;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333338;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
        }

        /* Banco de Imágenes Dinámico (BOTTOM ROW) */
        .image-bank-container {
            width: 100%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px;
            margin-bottom: 40px;
        }

        .image-card {
            background-color: #111113;
            border: 2px solid #222226;
            border-radius: 6px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .image-preview-box {
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #000000;
            border-radius: 4px;
            overflow: hidden;
        }

        .image-preview-box img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .image-card-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }

        .btn-card {
            padding: 8px 4px;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            border: 2px solid #FFFFFF;
            border-radius: 4px;
            cursor: pointer;
            background-color: transparent;
            color: #FFFFFF;
            text-align: center;
        }

        .btn-card.active-overlay {
            background-color: #00FF00;
            color: #000000;
            border-color: #00FF00;
        }

        .btn-card:active { opacity: 0.7; }

        .btn-delete-asset {
            background-color: #221111;
            color: #FF3333;
            border-color: #FF3333;
            grid-column: span 2;
        }
        .btn-delete-asset:hover { background-color: #FF3333; color: #FFFFFF; }

        .error-message {
            color: #FF3333;
            font-size: 14px;
            font-weight: 700;
            text-align: center;
            padding: 12px;
            border: 2px dashed #FF3333;
            border-radius: 6px;
            background-color: #110000;
            max-width: 1000px;
            width: 100%;
            margin-bottom: 15px;
            display: none;
        }

        .file-hidden { display: none; }
    </style>
</head>
<body>

    <header>
        <h1>Master Switcher Studio</h1>
        <div class="live-indicator">● EN AIRE</div>
    </header>

    <div id="errorLog" class="error-message"></div>

    <div class="main-studio-layout">
        <div>
            <h2>Monitor de Programa (Salida Combinada)</h2>
            <div class="program-monitor">
                <canvas id="programCanvas"></canvas>
                <video id="stingerTransition" muted playsinline></video>
            </div>
        </div>

        <div class="side-panel">
            <h2>Efectos de Entrada</h2>
            <div class="control-group">
                <label>Transición Stinger (MP4)</label>
                <input type="file" id="stingerInput" accept="video/mp4">
            </div>
            <div class="control-group" style="margin-top: auto;">
                <label>Importar Recursos</label>
                <button class="btn-action btn-add" id="importVideoBtn">+ Cargar Video/Cámara</button>
                <button class="btn-action btn-add" id="importImageBtn" style="margin-top: 8px; background-color: #222226; color: #FFFFFF; border: 2px solid #44444c;">+ Cargar Imagen</button>
            </div>
        </div>
    </div>

    <h2>Mosaico de Fondo / Transmisión de Video (Fijo 4x2)</h2>
    <div id="videoGrid" class="grid-video-channels">
        </div>

    <h2>Banco de Imágenes & Capas Superpuestas (Overlays)</h2>
    <div id="imageBank" class="image-bank-container">
        </div>

    <input type="file" id="videoFileInput" class="file-hidden" accept="video/mp4, image/gif">
    <input type="file" id="imageFileInput" class="file-hidden" accept="image/png, image/jpeg, image/gif">

    <script>
        const canvas = document.getElementById('programCanvas');
        const ctx = canvas.getContext('2d');
        const stingerVideo = document.getElementById('stingerTransition');
        const videoGrid = document.getElementById('videoGrid');
        const imageBank = document.getElementById('imageBank');
        
        const importVideoBtn = document.getElementById('importVideoBtn');
        const importImageBtn = document.getElementById('importImageBtn');
        const videoFileInput = document.getElementById('videoFileInput');
        const imageFileInput = document.getElementById('imageFileInput');
        const stingerInput = document.getElementById('stingerInput');
        const errorLog = document.getElementById('errorLog');

        const MAX_VIDEO_SLOTS = 8; // Matriz 4x2 estricta
        let videoChannels = [];    // Capacidad para 8 fondos de video/cámara
        let imageAssets = [];      // Banco libre de imágenes
        
        let systemCameras = [];
        let activeVideoChannelId = null;
        let assetCounter = 0;

        let stingerSrcUrl = null;
        let pendingChannelId = null;
        let activeOverlayAssetId = null; // ID de la imagen activa en superposición

        function showError(message) {
            errorLog.innerHTML = message;
            errorLog.style.display = "block";
        }

        // BUCLE DE RENDERIZADO DEL MASTER CANVAS (60 FPS)
        function masterRenderLoop() {
            ctx.fillStyle = "#000000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 1. Dibujar la fuente de video de fondo activa (Cámara, Video o GIF)
            const activeChannel = videoChannels.find(c => c.id === activeVideoChannelId);
            if (activeChannel && activeChannel.element) {
                let srcWidth = activeChannel.element.videoWidth || activeChannel.element.naturalWidth || 1280;
                let srcHeight = activeChannel.element.videoHeight || activeChannel.element.naturalHeight || 720;
                
                if (canvas.width !== srcWidth) {
                    canvas.width = srcWidth;
                    canvas.height = srcHeight;
                }
                ctx.drawImage(activeChannel.element, 0, 0, canvas.width, canvas.height);
            }

            // 2. Dibujar la Capa Superior / Overlay (Imagen Conmutada)
            const activeOverlay = imageAssets.find(img => img.id === activeOverlayAssetId);
            if (activeOverlay && activeOverlay.element) {
                ctx.drawImage(activeOverlay.element, 0, 0, canvas.width, canvas.height);
            }

            requestAnimationFrame(masterRenderLoop);
        }

        // CONTROL DE SELECCIÓN CON TRANSICIÓN (STINGER)
        function programVideoChannel(channelId) {
            if (stingerSrcUrl) {
                pendingChannelId = channelId;
                stingerVideo.style.display = "block";
                stingerVideo.currentTime = 0;
                stingerVideo.play();
            } else {
                executeVideoSwitch(channelId);
            }
        }

        function executeVideoSwitch(channelId) {
            activeVideoChannelId = channelId;
            document.querySelectorAll('.channel-box').forEach(box => {
                box.classList.toggle('active', box.dataset.id === channelId);
            });
        }

        stingerVideo.ontimeupdate = () => {
            if (pendingChannelId && stingerVideo.currentTime >= (stingerVideo.duration / 2)) {
                executeVideoSwitch(pendingChannelId);
                pendingChannelId = null;
            }
        };
        stingerVideo.onended = () => { stingerVideo.style.display = "none"; };

        // REDIBUJAR LA TABLA FIJA DE VIDEO 4x2
        function renderVideoGridHtml() {
            videoGrid.innerHTML = '';
            for (let i = 0; i < MAX_VIDEO_SLOTS; i++) {
                if (i < videoChannels.length) {
                    const channel = videoChannels[i];
                    
                    const box = document.createElement('div');
                    box.className = `channel-box ${channel.id === activeVideoChannelId ? 'active' : ''}`;
                    box.dataset.id = channel.id;

                    // Clonar o referenciar el elemento visual para mostrarlo en miniatura
                    const visualClone = channel.element.cloneNode(true);
                    if (channel.type === 'camera' || channel.type === 'video') {
                        visualClone.muted = true;
                        visualClone.autoplay = true;
                        visualClone.playsInline = true;
                        // Volver a enlazar el stream físico si es cámara
                        if (channel.streamObject) visualClone.srcObject = channel.streamObject;
                    }

                    const label = document.createElement('div');
                    label.className = 'channel-label';
                    label.textContent = channel.name;

                    box.appendChild(visualClone);
                    box.appendChild(label);
                    videoGrid.appendChild(box);

                    box.onclick = () => programVideoChannel(channel.id);
                } else {
                    const emptySlot = document.createElement('div');
                    emptySlot.className = 'empty-slot';
                    emptySlot.textContent = "Línea Vacía";
                    videoGrid.appendChild(emptySlot);
                }
            }
        }

        // REDIBUJAR EL BANCO DE IMÁGENES ABAJO
        function renderImageBankHtml() {
            imageBank.innerHTML = '';
            imageAssets.forEach(asset => {
                const card = document.createElement('div');
                card.className = 'image-card';

                const previewBox = document.createElement('div');
                previewBox.className = 'image-preview-box';
                const imgClone = asset.element.cloneNode();
                previewBox.appendChild(imgClone);

                const actions = document.createElement('div');
                actions.className = 'image-card-actions';

                // Botón 1: Enviar como Fondo de Programa directo
                const btnBackground = document.createElement('button');
                btnBackground.className = 'btn-card';
                btnBackground.textContent = "Fondo PGM";
                btnBackground.onclick = () => {
                    // Agregamos de manera temporal o permanente esta imagen al Switcher principal si hay espacio
                    pushAsVideoChannel(asset.name, asset.element, 'image', asset.objectUrl);
                };

                // Botón 2: Superponer / Quitar Overlay
                const btnOverlay = document.createElement('button');
                btnOverlay.className = `btn-card ${asset.id === activeOverlayAssetId ? 'active-overlay' : ''}`;
                btnOverlay.textContent = asset.id === activeOverlayAssetId ? "Quit Overlay" : "Superponer";
                btnOverlay.onclick = () => {
                    if (activeOverlayAssetId === asset.id) {
                        activeOverlayAssetId = null; // Apagar capa
                    } else {
                        activeOverlayAssetId = asset.id; // Encender capa
                    }
                    renderImageBankHtml();
                };

                // Botón 3: Eliminar del banco de recursos
                const btnDelete = document.createElement('button');
                btnDelete.className = 'btn-card btn-delete-asset';
                btnDelete.textContent = "Eliminar Recurso";
                btnDelete.onclick = () => removeImageAsset(asset.id);

                actions.appendChild(btnBackground);
                actions.appendChild(btnOverlay);
                actions.appendChild(btnDelete);

                card.appendChild(previewBox);
                card.appendChild(actions);
                imageBank.appendChild(card);
            });
        }

        // FUNCIONES DE CONTROL DE ARCHIVOS Y RECURSOS
        importVideoBtn.onclick = () => {
            if (videoChannels.length >= MAX_VIDEO_SLOTS) {
                alert("La matriz de video 4x2 está llena. Elimina un video del mosaico si deseas agregar otro.");
                return;
            }
            const mode = prompt("Escribe 'camara' para añadir hardware en vivo o 'archivo' para cargar un clip MP4/GIF:").toLowerCase().trim();
            if (mode === 'camara') {
                if (systemCameras.length === 0) return alert("Sin cámaras.");
                let msg = "Elige la cámara:\n";
                systemCameras.forEach((c, i) => msg += `${i+1}: ${c.label || `Cámara ${i+1}`}\n`);
                const sel = parseInt(prompt(msg)) - 1;
                if (sel >= 0 && sel < systemCameras.length) createCameraSource(systemCameras[sel]);
            } else if (mode === 'archivo') {
                videoFileInput.click();
            }
        };

        importImageBtn.onclick = () => imageFileInput.click();

        // Registrar Cámara Físicamente en la Tabla de Canales
        async function createCameraSource(deviceInfo) {
            assetCounter++;
            const id = "cam_" + assetCounter;
            const videoEl = document.createElement('video');
            videoEl.autoplay = true;
            videoEl.playsInline = true;
            videoEl.muted = true;

            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { deviceId: { exact: deviceInfo.deviceId }, width: 1280, height: 720 }
                });
                videoEl.srcObject = stream;
                
                videoChannels.push({
                    id: id,
                    type: 'camera',
                    name: deviceInfo.label || `Cámara ${videoChannels.length + 1}`,
                    element: videoEl,
                    streamObject: stream
                });

                if (!activeVideoChannelId) activeVideoChannelId = id;
                renderVideoGridHtml();
            } catch (err) {
                showError("Hardware bloqueado: " + err.message);
            }
        }

        // Registrar Archivo MP4 de Video en la Tabla de Canales
        videoFileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            assetCounter++;
            const id = "vid_" + assetCounter;
            const fileUrl = URL.createObjectURL(file);

            const videoEl = document.createElement('video');
            videoEl.src = fileUrl;
            videoEl.autoplay = true;
            videoEl.loop = true;
            videoEl.muted = true;
            videoEl.playsInline = true;

            videoChannels.push({
                id: id,
                type: 'video',
                name: file.name,
                element: videoEl,
                objectUrl: fileUrl
            });

            if (!activeVideoChannelId) activeVideoChannelId = id;
            renderVideoGridHtml();
            videoFileInput.value = '';
        };

        // Inyectar una imagen estática al Switcher de video si se presiona "Fondo PGM"
        function pushAsVideoChannel(name, imgElement, type, url) {
            if (videoChannels.length >= MAX_VIDEO_SLOTS) {
                // Sacamos la última si se excede para dar espacio
                const discarded = videoChannels.pop();
                if (discarded.streamObject) discarded.streamObject.getTracks().forEach(t => t.stop());
            }
            assetCounter++;
            const id = "img_bg_" + assetCounter;

            videoChannels.push({
                id: id,
                type: 'image',
                name: "[Fondo] " + name,
                element: imgElement,
                objectUrl: url
            });

            programVideoChannel(id);
            renderVideoGridHtml();
        }

        // Cargar imágenes al Banco Multimedia Inferior
        imageFileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            assetCounter++;
            const id = "asset_img_" + assetCounter;
            const fileUrl = URL.createObjectURL(file);

            const imgEl = document.createElement('img');
            imgEl.src = fileUrl;

            imgEl.onload = () => {
                imageAssets.push({
                    id: id,
                    name: file.name,
                    element: imgEl,
                    objectUrl: fileUrl
                });
                renderImageBankHtml();
            };
            imageFileInput.value = '';
        };

        function removeImageAsset(id) {
            const idx = imageAssets.findIndex(a => a.id === id);
            if (idx !== -1) {
                URL.revokeObjectURL(imageAssets[idx].objectUrl);
                imageAssets.splice(idx, 1);
            }
            if (activeOverlayAssetId === id) activeOverlayAssetId = null;
            renderImageBankHtml();
        }

        // Carga de Stinger
        stingerInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                if (stingerSrcUrl) URL.revokeObjectURL(stingerSrcUrl);
                stingerSrcUrl = URL.createObjectURL(file);
                stingerVideo.src = stingerSrcUrl;
            }
        };

        // INICIALIZACIÓN
        async function init() {
            if (window.location.protocol === 'file:') {
                showError("<strong>¡Bloqueo de Seguridad!</strong> Para mezclar capas gráficas complejas necesitas un servidor local como Live Server en VS Code.");
                return;
            }

            try {
                const initialStream = await navigator.mediaDevices.getUserMedia({ video: true });
                initialStream.getTracks().forEach(track => track.stop());

                const devices = await navigator.mediaDevices.enumerateDevices();
                systemCameras = devices.filter(d => d.kind === 'videoinput');

                // Auto-cargar la primera cámara por defecto en el Slot 1
                if (systemCameras.length > 0) {
                    await createCameraSource(systemCameras[0]);
                } else {
                    renderVideoGridHtml();
                }

                masterRenderLoop();
            } catch (error) {
                showError("Sin acceso al hardware de captura de video.");
                renderVideoGridHtml();
            }
        }

        init();
    </script>
</body>
</html>
