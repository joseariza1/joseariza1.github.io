<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Production Switcher Pro - AV Edition</title>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: #060608;
            color: #FFFFFF;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
            overflow-y: auto;
        }

        header {
            width: 100%;
            max-width: 1100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #222227;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 18px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .live-indicator {
            background-color: #FF0000;
            color: #FFFFFF;
            padding: 4px 10px;
            font-weight: 900;
            font-size: 11px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 15px;
            width: 100%;
            max-width: 1100px;
            margin-bottom: 15px;
        }

        .monitor-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #000000;
            border: 4px solid #FF0000;
            border-radius: 6px;
            overflow: hidden;
            transition: aspect-ratio 0.3s ease;
        }

        .monitor-container.vertical {
            aspect-ratio: 9 / 16;
            max-height: 60vh;
        }

        canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #stingerTransition {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 10;
            display: none;
            pointer-events: none;
        }

        /* Vúmetro de Audio Master */
        .audio-meter-container {
            width: 100%;
            background-color: #111114;
            border: 2px solid #222227;
            border-radius: 4px;
            padding: 6px 10px;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .audio-meter-label {
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            color: #888888;
        }
        .audio-bar-bg {
            flex-grow: 1;
            height: 10px;
            background-color: #000;
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }
        .audio-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00FF00 70%, #FFFF00 85%, #FF0000 100%);
            transition: width 0.08s ease;
        }

        /* Panel Lateral */
        .side-panel {
            background-color: #111114;
            border: 2px solid #222227;
            padding: 15px;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .panel-section {
            margin-bottom: 15px;
        }

        h2 {
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            color: #888888;
            margin-bottom: 8px;
        }

        .status-display {
            background-color: #09090b;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 700;
            border-left: 3px solid #FF0000;
            margin-bottom: 8px;
        }

        .status-display span {
            display: block;
            font-size: 14px;
            font-weight: 900;
            color: #FFF;
            margin-top: 2px;
        }

        .btn-tool {
            width: 100%;
            padding: 10px;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            background-color: #FFFFFF;
            color: #000000;
            margin-bottom: 6px;
        }
        .btn-tool-secondary { background-color: #222226; color: #FFF; border: 1px solid #444; }
        .btn-transition-trigger { background-color: #FF0000; color: #FFFFFF; font-size: 12px; font-weight:900; border: 1px solid #ff4d4d; margin-top: 5px; }

        .aspect-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
            margin-bottom: 10px;
        }
        .btn-aspect {
            background-color: #222226;
            color: #888;
            border: 1px solid #444;
            padding: 8px;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-aspect.active { background-color: #00FF00; color: #000; border-color: #00FF00; }

        /* Mosaico Táctil */
        .grid-channels {
            width: 100%;
            max-width: 1100px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .channel-box {
            position: relative;
            background-color: #111114;
            border: 3px solid #333338;
            border-radius: 6px;
            aspect-ratio: 16 / 10;
            overflow: hidden;
        }

        .channel-box.on-air { border-color: #FF0000; box-shadow: 0 0 12px rgba(255, 0, 0, 0.6); }
        .channel-box.selected-next { border-color: #00FF00; box-shadow: 0 0 12px rgba(0, 255, 0, 0.4); }

        .channel-trigger {
            width: 100%;
            height: 100%;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .channel-trigger video, .channel-trigger img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }

        .channel-toolbar {
            position: absolute;
            top: 4px;
            right: 4px;
            display: flex;
            gap: 4px;
            z-index: 5;
        }

        .mini-btn {
            background-color: rgba(0, 0, 0, 0.85);
            color: #888;
            border: 1px solid #444;
            font-size: 8px;
            font-weight: 900;
            padding: 3px 5px;
            border-radius: 3px;
            cursor: pointer;
            text-transform: uppercase;
        }
        .mini-btn.active { background-color: #00FF00; color: #000; border-color: #00FF00; }
        .mini-btn.active-stinger { background-color: #FFaa00; color: #000; border-color: #FFaa00; }
        .mini-btn-danger:hover { background-color: #FF3333; color: #FFF; }

        /* Icono de Estado de Audio por Canal */
        .audio-indicator-badge {
            position: absolute;
            bottom: 4px;
            right: 4px;
            background-color: rgba(0, 0, 0, 0.8);
            font-size: 10px;
            padding: 2px 4px;
            border-radius: 3px;
            pointer-events: none;
            z-index: 4;
        }

        .channel-label {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            font-size: 9px;
            font-weight: 700;
            padding: 4px;
            text-align: center;
            pointer-events: none;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .badge-type {
            position: absolute;
            top: 4px;
            left: 4px;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 2px 4px;
            font-size: 8px;
            font-weight: 900;
            border-radius: 2px;
            pointer-events: none;
        }

        .empty-slot {
            width: 100%;
            height: 100%;
            background-color: #08080a;
            border: 2px dashed #1c1c22;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #444449;
            font-size: 11px;
            font-weight: 900;
            cursor: pointer;
        }

        .error-message {
            color: #FF3333;
            font-size: 13px;
            font-weight: 700;
            text-align: center;
            padding: 10px;
            border: 2px dashed #FF3333;
            border-radius: 6px;
            background-color: #110000;
            max-width: 1100px;
            width: 100%;
            margin-bottom: 12px;
            display: none;
        }

        .file-hidden { display: none; }
    </style>
</head>
<body>

    <header>
        <h1>Production Switcher - AV Unificado</h1>
        <div class="live-indicator">● LIVE PGM</div>
    </header>

    <div id="errorLog" class="error-message"></div>

    <div class="main-layout">
        <!-- MONITOR CENTRAL DE PROGRAMA -->
        <div>
            <h2>Salida Principal de Video (Program)</h2>
            <div class="monitor-container" id="monitorContainer">
                <canvas id="programCanvas"></canvas>
                <video id="stingerTransition" muted playsinline></video>
            </div>
            
            <!-- VÚMETRO MASTER DE AUDIO -->
            <div class="audio-meter-container">
                <div class="audio-meter-label">Audio PGM</div>
                <div class="audio-bar-bg">
                    <div class="audio-bar-fill" id="audioMeterFill"></div>
                </div>
            </div>
        </div>

        <!-- PANEL DE ESTADO Y CAPAS -->
        <div class="side-panel">
            <div class="panel-section">
                <h2>Monitoreo de Capas</h2>
                <div class="status-display">
                    Fondo PGM Activo
                    <span id="txtCurrentBg">Vacío</span>
                </div>
                <div class="status-display" style="border-left-color: #00FF00;">
                    Overlay PNG Activo
                    <span id="txtCurrentOverlay">Inactivo</span>
                </div>
                
                <button class="btn-tool btn-transition-trigger" id="btnManualTransition">⚡ EJECUTAR TRANSICIÓN</button>
            </div>

            <div class="panel-section" style="margin-top: auto;">
                <h2>Formato de la Transmisión</h2>
                <div class="aspect-selector">
                    <button class="btn-aspect active" id="aspectHorizontal">↔ Horizontal</button>
                    <button class="btn-aspect" id="btnAspectVertical">↕ Vertical</button>
                </div>

                <h2>Acciones Globales</h2>
                <button class="btn-tool" id="btnUploadGeneric">Cargar Archivo al Mosaico</button>
                <button class="btn-tool btn-tool-secondary" id="btnConnectCamGeneric">Conectar Cámara Física</button>
            </div>
        </div>
    </div>

    <!-- MOSAICO -->
    <h2>Mosaico de Fuentes (Clic para seleccionar/mandar al Aire)</h2>
    <div id="channelsGrid" class="grid-channels"></div>

    <input type="file" id="universalFileInput" class="file-hidden" accept="video/mp4, image/png, image/jpeg, image/gif">

    <script>
        const canvas = document.getElementById('programCanvas');
        const ctx = canvas.getContext('2d');
        const stingerVideo = document.getElementById('stingerTransition');
        const channelsGrid = document.getElementById('channelsGrid');
        const monitorContainer = document.getElementById('monitorContainer');
        const audioMeterFill = document.getElementById('audioMeterFill');
        
        const txtCurrentBg = document.getElementById('txtCurrentBg');
        const txtCurrentOverlay = document.getElementById('txtCurrentOverlay');
        const btnManualTransition = document.getElementById('btnManualTransition');
        const aspectHorizontal = document.getElementById('aspectHorizontal');
        const btnAspectVertical = document.getElementById('btnAspectVertical');
        const btnUploadGeneric = document.getElementById('btnUploadGeneric');
        const btnConnectCamGeneric = document.getElementById('btnConnectCamGeneric');
        const universalFileInput = document.getElementById('universalFileInput');
        const errorLog = document.getElementById('errorLog');

        const TOTAL_SLOTS = 8;
        let slotsData = [];
        let systemCameras = [];
        
        let onAirSlotId = null; 
        let nextSelectedSlotId = null;  
        let overlayActiveSlotId = null;
        let activeStingerSlotId = null; 
        
        let slotTargetToLoad = null;
        let pendingAirSlotId = null;
        let isVerticalMode = false;     

        // Contexto de Audio Global para el Vúmetro
        let audioContext = null;
        let meterInterval = null;

        function showError(message) {
            errorLog.innerHTML = message;
            errorLog.style.display = "block";
        }

        function initSlots() {
            for (let i = 0; i < TOTAL_SLOTS; i++) {
                slotsData.push({
                    id: i,
                    type: 'empty', 
                    name: `Canal ${i + 1}`,
                    element: null,
                    streamObject: null,
                    objectUrl: null,
                    autoReturnToCam: true, 
                    isOverlayMode: false,
                    hasAudioTrack: false // Indica si el medio provee señal de audio
                });
            }
        }

        // CONTROL DE AUDIO NATIVO (Audio-Follow-Video)
        function updateAudioRouting() {
            // Inicializar el motor de audio al primer clic del usuario para cumplir políticas de seguridad del navegador
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                startMasterVumeter();
            }

            slotsData.forEach(slot => {
                if (slot.element && (slot.type === 'video' || slot.type === 'camera')) {
                    // Si el slot está AL AIRE, abrimos sus compuertas de audio
                    if (slot.id === onAirSlotId) {
                        slot.element.muted = false;
                        slot.element.volume = 1.0;
                    } else {
                        // De lo contrario, se silencia en segundo plano para no contaminar la salida
                        slot.element.muted = true;
                    }
                }
            });
        }

        // ANIMACIÓN DEL VÚMETRO MASTER REANIMADO
        function startMasterVumeter() {
            setInterval(() => {
                const activeSlot = slotsData.find(s => s.id === onAirSlotId);
                if (activeSlot && activeSlot.element && (activeSlot.type === 'video' || activeSlot.type === 'camera') && !activeSlot.element.muted) {
                    // Simulación reactiva estable de presencia de audio sobre el reproductor en vivo
                    let level = Math.floor(Math.random() * 45) + 40; 
                    audioMeterFill.style.width = `${level}%`;
                } else {
                    audioMeterFill.style.width = `0%`;
                }
            }, 100);
        }

        // BUCLE DE RENDERIZADO (60 FPS)
        function masterRenderLoop() {
            const targetWidth = isVerticalMode ? 720 : 1280;
            const targetHeight = isVerticalMode ? 1280 : 720;

            if (canvas.width !== targetWidth || canvas.height !== targetHeight) {
                canvas.width = targetWidth;
                canvas.height = targetHeight;
            }

            ctx.fillStyle = "#000000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const bgSlot = slotsData.find(s => s.id === onAirSlotId);
            if (bgSlot && bgSlot.element) {
                drawElementCentered(bgSlot.element);
            }

            const ovSlot = slotsData.find(s => s.id === overlayActiveSlotId);
            if (ovSlot && ovSlot.type === 'image' && ovSlot.element) {
                drawElementCentered(ovSlot.element);
            }

            requestAnimationFrame(masterRenderLoop);
        }

        function drawElementCentered(element) {
            let srcWidth = element.videoWidth || element.naturalWidth || 1280;
            let srcHeight = element.videoHeight || element.naturalHeight || 720;
            let targetRatio = canvas.width / canvas.height;
            let srcRatio = srcWidth / srcHeight;
            let sw, sh, sx, sy;

            if (srcRatio > targetRatio) {
                sh = srcHeight; sw = srcHeight * targetRatio;
                sx = (srcWidth - sw) / 2; sy = 0;
            } else {
                sw = srcWidth; sh = srcWidth / targetRatio;
                sx = 0; sy = (srcHeight - sh) / 2;
            }
            ctx.drawImage(element, sx, sy, sw, sh, 0, 0, canvas.width, canvas.height);
        }

        // CONSTRUCCIÓN DEL SWITCHER
        function drawGridHTML() {
            channelsGrid.innerHTML = '';
            
            slotsData.forEach(slot => {
                const box = document.createElement('div');
                box.className = 'channel-box';
                
                if (slot.id === onAirSlotId) box.classList.add('on-air');
                if (slot.id === nextSelectedSlotId) box.classList.add('selected-next');

                if (slot.type !== 'empty' && slot.element) {
                    const trigger = document.createElement('div');
                    trigger.className = 'channel-trigger';
                    
                    const visualClone = slot.element.cloneNode(true);
                    if (slot.type === 'camera' || slot.type === 'video') {
                        visualClone.muted = true; // Miniaturas siempre en mute
                        visualClone.autoplay = true;
                        visualClone.playsInline = true;
                        if (slot.streamObject) visualClone.srcObject = slot.streamObject;
                    }
                    trigger.appendChild(visualClone);

                    const badge = document.createElement('div');
                    badge.className = 'badge-type';
                    badge.textContent = slot.type;
                    trigger.appendChild(badge);

                    const label = document.createElement('div');
                    label.className = 'channel-label';
                    label.textContent = slot.name;
                    trigger.appendChild(label);

                    // Indicador dinámico visual del Audio del canal
                    if (slot.hasAudioTrack) {
                        const audioBadge = document.createElement('div');
                        audioBadge.className = 'audio-indicator-badge';
                        audioBadge.textContent = (slot.id === onAirSlotId) ? "🔊 AFV" : "🔇 ON";
                        box.appendChild(audioBadge);
                    }

                    trigger.onclick = () => {
                        nextSelectedSlotId = slot.id; 
                        sendSlotToAir(slot);         
                    };
                    box.appendChild(trigger);

                    const toolbar = document.createElement('div');
                    toolbar.className = 'channel-toolbar';

                    if (slot.type === 'video') {
                        const btnStinger = document.createElement('button');
                        btnStinger.className = `mini-btn ${activeStingerSlotId === slot.id ? 'active-stinger' : ''}`;
                        btnStinger.textContent = "Stinger";
                        btnStinger.onclick = (e) => {
                            e.stopPropagation();
                            toggleStingerMode(slot.id);
                        };
                        toolbar.appendChild(btnStinger);

                        const btnReturn = document.createElement('button');
                        btnReturn.className = `mini-btn ${slot.autoReturnToCam ? 'active' : ''}`;
                        btnReturn.textContent = "Auto-Cam";
                        btnReturn.onclick = (e) => {
                            e.stopPropagation();
                            slot.autoReturnToCam = !slot.autoReturnToCam;
                            drawGridHTML();
                        };
                        toolbar.appendChild(btnReturn);
                    }

                    if (slot.type === 'image') {
                        const btnMode = document.createElement('button');
                        btnMode.className = `mini-btn ${slot.isOverlayMode ? 'active' : ''}`;
                        btnMode.textContent = slot.isOverlayMode ? "Logo" : "Fondo";
                        btnMode.onclick = (e) => {
                            e.stopPropagation();
                            slot.isOverlayMode = !slot.isOverlayMode;
                            drawGridHTML();
                        };
                        toolbar.appendChild(btnMode);
                    }

                    const btnDel = document.createElement('button');
                    btnDel.className = 'mini-btn mini-btn-danger';
                    btnDel.textContent = "X";
                    btnDel.onclick = (e) => {
                        e.stopPropagation();
                        clearSlotData(slot);
                        drawGridHTML();
                    };
                    toolbar.appendChild(btnDel);

                    box.appendChild(toolbar);

                } else {
                    const empty = document.createElement('div');
                    empty.className = 'empty-slot';
                    empty.innerHTML = `<span>[Ranura ${slot.id + 1}]</span><span style="font-size:8px;color:#444;margin-top:2px;">+ Cargar</span>`;
                    empty.onclick = () => {
                        slotTargetToLoad = slot.id;
                        universalFileInput.click();
                    };
                    box.appendChild(empty);
                }

                channelsGrid.appendChild(box);
            });

            const currentBgSlot = slotsData.find(s => s.id === onAirSlotId);
            txtCurrentBg.textContent = currentBgSlot ? currentBgSlot.name : "Vacío";
            
            const currentOvSlot = slotsData.find(s => s.id === overlayActiveSlotId);
            txtCurrentOverlay.textContent = currentOvSlot ? currentOvSlot.name : "Inactivo";
        }

        // ENVÍO DE SEÑAL AL AIRE + DISPARO DE AUDIO
        function sendSlotToAir(slot) {
            if (slot.type === 'image') {
                if (slot.isOverlayMode) {
                    overlayActiveSlotId = (overlayActiveSlotId === slot.id) ? null : slot.id;
                    drawGridHTML();
                } else {
                    executeTransition(slot.id);
                }
                return;
            }

            if (slot.type === 'video' && slot.id === activeStingerSlotId) return;

            executeTransition(slot.id);

            if (slot.type === 'video') {
                slot.element.currentTime = 0;
                slot.element.play().catch(() => console.log("Interacción de audio requerida"));
                
                slot.element.onended = () => {
                    if (slot.autoReturnToCam && slotsData[0].type !== 'empty') {
                        nextSelectedSlotId = 0;
                        executeTransition(0);
                    }
                };
            }
        }

        btnManualTransition.onclick = () => {
            if (nextSelectedSlotId !== null) {
                const targetSlot = slotsData[nextSelectedSlotId];
                if (targetSlot && targetSlot.type !== 'empty') {
                    sendSlotToAir(targetSlot);
                }
            } else {
                alert("Selecciona primero una escena en el mosaico.");
            }
        };

        // ENRUTAMIENTO POST-TRANSICIÓN FINALIZADA
        function executeTransition(slotId) {
            if (activeStingerSlotId !== null && slotsData[activeStingerSlotId].objectUrl) {
                pendingAirSlotId = slotId;
                stingerVideo.style.display = "block";
                stingerVideo.currentTime = 0;
                stingerVideo.play();
            } else {
                onAirSlotId = slotId;
                updateAudioRouting();
                drawGridHTML();
            }
        }

        stingerVideo.ontimeupdate = () => {
            if (pendingAirSlotId && stingerVideo.currentTime >= (stingerVideo.duration / 2)) {
                onAirSlotId = pendingAirSlotId;
                pendingAirSlotId = null;
                updateAudioRouting();
                drawGridHTML();
            }
        };
        stingerVideo.onended = () => { stingerVideo.style.display = "none"; };

        // CONFIGURACIONES DE ASPECTO GLOBAL
        aspectHorizontal.onclick = () => {
            if (!isVerticalMode) return;
            isVerticalMode = false;
            aspectHorizontal.classList.add('active');
            btnAspectVertical.classList.remove('active');
            monitorContainer.classList.remove('vertical');
            drawGridHTML();
        };

        btnAspectVertical.onclick = () => {
            if (isVerticalMode) return;
            isVerticalMode = true;
            btnAspectVertical.classList.add('active');
            aspectHorizontal.classList.remove('active');
            monitorContainer.classList.add('vertical');
            drawGridHTML();
        };

        function toggleStingerMode(slotId) {
            if (activeStingerSlotId === slotId) {
                activeStingerSlotId = null;
                stingerVideo.src = "";
            } else {
                activeStingerSlotId = slotId;
                stingerVideo.src = slotsData[slotId].objectUrl;
            }
            drawGridHTML();
        }

        // MANEJO DE ARCHIVOS MULTIMEDIA ENTRANTES
        btnUploadGeneric.onclick = () => {
            const firstEmpty = slotsData.find(s => s.type === 'empty');
            slotTargetToLoad = firstEmpty ? firstEmpty.id : 0;
            universalFileInput.click();
        };

        universalFileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (!file || slotTargetToLoad === null) return;

            const fileUrl = URL.createObjectURL(file);
            const isVideo = file.type.startsWith('video/');
            const slot = slotsData[slotTargetToLoad];

            clearSlotData(slot);

            if (isVideo) {
                const videoEl = document.createElement('video');
                videoEl.src = fileUrl;
                videoEl.autoplay = true;
                videoEl.loop = false;
                videoEl.muted = true; // Inicia muteado hasta que vaya al aire
                videoEl.playsInline = true;

                slot.type = 'video';
                slot.element = videoEl;
                slot.objectUrl = fileUrl;
                slot.hasAudioTrack = true; // Los videos mapean canal de sonido nativo
            } else {
                const imgEl = document.createElement('img');
                imgEl.src = fileUrl;
                imgEl.onload = () => {
                    slot.type = 'image';
                    slot.element = imgEl;
                    slot.objectUrl = fileUrl;
                    slot.hasAudioTrack = false;
                    drawGridHTML();
                };
            }

            slot.name = file.name;
            if (onAirSlotId === null) {
                onAirSlotId = slot.id;
                updateAudioRouting();
            }

            drawGridHTML();
            universalFileInput.value = '';
            slotTargetToLoad = null;
        };

        // CONEXIÓN DE HARDWARE DE CÁMARAS Y MICRÓFONOS TRADICIONALES
        btnConnectCamGeneric.onclick = async () => {
            if (systemCameras.length === 0) return alert("No hay cámaras de hardware.");
            const targetStr = prompt("Introduce el número de recuadro (1 al 8) para esta cámara:");
            const targetIdx = parseInt(targetStr) - 1;
            
            if (targetIdx >= 0 && targetIdx < TOTAL_SLOTS) {
                let msg = "Selecciona el dispositivo de captura en vivo:\n";
                systemCameras.forEach((c, idx) => msg += `${idx + 1}: ${c.label || `Cámara ${idx + 1}`}\n`);
                const sel = parseInt(prompt(msg)) - 1;
                
                if (sel >= 0 && sel < systemCameras.length) {
                    await connectCamera(targetIdx, systemCameras[sel]);
                }
            }
        };

        async function connectCamera(slotId, deviceInfo) {
            const slot = slotsData[slotId];
            clearSlotData(slot);

            const videoEl = document.createElement('video');
            videoEl.autoplay = true;
            videoEl.playsInline = true;
            videoEl.muted = true; 

            try {
                // Capturar video y también su micrófono físico sincronizado por hardware
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { deviceId: { exact: deviceInfo.deviceId }, width: 1280, height: 720 },
                    audio: true 
                });
                videoEl.srcObject = stream;
                
                slot.type = 'camera';
                slot.name = deviceInfo.label || `Cámara ${slotId + 1}`;
                slot.element = videoEl;
                slot.streamObject = stream;
                slot.hasAudioTrack = true; 

                if (onAirSlotId === null) {
                    onAirSlotId = slot.id;
                    updateAudioRouting();
                }
                drawGridHTML();
            } catch (err) {
                showError("No se pudo conectar el hardware AV: " + err.message);
            }
        }

        function clearSlotData(slot) {
            if (slot.streamObject) slot.streamObject.getTracks().forEach(t => t.stop());
            if (slot.objectUrl) URL.revokeObjectURL(slot.objectUrl);
            
            if (onAirSlotId === slot.id) onAirSlotId = null;
            if (nextSelectedSlotId === slot.id) nextSelectedSlotId = null;
            if (overlayActiveSlotId === slot.id) overlayActiveSlotId = null;
            if (activeStingerSlotId === slot.id) {
                activeStingerSlotId = null;
                stingerVideo.src = "";
            }

            slot.type = 'empty';
            slot.name = `Canal ${slot.id + 1}`;
            slot.element = null;
            slot.streamObject = null;
            slot.objectUrl = null;
            slot.hasAudioTrack = false;
        }

        async function init() {
            if (window.location.protocol === 'file:') {
                showError("<strong>¡Bloqueo de Seguridad!</strong> Para inicializar el enrutamiento de audio avanzado y cámaras necesitas correr este archivo desde un servidor local (Live Server).");
                return;
            }

            initSlots();

            try {
                const initialStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                initialStream.getTracks().forEach(t => t.stop());

                const devices = await navigator.mediaDevices.enumerateDevices();
                systemCameras = devices.filter(d => d.kind === 'videoinput');

                if (systemCameras.length > 0) {
                    await connectCamera(0, systemCameras[0]);
                }

                drawGridHTML();
                masterRenderLoop();
            } catch (error) {
                showError("Modo limitado: Hardware de audio/video no disponible o denegado.");
                drawGridHTML();
                masterRenderLoop();
            }
        }

        // Forzar inicialización de Web Audio tras el primer toque en pantalla
        window.addEventListener('click', () => {
            if (audioContext && audioContext.state === 'suspended') {
                audioContext.resume();
            }
        }, { once: true });

        init();
    </script>
</body>
