<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Cámaras Fijo 4x2</title>
    
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    
    <style>
        /* Estilos de Alto Contraste y UI Optimizada */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: #000000;
            color: #FFFFFF;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-y: auto;
        }

        header {
            width: 100%;
            text-align: center;
            padding: 10px 0 20px 0;
        }

        h1 {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        h2 {
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
            width: 100%;
            max-width: 900px;
            text-align: left;
        }

        /* Contenedor de la Cámara Principal */
        .main-preview-container {
            position: relative;
            width: 100%;
            max-width: 900px;
            aspect-ratio: 16 / 9;
            background-color: #111111;
            border: 4px solid #FFFFFF;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-bottom: 25px;
        }

        #mainVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Tabla / Cuadrícula Fija de 4 Columnas x 2 Filas (4x2) */
        .grid-container {
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4 Columnas exactas */
            grid-template-rows: repeat(2, 1fr);    /* 2 Filas exactas */
            gap: 15px;
            margin-bottom: 20px;
        }

        /* Estilo para los recuadros de cámara */
        .thumb-box {
            position: relative;
            background-color: #111111;
            border: 3px solid #444444;
            border-radius: 6px;
            aspect-ratio: 4 / 3;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .thumb-box:hover {
            transform: scale(1.03);
        }

        /* Resalte de la cámara activa en la pantalla grande */
        .thumb-box.active {
            border-color: #FFFFFF;
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.6);
        }

        .thumb-box video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }

        .thumb-label {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            color: #FFFFFF;
            font-size: 11px;
            font-weight: 700;
            padding: 6px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-transform: uppercase;
        }

        /* Estilo para los espacios vacíos (Sin Señal) */
        .empty-box {
            background-color: #0c0c0c;
            border: 3px dashed #222222;
            border-radius: 6px;
            aspect-ratio: 4 / 3;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #444444;
            font-size: 12px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            pointer-events: none; /* No se puede clickear */
        }

        /* Mensajes de Alerta/Error */
        .error-message {
            color: #FF3333;
            font-size: 16px;
            font-weight: 700;
            text-align: center;
            padding: 15px;
            border: 2px dashed #FF3333;
            border-radius: 8px;
            background-color: #110000;
            max-width: 900px;
            width: 100%;
            margin-bottom: 20px;
            display: none;
        }

        /* Adaptabilidad para pantallas muy pequeñas (Móviles en vertical) */
        @media (max-width: 600px) {
            .grid-container {
                grid-template-columns: repeat(2, 1fr); /* Pasa a 2x4 en pantallas mini para que no se aplaste tanto */
                grid-template-rows: auto;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Panel de Control 4x2</h1>
    </header>

    <div id="errorLog" class="error-message"></div>

    <h2>Cámara Principal</h2>
    <div class="main-preview-container">
        <video id="mainVideo" autoplay playsinline muted></video>
    </div>

    <h2>Mosaico de Cámaras (4 x 2)</h2>
    <div id="cameraGrid" class="grid-container">
        </div>

    <script>
        const mainVideo = document.getElementById('mainVideo');
        const cameraGrid = document.getElementById('cameraGrid');
        const errorLog = document.getElementById('errorLog');
        
        let videoDevices = [];
        let activeStreamForMain = null;
        let thumbnailStreams = []; 
        const TOTAL_SLOTS = 8; // Estructura fija de 4 columnas x 2 filas = 8 espacios

        function showError(message) {
            errorLog.innerHTML = message;
            errorLog.style.display = "block";
        }

        function stopMainStream() {
            if (activeStreamForMain) {
                activeStreamForMain.getTracks().forEach(track => track.stop());
            }
        }

        // Cambiar flujo del cuadro principal
        async function selectMainCamera(deviceId) {
            stopMainStream();

            // Actualizar marco activo en la tabla
            document.querySelectorAll('.thumb-box').forEach(box => {
                if (box.dataset.id === deviceId) {
                    box.classList.add('active');
                } else {
                    box.classList.remove('active');
                }
            });

            const constraints = {
                video: {
                    deviceId: { exact: deviceId },
                    width: { ideal: 1920 },
                    height: { ideal: 1080 }
                }
            };

            try {
                activeStreamForMain = await navigator.mediaDevices.getUserMedia(constraints);
                mainVideo.srcObject = activeStreamForMain;
            } catch (error) {
                showError("Error al cargar la cámara principal: " + error.message);
            }
        }

        // Construir la tabla fija de 4x2
        async function buildCameraGrid() {
            cameraGrid.innerHTML = '';
            thumbnailStreams = [];

            // Iteramos exactamente 8 veces para cumplir con el diseño 4x2
            for (let i = 0; i < TOTAL_SLOTS; i++) {
                
                // Si hay una cámara disponible para este espacio
                if (i < videoDevices.length) {
                    const device = videoDevices[i];
                    const labelText = device.label || `Cámara ${i + 1}`;

                    const thumbBox = document.createElement('div');
                    thumbBox.className = 'thumb-box';
                    thumbBox.dataset.id = device.deviceId;

                    const thumbVideo = document.createElement('video');
                    thumbVideo.autoplay = true;
                    thumbVideo.playsInline = true;
                    thumbVideo.muted = true;

                    const thumbLabel = document.createElement('div');
                    thumbLabel.className = 'thumb-label';
                    thumbLabel.textContent = labelText;

                    thumbBox.appendChild(thumbVideo);
                    thumbBox.appendChild(thumbLabel);
                    cameraGrid.appendChild(thumbBox);

                    // Evento al dar clic
                    thumbBox.onclick = () => {
                        selectMainCamera(device.deviceId);
                    };

                    // Encender miniatura en segundo plano (resolución baja)
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({
                            video: {
                                deviceId: { exact: device.deviceId },
                                width: { ideal: 320 },
                                height: { ideal: 240 }
                            }
                        });
                        thumbVideo.srcObject = stream;
                        thumbnailStreams.push(stream);
                    } catch (err) {
                        console.warn(`Error en miniatura ${i + 1}:`, err);
                        thumbBox.style.opacity = "0.4";
                        thumbLabel.textContent += " (Bloqueada)";
                    }

                } else {
                    // Si no hay más cámaras físicas, rellenamos el espacio para mantener el formato 4x2
                    const emptyBox = document.createElement('div');
                    emptyBox.className = 'empty-box';
                    emptyBox.textContent = "Sin señal";
                    cameraGrid.appendChild(emptyBox);
                }
            }

            // Seleccionar por defecto la primera del mosaico
            if (videoDevices.length > 0) {
                selectMainCamera(videoDevices[0].deviceId);
            }
        }

        async function getDevices() {
            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                videoDevices = devices.filter(device => device.kind === 'videoinput');
                
                if (videoDevices.length === 0) {
                    showError("No se detectaron cámaras físicas conectadas.");
                    return;
                }

                await buildCameraGrid();
            } catch (error) {
                showError("Error al escanear hardware de video: " + error.message);
            }
        }

        async function init() {
            if (window.location.protocol === 'file:') {
                showError("<strong>¡Bloqueo de Seguridad!</strong> Las cámaras no funcionan abriendo el archivo directamente.<br><br>Debes ejecutarlo desde un servidor local (como Live Server en VS Code) o bajo un dominio HTTPS.");
                return;
            }

            try {
                // Solicitar permisos iniciales
                const initialStream = await navigator.mediaDevices.getUserMedia({ video: true });
                initialStream.getTracks().forEach(track => track.stop());
                
                await getDevices();
            } catch (error) {
                showError("Permiso denegado. Habilita el acceso a la cámara usando el icono de candado en la barra de navegación.");
            }
        }

        // Registro Service Worker PWA In-Line
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const swCode = `
                    self.addEventListener('install', e => self.skipWaiting());
                    self.addEventListener('fetch', e => e.respondWith(fetch(e.request)));
                `;
                const blob = new Blob([swCode], { type: 'application/javascript' });
                const swUrl = URL.createObjectURL(blob);
                navigator.serviceWorker.register(swUrl).catch(err => console.log("SW error:", err));
            });
        }

        init();
    </script>
</body>
</html>
