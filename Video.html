<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monitor Pro - Persistente</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js"></script>
    <style>
        :root { 
            --bg: #000; --card: #111; --accent: #00e676; --panel: #1a1a1a;
        }

        body { 
            background: var(--bg); color: #fff; font-family: system-ui, sans-serif; 
            margin: 0; padding: 15px; overflow-x: hidden;
        }

        /* Cabecera */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            max-width: 1200px; margin: 0 auto 20px auto;
        }
        .header h1 { font-size: 1.4rem; color: var(--accent); margin: 0; }

        .btn-toggle {
            background: var(--accent); color: #000; border: none;
            padding: 10px 18px; border-radius: 8px; font-weight: bold; cursor: pointer;
        }

        /* Panel Configuración */
        .config-panel {
            max-height: 0; opacity: 0; overflow: hidden;
            transition: all 0.4s ease; background: var(--panel);
            border-radius: 12px; max-width: 800px; margin: 0 auto;
        }
        .config-panel.active {
            max-height: 500px; opacity: 1; padding: 20px; margin-bottom: 25px; border: 1px solid #333;
        }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; color: #888; font-size: 14px; }
        input { 
            width: 100%; padding: 12px; background: #000; border: 1px solid #444;
            color: var(--accent); border-radius: 8px; box-sizing: border-box; font-size: 16px;
        }

        /* Cuadrícula de 2 Columnas Estricta */
        .grid { 
            display: grid; grid-template-columns: repeat(2, 1fr); 
            gap: 15px; max-width: 1200px; margin: 0 auto;
        }

        .card { 
            background: var(--card); border-radius: 12px; overflow: hidden; 
            border: 1px solid #222; position: relative;
        }
        .card video { width: 100%; aspect-ratio: 16/9; background: #000; display: block; cursor: pointer; }

        .card-info { 
            padding: 10px; display: flex; justify-content: space-between; align-items: center;
            background: #181818; border-top: 1px solid #222;
        }
        .btn-action { padding: 6px 10px; border-radius: 4px; border: none; font-size: 11px; color: #fff; cursor: pointer; }
        .btn-edit { background: #2979ff; margin-right: 5px; }
        .btn-del { background: #ff5252; }

        /* Modal Maestro */
        .modal { 
            display: none; position: fixed; top:0; left:0; width:100%; height:100%; 
            background: rgba(0,0,0,0.95); z-index: 2000; flex-direction: column; justify-content: center;
        }
        .modal-content {
            width: 100%; max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; justify-content: center;
        }
        #masterVideo { width: 100%; max-height: 80vh; }
        .modal-controls { padding: 20px; text-align: center; }
        .btn-sync { 
            background: #f59e0b; color: #000; padding: 15px 30px; 
            border-radius: 10px; font-weight: 800; border: none; width: 100%; max-width: 300px;
        }

        /* Ajuste para pantallas muy pequeñas */
        @media (max-width: 400px) {
            .grid { gap: 8px; }
            .header h1 { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Monitor Center</h1>
    <button class="btn-toggle" onclick="togglePanel()">+ Configurar</button>
</div>

<div class="config-panel" id="configPanel">
    <input type="hidden" id="editIndex" value="-1">
    <div class="input-group">
        <label>Link Video (.m3u8)</label>
        <input type="text" id="vUrl" placeholder="https://...">
    </div>
    <div class="input-group">
        <label>Link Audio (.m3u8) (Opcional)</label>
        <input type="text" id="aUrl" placeholder="https://...">
    </div>
    <button class="btn-toggle" style="width:100%" onclick="guardarStream()">Guardar Canal</button>
</div>

<div class="grid" id="mainGrid"></div>

<div class="modal" id="masterModal" onclick="evaluarCierreModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <video id="masterVideo" controls playsinline></video>
        <audio id="masterAudio"></audio>
        <div class="modal-controls">
            <button class="btn-sync" id="btnSync" onclick="forzarSincro()">⚡ RE-SINCRONIZAR AUDIO</button>
        </div>
    </div>
</div>

<script>
    let streams = JSON.parse(localStorage.getItem('my_streams')) || [];
    const grid = document.getElementById('mainGrid');
    const panel = document.getElementById('configPanel');
    const mVideo = document.getElementById('masterVideo');
    const mAudio = document.getElementById('masterAudio');
    const modal = document.getElementById('masterModal');
    const btnSync = document.getElementById('btnSync');
    let hlsV, hlsA;

    // Al cargar la página, dibujamos lo guardado
    window.onload = renderGrid;

    function togglePanel() {
        panel.classList.toggle('active');
        if(!panel.classList.contains('active')) resetForm();
    }

    function guardarStream() {
        const vUrl = document.getElementById('vUrl').value.trim();
        const aUrl = document.getElementById('aUrl').value.trim();
        const editIndex = parseInt(document.getElementById('editIndex').value);

        if(!vUrl) return alert("Falta el enlace de Video");

        if(editIndex === -1) {
            streams.push({ vUrl, aUrl });
        } else {
            streams[editIndex] = { vUrl, aUrl };
        }
        
        localStorage.setItem('my_streams', JSON.stringify(streams));
        togglePanel();
        renderGrid();
    }

    function renderGrid() {
        grid.innerHTML = '';
        streams.forEach((s, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <video muted playsinline id="v-${index}"></video>
                <div class="card-info">
                    <span style="font-size:11px; font-weight:bold; color:#00e676">CH ${index + 1}</span>
                    <div>
                        <button class="btn-action btn-edit" onclick="prepararEdicion(${index})">EDIT</button>
                        <button class="btn-action btn-del" onclick="eliminarStream(${index})">BORRAR</button>
                    </div>
                </div>
            `;
            grid.appendChild(card);
            
            const vEl = document.getElementById(`v-${index}`);
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(s.vUrl);
                hls.attachMedia(vEl);
                hls.on(Hls.Events.MANIFEST_PARSED, () => vEl.play());
            }
            vEl.onclick = () => abrirMaestro(s.vUrl, s.aUrl);
        });
    }

    function eliminarStream(index) {
        if(confirm("¿Eliminar este canal permanentemente?")) {
            streams.splice(index, 1);
            localStorage.setItem('my_streams', JSON.stringify(streams));
            renderGrid();
        }
    }

    function prepararEdicion(index) {
        document.getElementById('vUrl').value = streams[index].vUrl;
        document.getElementById('aUrl').value = streams[index].aUrl || '';
        document.getElementById('editIndex').value = index;
        if(!panel.classList.contains('active')) togglePanel();
    }

    function resetForm() {
        document.getElementById('vUrl').value = '';
        document.getElementById('aUrl').value = '';
        document.getElementById('editIndex').value = '-1';
    }

    function abrirMaestro(v, a) {
        modal.style.display = 'flex';
        if(hlsV) hlsV.destroy();
        if(hlsA) hlsA.destroy();

        hlsV = new Hls(); 
        hlsV.loadSource(v); 
        hlsV.attachMedia(mVideo);

        if (a && a.trim() !== "") {
            btnSync.style.display = 'inline-block';
            hlsA = new Hls(); 
            hlsA.loadSource(a); 
            hlsA.attachMedia(mAudio);
            hlsV.on(Hls.Events.MANIFEST_PARSED, () => { mVideo.play(); mAudio.play(); });
        } else {
            btnSync.style.display = 'none';
            mAudio.src = ""; 
            hlsV.on(Hls.Events.MANIFEST_PARSED, () => { mVideo.play(); });
        }

        mVideo.onplay = () => { if(hlsA) mAudio.play(); };
        mVideo.onpause = () => { if(hlsA) mAudio.pause(); };
        mVideo.onseeking = () => { if(hlsA) mAudio.currentTime = mVideo.currentTime; };
    }

    function cerrarMaestro() {
        modal.style.display = 'none';
        mVideo.pause(); 
        if(hlsA) mAudio.pause();
        if(hlsV) hlsV.destroy(); 
        if(hlsA) hlsA.destroy();
        hlsA = null;
    }

    // Cierra el reproductor únicamente si haces click en el fondo desenfocado (.modal)
    function evaluarCierreModal(event) {
        if (event.target === modal) {
            cerrarMaestro();
        }
    }

    function forzarSincro() {
        if (hlsA) {
            mAudio.currentTime = mVideo.currentTime;
            mAudio.play();
        }
    }

    setInterval(() => {
        if(modal.style.display === 'flex' && !mVideo.paused && hlsA) {
            if(Math.abs(mVideo.currentTime - mAudio.currentTime) > 0.4) {
                mAudio.currentTime = mVideo.currentTime;
            }
        }
    }, 800);
</script>
</body>
</html>
