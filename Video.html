<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M3U8 Grid - Click to Exit</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --bg: #0b0f1a;
            --accent: #38bdf8;
            --danger: #f43f5e;
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding-bottom: 50px;
        }

        header {
            padding: 15px;
            background: rgba(11, 15, 26, 0.98);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #2d3748;
        }

        .controls-wrapper {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .input-container { display: flex; gap: 8px; }
        input {
            flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #4a5568;
            background: #000; color: var(--accent); outline: none;
        }

        .btn { padding: 10px 18px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .btn-add { background: var(--accent); color: #000; }
        .btn-clear { background: #334155; color: var(--text); align-self: flex-end; font-size: 11px; }

        /* Cuadrícula de 2 Columnas */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            padding: 10px;
        }

        .video-wrapper {
            position: relative;
            background: #000;
            aspect-ratio: 16 / 9;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #2d3748;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-actions { position: absolute; top: 5px; right: 5px; display: flex; gap: 4px; z-index: 30; }
        .mini-btn { padding: 4px 8px; border-radius: 4px; border: none; font-size: 10px; color: white; cursor: pointer; opacity: 0.7; }
        .mini-btn:hover { opacity: 1; }
        .eb { background: #64748b; }
        .db { background: var(--danger); }

        .click-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; cursor: pointer; }

        video { width: 100%; height: 100%; object-fit: cover; background: #000; }
        
        /* Forzar proporción original en FullScreen nativo */
        video:fullscreen { object-fit: contain !important; }
        video:-webkit-full-screen { object-fit: contain !important; }

        /* MODO ENFOQUE (Primer Plano) */
        .video-wrapper.focused {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 2000; background: none; /* El fondo lo da el backdrop */
            border: none; border-radius: 0;
            pointer-events: none; /* Deja pasar clics al backdrop si no es sobre el video */
        }

        .video-wrapper.focused video { 
            width: auto; height: auto;
            max-width: 100%; max-height: 100%;
            object-fit: contain !important; 
            pointer-events: auto; /* Habilita controles */
        }

        .video-wrapper.focused .click-layer,
        .video-wrapper.focused .card-actions { display: none; }

        /* Fondo oscuro que detecta la pérdida de foco */
        #backdrop {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); 
            z-index: 1500;
            cursor: zoom-out;
        }
    </style>
</head>
<body>

<header>
    <div class="controls-wrapper">
        <div class="input-container">
            <input type="text" id="urlInput" placeholder="URL m3u8...">
            <button class="btn btn-add" onclick="handleAdd()">AÑADIR</button>
        </div>
        <button class="btn btn-clear" onclick="clearAll()">BORRAR TODO</button>
    </div>
</header>

<div id="backdrop" onclick="exitFocus()"></div>

<main class="video-grid" id="mainGrid"></main>

<script>
    const grid = document.getElementById('mainGrid');
    const backdrop = document.getElementById('backdrop');
    let currentFocus = null;
    let savedUrls = JSON.parse(localStorage.getItem('m3u8_v7')) || [];

    window.onload = () => savedUrls.forEach(url => renderStream(url));

    function handleAdd() {
        const url = document.getElementById('urlInput').value.trim();
        if (!url || savedUrls.includes(url)) return;
        savedUrls.push(url);
        updateStorage();
        renderStream(url);
        document.getElementById('urlInput').value = '';
    }

    function renderStream(url) {
        const wrapper = document.createElement('div');
        wrapper.className = 'video-wrapper';
        wrapper.innerHTML = `
            <div class="card-actions">
                <button class="mini-btn eb" onclick="editStream('${url}', this.parentElement.parentElement)">Editar</button>
                <button class="mini-btn db" onclick="removeStream('${url}', this.parentElement.parentElement)">X</button>
            </div>
            <div class="click-layer" onclick="enterFocus(this.parentElement)"></div>
            <video muted autoplay playsinline></video>
        `;
        const video = wrapper.querySelector('video');
        grid.appendChild(wrapper);
        loadHls(video, url);
    }

    function loadHls(video, url) {
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url;
        }
    }

    function enterFocus(wrapper) {
        currentFocus = wrapper;
        const video = wrapper.querySelector('video');
        wrapper.classList.add('focused');
        backdrop.style.display = 'block';
        video.muted = false;
        video.controls = true;
        video.play();
    }

    function exitFocus() {
        if (!currentFocus) return;
        const video = currentFocus.querySelector('video');
        
        // Salir de FullScreen si el usuario lo activó por botones nativos
        if (document.fullscreenElement) {
            document.exitFullscreen();
        }

        currentFocus.classList.remove('focused');
        video.muted = true;
        video.controls = false;
        backdrop.style.display = 'none';
        currentFocus = null;
    }

    function removeStream(url, el) {
        savedUrls = savedUrls.filter(u => u !== url);
        updateStorage();
        el.remove();
    }

    function editStream(oldUrl, el) {
        const n = prompt("Nueva URL:", oldUrl);
        if (n && n !== oldUrl) {
            savedUrls[savedUrls.indexOf(oldUrl)] = n;
            updateStorage();
            location.reload();
        }
    }

    function clearAll() {
        if(confirm("¿Eliminar todos los videos guardados?")) {
            localStorage.removeItem('m3u8_v7');
            location.reload();
        }
    }

    function updateStorage() {
        localStorage.setItem('m3u8_v7', JSON.stringify(savedUrls));
    }

    document.addEventListener('keydown', (e) => { if(e.key === "Escape") exitFocus(); });
</script>

</body>
</html>
