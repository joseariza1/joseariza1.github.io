<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NanoWallet Pro Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        .tab-active { color: #3b82f6; border-bottom: 2px solid #3b82f6; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col pb-24">

    <header class="p-6 space-y-4 text-center">
        <div class="flex justify-between items-center">
            <h1 class="text-lg font-bold text-blue-500 tracking-tight">NanoWallet</h1>
            <button onclick="openAccModal()" class="text-[10px] bg-slate-900 px-4 py-2 rounded-full border border-slate-800 font-bold uppercase tracking-wider">+ Cuenta</button>
        </div>
        
        <div class="bg-gradient-to-br from-blue-700 to-indigo-900 p-8 rounded-[2.5rem] shadow-2xl border border-blue-500/20">
            <p class="text-blue-200/60 text-[10px] font-bold uppercase tracking-[0.2em]">Saldo Total:</p>
            <h2 id="grandTotal" class="text-4xl font-extrabold mt-2 tracking-tighter">$0.00</h2>
        </div>
    </header>

    <nav class="flex px-6 border-b border-slate-900 mb-6 text-[11px] font-bold uppercase tracking-widest">
        <button onclick="switchView('main')" id="btnMain" class="flex-1 py-4 tab-active">General</button>
        <button onclick="switchView('debts')" id="btnDebts" class="flex-1 py-4 text-slate-500">Deudas</button>
    </nav>

    <main id="viewMain" class="flex-1 space-y-8">
        <section class="space-y-3 text-left">
            <div class="px-6"><h3 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Mis Cuentas <span class="text-[8px] lowercase opacity-50">(toca para editar)</span></h3></div>
            <div id="accountsList" class="flex gap-4 overflow-x-auto px-6 pb-2 hide-scrollbar snap-x"></div>
        </section>
        <section class="px-6 space-y-4 text-left">
            <h3 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Actividad</h3>
            <div id="txHistory" class="space-y-1"></div>
        </section>
    </main>

    <main id="viewDebts" class="hidden flex-1 px-6 space-y-6">
        <div class="flex justify-between items-center">
            <h3 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest text-left">Lista de Deudas</h3>
            <button onclick="openDebtModal()" class="text-xs text-blue-400 font-bold">+ Nueva Deuda</button>
        </div>
        <div id="debtsList" class="space-y-4"></div>
    </main>

    <button onclick="prepareTxModal()" class="fixed bottom-8 right-6 w-16 h-16 bg-blue-600 text-white rounded-[1.5rem] shadow-xl flex items-center justify-center text-3xl font-bold z-50 transition-transform active:scale-90">+</button>

    <div id="modalAccount" class="modal text-left">
        <div class="bg-slate-900 w-full max-w-sm p-8 rounded-[2.5rem] border border-slate-800">
            <h2 id="accModalTitle" class="text-2xl font-bold mb-6">Cuenta</h2>
            <input type="hidden" id="editAccId">
            <div class="space-y-4">
                <input id="accName" type="text" placeholder="Nombre (Ej: Banco)" class="w-full bg-slate-800 p-4 rounded-2xl outline-none text-sm">
                <input id="accBalance" type="number" placeholder="Saldo" class="w-full bg-slate-800 p-4 rounded-2xl outline-none text-sm">
                <div class="flex gap-2">
                    <button onclick="saveAccount()" class="flex-1 bg-blue-600 p-4 rounded-2xl font-bold">Guardar</button>
                    <button id="btnDelAcc" onclick="deleteAcc()" class="hidden bg-red-900/30 text-red-500 px-6 rounded-2xl">✕</button>
                    <button onclick="closeModal('modalAccount')" class="bg-slate-700 p-4 rounded-2xl font-bold text-xs italic">Cerrar</button>
                </div>
            </div>
        </div>
    </div>

    <div id="modalDebt" class="modal text-left">
        <div class="bg-slate-900 w-full max-w-sm p-8 rounded-[2.5rem] border border-slate-800">
            <h2 id="debtModalTitle" class="text-2xl font-bold mb-6 text-red-400">Deuda</h2>
            <input type="hidden" id="editDebtId">
            <div class="space-y-4">
                <input id="debtName" type="text" placeholder="¿A quién le debes?" class="w-full bg-slate-800 p-4 rounded-2xl outline-none text-sm">
                <input id="debtAmount" type="number" placeholder="Monto" class="w-full bg-slate-800 p-4 rounded-2xl outline-none text-sm">
                <div class="flex gap-2">
                    <button onclick="saveDebt()" class="flex-1 bg-red-600 p-4 rounded-2xl font-bold">Confirmar</button>
                    <button onclick="closeModal('modalDebt')" class="bg-slate-700 p-4 rounded-2xl font-bold italic">✕</button>
                </div>
            </div>
        </div>
    </div>

    <div id="modalTx" class="modal">
        <div class="bg-slate-900 w-full max-w-sm p-8 rounded-[2.5rem] border border-slate-800">
            <div class="flex gap-2 mb-6">
                <button onclick="setTxMode('Gasto')" id="modeGasto" class="flex-1 bg-blue-600 p-2 rounded-lg text-[10px] font-bold uppercase">Gasto</button>
                <button onclick="setTxMode('Ingreso')" id="modeIngreso" class="flex-1 bg-slate-800 p-2 rounded-lg text-[10px] font-bold uppercase">Ingreso</button>
                <button onclick="setTxMode('Traspaso')" id="modeTraspaso" class="flex-1 bg-slate-800 p-2 rounded-lg text-[10px] font-bold uppercase">Traspaso</button>
            </div>
            <div class="space-y-4">
                <select id="txAccount" class="w-full bg-slate-800 p-4 rounded-2xl text-sm outline-none"></select>
                <div id="transferTarget" class="hidden">
                    <p class="text-[9px] font-bold text-blue-500 mb-1 ml-2 uppercase text-left">Hacia</p>
                    <select id="txDest" class="w-full bg-slate-800 p-4 rounded-2xl text-sm outline-none border border-blue-500/30"></select>
                </div>
                <input id="txAmount" type="number" placeholder="$0.00" class="w-full bg-transparent text-center text-4xl font-extrabold py-4 outline-none">
                <button onclick="executeTx()" class="w-full bg-white text-black p-4 rounded-2xl font-bold">Confirmar Movimiento</button>
                <button onclick="closeModal('modalTx')" class="w-full text-slate-500 text-xs mt-2">Cancelar</button>
            </div>
        </div>
    </div>

    <div id="modalPay" class="modal">
        <div class="bg-slate-900 w-full max-w-sm p-8 rounded-[2.5rem] border border-slate-800 text-left">
            <h2 class="text-xl font-bold mb-4">Abonar Pago</h2>
            <div class="space-y-4">
                <input type="hidden" id="payDebtId">
                <select id="payAcc" class="w-full bg-slate-800 p-4 rounded-2xl text-sm outline-none"></select>
                <input id="payVal" type="number" placeholder="Monto" class="w-full bg-slate-800 p-4 rounded-2xl outline-none text-sm border border-green-500/30">
                <button onclick="confirmPayment()" class="w-full bg-green-600 p-4 rounded-2xl font-bold">Confirmar Pago</button>
                <button onclick="closeModal('modalPay')" class="w-full text-slate-500 text-xs mt-2 text-center">Cerrar</button>
            </div>
        </div>
    </div>

    <script>
        let data = JSON.parse(localStorage.getItem('nano_v_final')) || { accounts: [], txs: [], debts: [] };
        let currentTxType = 'Gasto';

        function save() {
            localStorage.setItem('nano_v_final', JSON.stringify(data));
            render();
        }

        function switchView(view) {
            document.getElementById('viewMain').classList.toggle('hidden', view !== 'main');
            document.getElementById('viewDebts').classList.toggle('hidden', view !== 'debts');
            document.getElementById('btnMain').classList.toggle('tab-active', view === 'main');
            document.getElementById('btnDebts').classList.toggle('tab-active', view === 'debts');
        }

        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        // --- CUENTAS ---
        function openAccModal(id = null) {
            const title = document.getElementById('accModalTitle');
            const btnDel = document.getElementById('btnDelAcc');
            if(id) {
                const acc = data.accounts.find(a => a.id === id);
                document.getElementById('editAccId').value = acc.id;
                document.getElementById('accName').value = acc.name;
                document.getElementById('accBalance').value = acc.balance;
                title.innerText = "Editar Cuenta";
                btnDel.classList.remove('hidden');
            } else {
                document.getElementById('editAccId').value = "";
                document.getElementById('accName').value = "";
                document.getElementById('accBalance').value = "";
                title.innerText = "Nueva Cuenta";
                btnDel.classList.add('hidden');
            }
            document.getElementById('modalAccount').classList.add('active');
        }

        function saveAccount() {
            const id = document.getElementById('editAccId').value;
            const name = document.getElementById('accName').value || 'Cuenta';
            const bal = parseFloat(document.getElementById('accBalance').value) || 0;
            if(id) {
                const acc = data.accounts.find(a => a.id == id);
                acc.name = name; acc.balance = bal;
            } else {
                data.accounts.push({ id: Date.now(), name, balance: bal });
            }
            closeModal('modalAccount'); save();
        }

        function deleteAcc() {
            const id = parseInt(document.getElementById('editAccId').value);
            if(confirm('¿Borrar esta cuenta permanentemente?')) {
                data.accounts = data.accounts.filter(a => a.id !== id);
                closeModal('modalAccount'); save();
            }
        }

        // --- DEUDAS ---
        function openDebtModal(id = null) {
            const title = document.getElementById('debtModalTitle');
            if(id) {
                const d = data.debts.find(x => x.id === id);
                document.getElementById('editDebtId').value = d.id;
                document.getElementById('debtName').value = d.name;
                document.getElementById('debtAmount').value = d.amount;
                title.innerText = "Editar Deuda";
            } else {
                document.getElementById('editDebtId').value = "";
                document.getElementById('debtName').value = "";
                document.getElementById('debtAmount').value = "";
                title.innerText = "Nueva Deuda";
            }
            document.getElementById('modalDebt').classList.add('active');
        }

        function saveDebt() {
            const id = document.getElementById('editDebtId').value;
            const name = document.getElementById('debtName').value || 'Deuda';
            const amount = parseFloat(document.getElementById('debtAmount').value) || 0;
            if(id) {
                const d = data.debts.find(x => x.id == id);
                d.name = name; d.amount = amount;
            } else {
                data.debts.push({ id: Date.now(), name, amount });
            }
            closeModal('modalDebt'); save();
        }

        // --- TRANSACCIONES ---
        function setTxMode(mode) {
            currentTxType = mode;
            ['Gasto', 'Ingreso', 'Traspaso'].forEach(m => {
                document.getElementById('mode'+m).className = m === mode ? 'flex-1 bg-blue-600 p-2 rounded-lg text-[10px] font-bold uppercase' : 'flex-1 bg-slate-800 p-2 rounded-lg text-[10px] font-bold uppercase';
            });
            document.getElementById('transferTarget').classList.toggle('hidden', mode !== 'Traspaso');
        }

        function prepareTxModal() {
            const sel = document.getElementById('txAccount');
            const dest = document.getElementById('txDest');
            const opt = data.accounts.map(a => `<option value="${a.id}">${a.name}</option>`).join('');
            sel.innerHTML = opt; dest.innerHTML = opt;
            document.getElementById('txAmount').value = "";
            setTxMode('Gasto');
            document.getElementById('modalTx').classList.add('active');
        }

        function executeTx() {
            const aId = parseInt(document.getElementById('txAccount').value);
            const val = parseFloat(document.getElementById('txAmount').value);
            if(!val) return;
            const acc = data.accounts.find(a => a.id === aId);

            if(currentTxType === 'Traspaso') {
                const dId = parseInt(document.getElementById('txDest').value);
                const dAcc = data.accounts.find(a => a.id === dId);
                if(aId === dId) return alert("Cuentas iguales");
                acc.balance -= val; dAcc.balance += val;
                data.txs.unshift({ id: Date.now(), type: 'Traspaso', accName: `${acc.name} → ${dAcc.name}`, amount: val, date: 'Hoy' });
            } else {
                acc.balance += (currentTxType === 'Ingreso' ? val : -val);
                data.txs.unshift({ id: Date.now(), type: currentTxType, accName: acc.name, amount: val, date: 'Hoy' });
            }
            closeModal('modalTx'); save();
        }

        // --- PAGOS DE DEUDA ---
        function openPay(id) {
            const d = data.debts.find(x => x.id === id);
            document.getElementById('payDebtId').value = id;
            document.getElementById('payVal').value = d.amount;
            document.getElementById('payAcc').innerHTML = data.accounts.map(a => `<option value="${a.id}">${a.name} ($${a.balance})</option>`).join('');
            document.getElementById('modalPay').classList.add('active');
        }

        function confirmPayment() {
            const dId = parseInt(document.getElementById('payDebtId').value);
            const aId = parseInt(document.getElementById('payAcc').value);
            const val = parseFloat(document.getElementById('payVal').value);
            const debt = data.debts.find(d => d.id === dId);
            const acc = data.accounts.find(a => a.id === aId);
            if(acc && val > 0) {
                acc.balance -= val; debt.amount -= val;
                data.txs.unshift({ id: Date.now(), type: 'Gasto', accName: acc.name, amount: val, date: 'Hoy', note: 'Pago Deuda' });
                if(debt.amount <= 0) data.debts = data.debts.filter(d => d.id !== dId);
                closeModal('modalPay'); save();
            }
        }

        // --- RENDER ---
        function render() {
            const total = data.accounts.reduce((s, a) => s + a.balance, 0);
            document.getElementById('grandTotal').innerText = `$${total.toLocaleString('es-MX', {minimumFractionDigits: 2})}`;

            document.getElementById('accountsList').innerHTML = data.accounts.length ? data.accounts.map(a => `
                <div onclick="openAccModal(${a.id})" class="snap-center min-w-[140px] bg-slate-900 p-5 rounded-[2rem] border border-slate-800 active:scale-95 transition-all cursor-pointer">
                    <p class="text-[8px] text-slate-500 font-bold uppercase truncate">${a.name}</p>
                    <p class="text-lg font-bold">$${a.balance.toFixed(2)}</p>
                </div>
            `).join('') : '<p class="text-[10px] text-slate-700 italic px-6">No hay cuentas</p>';

            document.getElementById('txHistory').innerHTML = data.txs.map(t => `
                <div class="flex justify-between items-center p-3 border-b border-slate-900/50">
                    <div class="text-left">
                        <p class="text-xs font-bold">${t.accName}</p>
                        <p class="text-[8px] text-slate-500 uppercase">${t.type}</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-xs font-bold ${t.type === 'Ingreso' ? 'text-green-400' : 'text-slate-200'}">$${t.amount.toFixed(2)}</span>
                        <button onclick="data.txs = data.txs.filter(x => x.id !== ${t.id}); save();" class="text-slate-800 px-2">✕</button>
                    </div>
                </div>
            `).join('');

            document.getElementById('debtsList').innerHTML = data.debts.length ? data.debts.map(d => `
                <div class="bg-slate-900 p-5 rounded-3xl flex justify-between items-center shadow-lg">
                    <div class="text-left">
                        <p class="font-bold text-sm text-slate-300">${d.name}</p>
                        <p class="text-xs text-red-500 font-bold tracking-tighter">$${d.amount.toFixed(2)}</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="openPay(${d.id})" class="bg-green-600 px-3 py-1 rounded-lg text-[10px] font-bold">PAGAR</button>
                        <button onclick="openDebtModal(${d.id})" class="bg-slate-800 p-2 rounded-lg text-[10px]">✎</button>
                        <button onclick="data.debts = data.debts.filter(x => x.id !== ${d.id}); save();" class="text-slate-700 px-1">✕</button>
                    </div>
                </div>
            `).join('') : '<p class="text-center text-slate-600 py-10 text-sm">Sin deudas pendientes</p>';
        }

        render();
    </script>
</body>
</html>
