<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Pro + Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIlBPUyBQcm8iLAogICJzaG9ydF9uYW1lIjogIlBPUyIsCiAgInN0YXJ0X3VybCI6ICIuIiwKICAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwKICAiYmFja2dyb3VuZF9jb2xvciI6ICIjZmZmZmZmIiwKICAidGhlbWVfY29sb3ciOiAiIzI1NjNmZSIsCiAgImljb25zIjogW3sgInNyYyI6ICJodHRwczovL2Nkbi1pY29ucy1wbmcuZmxhdGljb24uY29tLzUxMi8xMTczLzExNzM3MTcucG5nIiwgInR5cGUiOiAiaW1hZ2UvcG5nIiwgInNpemVzIjogIjUxMng1MTIifSBdCn0=">
    <style>
        #reader { width: 100% !important; border: none !important; }
        #reader__dashboard_section_csr button { 
            background: #2563eb !important; color: white !important; padding: 10px 20px !important; border-radius: 8px !important;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans">

<div id="app" class="h-screen flex flex-col">
    <header class="bg-blue-600 text-white p-4 shadow-lg flex justify-between items-center">
        <h1 class="text-xl font-bold italic">POS Pro</h1>
        <button @click="abrirEscaner" class="bg-blue-800 px-4 py-2 rounded-lg text-sm flex items-center gap-2">
            <span>📷</span> Escanear Código
        </button>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <section class="w-2/3 p-4 overflow-y-auto">
            <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                <div v-for="producto in productos" :key="producto.id" 
                     @click="agregarAlCarrito(producto)"
                     class="bg-white p-4 rounded-xl shadow-sm hover:shadow-md transition cursor-pointer border-2 border-transparent active:border-blue-500">
                    <div class="text-3xl mb-2">{{ producto.emoji }}</div>
                    <h3 class="font-bold text-gray-800">{{ producto.nombre }}</h3>
                    <p class="text-xs text-gray-400">SKU: {{ producto.sku }}</p>
                    <p class="text-blue-600 font-semibold">${{ producto.precio }}</p>
                </div>
            </div>
        </section>

        <aside class="w-1/3 bg-white shadow-2xl flex flex-col p-4">
            <h2 class="text-xl font-bold mb-4 border-b pb-2">Orden</h2>
            <div class="flex-1 overflow-y-auto">
                <div v-for="(item, index) in carrito" :key="index" class="flex justify-between items-center mb-3 text-sm italic">
                    <div>
                        <span class="font-medium">{{ item.nombre }}</span>
                        <div class="text-gray-400">x{{ item.cantidad }}</div>
                    </div>
                    <div class="flex items-center gap-2">
                        <span>${{ item.precio * item.cantidad }}</span>
                        <button @click="eliminarDelCarrito(index)" class="text-red-500 font-bold">✕</button>
                    </div>
                </div>
            </div>

            <div class="border-t pt-4">
                <div class="flex justify-between text-2xl font-bold mb-4">
                    <span>Total:</span>
                    <span class="text-green-600">${{ totalCarrito }}</span>
                </div>
                <button @click="finalizarVenta" :disabled="carrito.length === 0"
                        class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-gray-300 text-white py-4 rounded-xl font-bold transition">
                    FINALIZAR VENTA
                </button>
            </div>
        </aside>
    </main>

    <div v-if="mostrandoEscaner" class="fixed inset-0 bg-black bg-opacity-90 z-50 flex flex-col items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-2xl overflow-hidden relative">
            <button @click="cerrarEscaner" class="absolute top-4 right-4 z-50 bg-red-500 text-white w-8 h-8 rounded-full font-bold">X</button>
            <div id="reader"></div>
            <div class="p-4 text-center text-gray-600 text-sm">
                Apunta al código de barras del producto
            </div>
        </div>
    </div>

    <div v-if="notificacion" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-8 py-3 rounded-full shadow-2xl">
        {{ notificacion }}
    </div>
</div>

<script>
const { createApp } = Vue;

createApp({
    data() {
        return {
            // Ejemplo de productos con SKU para el escáner
            productos: [
                { id: 1, sku: '7501234567890', nombre: 'Refresco 600ml', precio: 18, emoji: '🥤' },
                { id: 2, sku: '12345', nombre: 'Botana Familiar', precio: 45, emoji: '🍿' },
                { id: 3, sku: '98765', nombre: 'Detergente 1L', precio: 32, emoji: '🧼' },
            ],
            carrito: [],
            mostrandoEscaner: false,
            html5QrCode: null,
            notificacion: ''
        }
    },
    computed: {
        totalCarrito() {
            return this.carrito.reduce((acc, item) => acc + (item.precio * item.cantidad), 0);
        }
    },
    methods: {
        agregarAlCarrito(prod) {
            const item = this.carrito.find(i => i.id === prod.id);
            if (item) {
                item.cantidad++;
            } else {
                this.carrito.push({ ...prod, cantidad: 1 });
            }
            this.showMsg(`Añadido: ${prod.nombre}`);
        },
        eliminarDelCarrito(idx) {
            this.carrito.splice(idx, 1);
        },
        abrirEscaner() {
            this.mostrandoEscaner = true;
            this.$nextTick(() => {
                this.html5QrCode = new Html5Qrcode("reader");
                this.html5QrCode.start(
                    { facingMode: "environment" }, 
                    { fps: 10, qrbox: { width: 250, height: 150 } },
                    (decodedText) => {
                        this.procesarCodigo(decodedText);
                    }
                ).catch(err => console.error("Error cámara:", err));
            });
        },
        procesarCodigo(codigo) {
            const producto = this.productos.find(p => p.sku === codigo);
            if (producto) {
                this.agregarAlCarrito(producto);
                // Vibración táctil si el dispositivo lo permite
                if (navigator.vibrate) navigator.vibrate(100);
            } else {
                this.showMsg("Producto no encontrado: " + codigo);
            }
        },
        cerrarEscaner() {
            if (this.html5QrCode) {
                this.html5QrCode.stop().then(() => {
                    this.mostrandoEscaner = false;
                });
            } else {
                this.mostrandoEscaner = false;
            }
        },
        finalizarVenta() {
            this.showMsg("Venta cobrada: $" + this.totalCarrito);
            this.carrito = [];
        },
        showMsg(msg) {
            this.notificacion = msg;
            setTimeout(() => this.notificacion = '', 2000);
        }
    }
}).mount('#app');
</script>
</body>
</html>
