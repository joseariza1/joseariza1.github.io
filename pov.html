<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockMaster PWA</title>
    <!-- Librería para escanear códigos de barras -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <!-- Google Fonts para tipografía moderna -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- VARIABLES DE DISEÑO DE ÚLTIMA GENERACIÓN --- */
        :root {
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --primary-light: #e0e7ff;
            --danger: #ef4444;
            --danger-light: #fee2e2;
            --warning: #f59e0b;
            --warning-light: #fef3c7;
            --success: #10b981;
            --success-light: #d1fae5;
            --border: #e2e8f0;
            --radius-lg: 16px;
            --radius-md: 12px;
            --shadow-sm: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -4px rgba(0, 0, 0, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            padding-bottom: 90px; /* Espacio para la barra de navegación inferior */
        }

        /* --- CONTENEDOR PRINCIPAL --- */
        .app-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px 16px;
        }

        header {
            margin-bottom: 24px;
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text-main);
        }

        header p {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        h2 {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-main);
            margin: 24px 0 12px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* --- FORMULARIOS E INPUTS PREMIUM --- */
        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select {
            width: 100%;
            padding: 12px 16px;
            font-size: 0.95rem;
            background-color: var(--bg-card);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text-main);
            transition: all 0.2s ease;
            box-shadow: var(--shadow-sm);
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-light);
        }

        .flex-group {
            display: flex;
            gap: 12px;
        }

        .flex-group > div {
            flex: 1;
            min-width: 0;
        }

        /* --- BOTONES MODERNOS --- */
        button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 20px;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: var(--radius-md);
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
            box-shadow: 0 4px 10px rgba(79, 70, 229, 0.2);
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        .btn-secondary {
            background-color: var(--bg-card);
            border: 1.5px solid var(--border);
            color: var(--text-main);
        }

        .btn-secondary:hover {
            background-color: var(--bg-main);
        }

        .btn-danger {
            background-color: var(--danger-light);
            color: var(--danger);
        }

        .btn-icon-only {
            width: 48px;
            height: 48px;
            padding: 0;
            flex-shrink: 0;
        }

        /* --- SISTEMA DE ALERTAS (CHIPS/TARJETAS) --- */
        .alert-box {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
        }

        .alert-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 12px 16px;
            border-radius: var(--radius-md);
            font-size: 0.85rem;
            font-weight: 500;
            line-height: 1.4;
        }

        .alert-warning { background-color: var(--warning-light); color: #92400e; }
        .alert-danger { background-color: var(--danger-light); color: #991b1b; }
        .alert-success { background-color: var(--success-light); color: #065f46; padding: 16px; text-align: center; justify-content: center;}

        /* --- TARJETAS DE PRODUCTOS (GRID-CARDS) --- */
        .product-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .product-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 16px;
            box-shadow: var(--shadow-md);
            position: relative;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .product-card:hover {
            box-shadow: var(--shadow-lg);
        }

        .product-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
            margin-bottom: 8px;
        }

        .product-title {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .badge-promo {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 20px;
            text-transform: uppercase;
        }

        .product-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .product-stock {
            display: inline-flex;
            align-items: center;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 4px 8px;
            background-color: var(--bg-main);
            border-radius: 6px;
            margin-bottom: 12px;
        }

        .price-section {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 14px;
        }

        .price-chip {
            font-size: 0.75rem;
            font-weight: 600;
            padding: 6px 10px;
            border-radius: 8px;
            background-color: var(--bg-main);
            border: 1px solid var(--border);
        }

        .price-chip.main {
            background-color: var(--primary-light);
            color: var(--primary);
            border-color: transparent;
        }

        .card-actions {
            display: flex;
            gap: 8px;
            border-top: 1px solid var(--border);
            padding-top: 12px;
        }

        .card-actions button {
            padding: 8px 12px;
            font-size: 0.85rem;
        }

        /* --- ESCÁNER DE CÁMARA FLOTANTE/ESTILIZADO --- */
        .scanner-wrapper {
            background: #000;
            border-radius: var(--radius-lg);
            overflow: hidden;
            margin: 12px 0;
            position: relative;
            box-shadow: var(--shadow-lg);
        }
        
        /* --- BARRA DE NAVEGACIÓN INFERIOR (ESTILO APP NATIVA) --- */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 10px 0 calc(10px + env(safe-area-inset-bottom));
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.03);
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: none;
            border: none;
            padding: 6px;
            width: auto;
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: 500;
            gap: 4px;
            box-shadow: none;
        }

        .nav-item.active {
            color: var(--primary);
            font-weight: 700;
        }

        .nav-icon {
            font-size: 1.3rem;
        }

        /* --- CONTROL DE VISTAS --- */
        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- HEADER DINÁMICO -->
        <header>
            <h1 id="app-title">StockMaster</h1>
            <p id="app-subtitle">Panel de control de inventario</p>
        </header>

        <!-- SECCIÓN 1: STOCK E INVENTARIO -->
        <div id="stock-page" class="page active">
            <h2>🚨 Alertas de atención</h2>
            <div id="alerts-container"></div>

            <h2>📦 Productos registrados</h2>
            <div class="form-group flex-group" style="margin-bottom: 20px;">
                <input type="text" id="search-input" placeholder="Buscar por nombre o código..." oninput= "renderProducts()">
                <button class="btn-secondary btn-icon-only" onclick="startScan('search')" title="Escanear Código">🔍</button>
            </div>
            
            <div id="scanner-container-search" style="display:none;" class="scanner-wrapper">
                <div id="reader-search"></div>
                <button onclick="stopScan('search')" class="btn-danger" style="border-radius:0;">Cerrar Cámara</button>
            </div>

            <div id="product-list-container" class="product-list"></div>
        </div>

        <!-- SECCIÓN 2: FORMULARIO AGREGAR / EDITAR -->
        <div id="add-page" class="page">
            <h2 id="form-title">Agregar Producto</h2>
            <form id="product-form" onsubmit="saveProduct(event)">
                <input type="hidden" id="edit-id">

                <div class="form-group">
                    <label>Nombre del Producto</label>
                    <input type="text" id="prod-name" placeholder="Ej. Leche Entera 1L" required>
                </div>

                <div class="form-group">
                    <label>Código de Barras</label>
                    <div class="flex-group">
                        <input type="text" id="prod-code" placeholder="Escribe o escanea" required>
                        <button type="button" class="btn-secondary btn-icon-only" onclick="startScan('form')">📷</button>
                    </div>
                </div>
                
                <div id="scanner-container-form" style="display:none;" class="scanner-wrapper">
                    <div id="reader-form"></div>
                    <button type="button" onclick="stopScan('form')" class="btn-danger" style="border-radius:0;">Cerrar Cámara</button>
                </div>

                <div class="form-group flex-group">
                    <div>
                        <label>Stock Inicial</label>
                        <input type="number" id="prod-stock" min="0" placeholder="0" required>
                    </div>
                    <div>
                        <label>Stock Mínimo</label>
                        <input type="number" id="prod-min-stock" min="0" value="5" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Unidad de Medida</label>
                    <select id="prod-unit">
                        <option value="Pieza">Pieza (Pza)</option>
                        <option value="Kg">Kilo (Kg)</option>
                        <option value="Litros">Litros (L)</option>
                        <option value="Paquete">Paquete (Paq)</option>
                    </select>
                </div>

                <div class="form-group flex-group">
                    <div>
                        <label>P. Unitario ($)</label>
                        <input type="number" step="0.01" id="prod-price-unit" placeholder="0.00" required>
                    </div>
                    <div>
                        <label>P. Mayoreo ($)</label>
                        <input type="number" step="0.01" id="prod-price-wholesale" placeholder="Opcional">
                    </div>
                    <div>
                        <label>P. Caja ($)</label>
                        <input type="number" step="0.01" id="prod-price-box" placeholder="Opcional">
                    </div>
                </div>

                <div class="form-group flex-group">
                    <div>
                        <label>Fecha Compra</label>
                        <input type="date" id="prod-date-buy" required>
                    </div>
                    <div>
                        <label>Fecha Caducidad</label>
                        <input type="date" id="prod-date-expiry">
                    </div>
                </div>

                <button type="submit" class="btn-primary" id="btn-submit-form" style="margin-top: 10px;">Guardar Producto</button>
                <button type="button" id="btn-cancel-edit" class="btn-danger" style="display:none; margin-top: 8px;" onclick="clearForm()">Cancelar Edición</button>
            </form>
        </div>

        <!-- SECCIÓN 3: PROMOCIONES -->
        <div id="promo-page" class="page">
            <h2>🎉 Crear Promoción Especial</h2>
            <form id="promo-form" onsubmit="applyPromo(event)">
                <div class="form-group">
                    <label>Seleccionar Producto</label>
                    <select id="promo-product-select" required></select>
                </div>

                <div class="form-group">
                    <label>Tipo de Promoción</label>
                    <select id="promo-type" onchange="togglePromoFields()">
                        <option value="descuento">Porcentaje de Descuento (%)</option>
                        <option value="xporx">Esquema Fijo (2x1, 3x2...)</option>
                    </select>
                </div>

                <div class="form-group" id="div-promo-desc">
                    <label>Descuento (%)</label>
                    <input type="number" id="promo-discount" min="1" max="100" value="10">
                </div>

                <div id="div-promo-quantity" style="display:none;" class="form-group flex-group">
                    <div>
                        <label>Lleva (Cantidad)</label>
                        <input type="number" id="promo-buy" min="1" value="2">
                    </div>
                    <div>
                        <label>Paga (Cantidad)</label>
                        <input type="number" id="promo-pay" min="1" value="1">
                    </div>
                </div>

                <button type="submit" class="btn-primary">Activar Promoción</button>
            </form>

            <h2>🔥 Promociones Activas</h2>
            <div id="promos-active-container" class="product-list"></div>
        </div>
    </div>

    <!-- NAVEGACIÓN INFERIOR PREMIUM -->
    <nav class="bottom-nav">
        <button class="nav-item active" id="nav-stock" onclick="switchPage('stock-page', 'nav-stock')">
            <span class="nav-icon">📦</span>
            <span>Inventario</span>
        </button>
        <button class="nav-item" id="nav-add" onclick="switchPage('add-page', 'nav-add')">
            <span class="nav-icon">➕</span>
            <span>Añadir</span>
        </button>
        <button class="nav-item" id="nav-promo" onclick="switchPage('promo-page', 'nav-promo')">
            <span class="nav-icon">🎉</span>
            <span>Promos</span>
        </button>
    </nav>

    <script>
        // --- BASE DE DATOS LOCALSTORAGE ---
        let products = JSON.parse(localStorage.getItem('pwa_products')) || [];
        let html5QrcodeScanner = null;

        // --- SISTEMA DE NAVEGACIÓN INTERNA ---
        function switchPage(pageId, navId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            
            document.getElementById(pageId).classList.add('active');
            document.getElementById(navId).classList.add('active');
            
            // Actualizar subtítulos dinámicos según sección
            const sub = document.getElementById('app-subtitle');
            if(pageId === 'stock-page') {
                sub.innerText = "Panel de control de inventario";
                renderProducts();
            } else if (pageId === 'add-page') {
                sub.innerText = "Registrar existencias en el sistema";
            } else if (pageId === 'promo-page') {
                sub.innerText = "Gestionar ofertas y marketing";
                populatePromoSelect();
                renderPromos();
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // --- MANEJO DE CÁMARA E INFRAESTRUCTURA DE ESCANEO ---
        function startScan(target) {
            const containerId = `scanner-container-${target}`;
            const readerId = `reader-${target}`;
            document.getElementById(containerId).style.display = 'block';

            if (html5QrcodeScanner) { html5QrcodeScanner.clear(); }

            html5QrcodeScanner = new Html5Qrcode(readerId);
            html5QrcodeScanner.start(
                { facingMode: "environment" }, 
                { fps: 12, qrbox: { width: 260, height: 160 } },
                (decodedText) => {
                    if(target === 'form') {
                        document.getElementById('prod-code').value = decodedText;
                    } else if (target === 'search') {
                        document.getElementById('search-input').value = decodedText;
                        renderProducts();
                    }
                    stopScan(target);
                },
                (errorMessage) => {}
            ).catch(err => alert("Acceso denegado a la cámara o error: " + err));
        }

        function stopScan(target) {
            const containerId = `scanner-container-${target}`;
            document.getElementById(containerId).style.display = 'none';
            if (html5QrcodeScanner) {
                html5QrcodeScanner.stop().then(() => { html5QrcodeScanner = null; }).catch(e => console.log(e));
            }
        }

        // --- LOGICA DE NEGOCIO (CRUD) ---
        function saveProduct(e) {
            e.preventDefault();
            const id = document.getElementById('edit-id').value;
            
            const productData = {
                id: id ? parseInt(id) : Date.now(),
                name: document.getElementById('prod-name').value.trim(),
                code: document.getElementById('prod-code').value.trim(),
                stock: parseInt(document.getElementById('prod-stock').value),
                minStock: parseInt(document.getElementById('prod-min-stock').value),
                unit: document.getElementById('prod-unit').value,
                priceUnit: parseFloat(document.getElementById('prod-price-unit').value),
                priceWholesale: parseFloat(document.getElementById('prod-price-wholesale').value) || null,
                priceBox: parseFloat(document.getElementById('prod-price-box').value) || null,
                dateBuy: document.getElementById('prod-date-buy').value,
                dateExpiry: document.getElementById('prod-date-expiry').value || null,
                promo: id ? (products.find(p => p.id === parseInt(id))?.promo || null) : null
            };

            if(id) {
                products = products.map(p => p.id === parseInt(id) ? productData : p);
            } else {
                products.push(productData);
            }

            localStorage.setItem('pwa_products', JSON.stringify(products));
            clearForm();
            switchPage('stock-page', 'nav-stock');
        }

        function editProduct(id) {
            const p = products.find(prod => prod.id === id);
            if(!p) return;

            document.getElementById('edit-id').value = p.id;
            document.getElementById('prod-name').value = p.name;
            document.getElementById('prod-code').value = p.code;
            document.getElementById('prod-stock').value = p.stock;
            document.getElementById('prod-min-stock').value = p.minStock;
            document.getElementById('prod-unit').value = p.unit;
            document.getElementById('prod-price-unit').value = p.priceUnit;
            document.getElementById('prod-price-wholesale').value = p.priceWholesale || '';
            document.getElementById('prod-price-box').value = p.priceBox || '';
            document.getElementById('prod-date-buy').value = p.dateBuy;
            document.getElementById('prod-date-expiry').value = p.dateExpiry || '';

            document.getElementById('form-title').innerText = "Editar Producto";
            document.getElementById('btn-submit-form').innerText = "Guardar Cambios";
            document.getElementById('btn-cancel-edit').style.display = 'block';

            switchPage('add-page', 'nav-add');
        }

        function deleteProduct(id) {
            if(confirm("¿Estás seguro de que deseas eliminar este producto permanentemente?")) {
                products = products.filter(p => p.id !== id);
                localStorage.setItem('pwa_products', JSON.stringify(products));
                renderProducts();
            }
        }

        function clearForm() {
            document.getElementById('product-form').reset();
            document.getElementById('edit-id').value = '';
            document.getElementById('form-title').innerText = "Agregar Producto";
            document.getElementById('btn-submit-form').innerText = "Guardar Producto";
            document.getElementById('btn-cancel-edit').style.display = 'none';
        }

        // --- RENDERIZACIÓN Y ALGORITMO ALFABÉTICO CON FILTRADO ---
        function renderProducts() {
            const container = document.getElementById('product-list-container');
            const searchQuery = document.getElementById('search-input').value.toLowerCase().trim();
            container.innerHTML = '';

            // Clasificación Alfabética estricta
            let sortedList = [...products].sort((a, b) => a.name.localeCompare(b.name));

            // Filtro de motor de búsqueda
            if(searchQuery) {
                sortedList = sortedList.filter(p => 
                    p.name.toLowerCase().includes(searchQuery) || p.code.includes(searchQuery)
                );
            }

            if(sortedList.length === 0) {
                container.innerHTML = `<p style="text-align:center; color:var(--text-muted); font-size:0.9rem; padding:20px;">No hay productos que coincidan con la búsqueda.</p>`;
                return;
            }

            sortedList.forEach(p => {
                const card = document.createElement('div');
                card.className = 'product-card';
                
                let promoBadge = p.promo ? `<span class="badge-promo">${p.promo.type === 'descuento' ? `-${p.promo.value}%` : `${p.promo.buy}x${p.promo.pay}`}</span>` : '';

                card.innerHTML = `
                    <div class="product-header">
                        <div class="product-title">${p.name}</div>
                        ${promoBadge}
                    </div>
                    <div class="product-meta">Código: ${p.code}</div>
                    
                    <div class="product-stock">
                        📦 Stock: ${p.stock} ${p.unit} <span style="color:var(--text-muted); font-weight:400; margin-left:4px;">(Mín. ${p.minStock})</span>
                    </div>

                    <div class="price-section">
                        <span class="price-chip main">Unitario: $${p.priceUnit}</span>
                        ${p.priceWholesale ? `<span class="price-chip">Mayoreo: $${p.priceWholesale}</span>` : ''}
                        ${p.priceBox ? `<span class="price-chip">Caja: $${p.priceBox}</span>` : ''}
                    </div>

                    <div class="product-meta" style="margin-bottom: 0; font-size: 0.75rem;">
                        📅 Compra: ${p.dateBuy} | Caducidad: ${p.dateExpiry || 'N/A'}
                    </div>

                    <div class="card-actions">
                        <button class="btn-secondary" onclick="editProduct(${p.id})">Editar</button>
                        <button class="btn-danger" onclick="deleteProduct(${p.id})">Eliminar</button>
                    </div>
                `;
                container.appendChild(card);
            });

            checkAlerts();
        }

        // --- SISTEMA AUTOMÁTICO DE DETECCIÓN Y ALERTAS ---
        function checkAlerts() {
            const alertsContainer = document.getElementById('alerts-container');
            alertsContainer.innerHTML = '';
            let alertsHtml = [];
            const hoy = new Date();
            
            products.forEach(p => {
                // Alerta: Inventario por debajo de lo requerido
                if(p.stock <= p.minStock) {
                    alertsHtml.push(`<div class="alert-item alert-danger">⚠️ <strong>${p.name}:</strong> Stock bajo crítico (${p.stock} pzas restantes).</div>`);
                }

                // Alerta: Margen de caducidad
                if(p.dateExpiry) {
                    const fCaducidad = new Date(p.dateExpiry);
                    const diasRestantes = (fCaducidad - hoy) / (1000 * 60 * 60 * 24);
                    if(diasRestantes < 0) {
                        alertsHtml.push(`<div class="alert-item alert-danger">🛑 <strong>${p.name}:</strong> ¡CADUCADO! Venció el ${p.dateExpiry}.</div>`);
                    } else if(diasRestantes <= 15) {
                        alertsHtml.push(`<div class="alert-item alert-warning">⏳ <strong>${p.name}:</strong> Próximo a caducar (${Math.ceil(diasRestantes)} días restantes).</div>`);
                    }
                }

                // Alerta: Rezago / Antigüedad en Almacén (90 días)
                if(p.dateBuy && p.stock > 0) {
                    const fCompra = new Date(p.dateBuy);
                    const diasAlmacenado = (hoy - fCompra) / (1000 * 60 * 60 * 24);
                    if(diasAlmacenado >= 90) {
                        alertsHtml.push(`<div class="alert-item alert-warning">🕒 <strong>${p.name}:</strong> Producto rezagado (${Math.floor(diasAlmacenado)} días en stock sin liquidar).</div>`);
                    }
                }
            });

            if(alertsHtml.length > 0) {
                alertsContainer.innerHTML = `<div class="alert-box">${alertsHtml.join('')}</div>`;
            } else {
                alertsContainer.innerHTML = '<div class="alert-item alert-success">✨ Todo al día. No tienes alertas de inventario pendientes.</div>';
            }
        }

        // --- INTERFAZ DE ADMINISTRACIÓN DE PROMOCIONES ---
        function populatePromoSelect() {
            const select = document.getElementById('promo-product-select');
            select.innerHTML = '';
            products.forEach(p => {
                const opt = document.createElement('option');
                opt.value = p.id;
                opt.innerText = p.name;
                select.appendChild(opt);
            });
        }

        function togglePromoFields() {
            const type = document.getElementById('promo-type').value;
            document.getElementById('div-promo-desc').style.display = type === 'descuento' ? 'block' : 'none';
            document.getElementById('div-promo-quantity').style.display = type === 'xporx' ? 'flex' : 'none';
        }

        function applyPromo(e) {
            e.preventDefault();
            const prodId = parseInt(document.getElementById('promo-product-select').value);
            const type = document.getElementById('promo-type').value;
            
            let promoData = { type };
            if(type === 'descuento') {
                promoData.value = parseInt(document.getElementById('promo-discount').value);
            } else {
                promoData.buy = parseInt(document.getElementById('promo-buy').value);
                promoData.pay = parseInt(document.getElementById('promo-pay').value);
            }

            products = products.map(p => p.id === prodId ? { ...p, promo: promoData } : p);
            localStorage.setItem('pwa_products', JSON.stringify(products));
            renderPromos();
            alert("¡Promoción aplicada con éxito!");
        }

        function removePromo(id) {
            products = products.map(p => p.id === id ? { ...p, promo: null } : p);
            localStorage.setItem('pwa_products', JSON.stringify(products));
            renderPromos();
        }

        function renderPromos() {
            const container = document.getElementById('promos-active-container');
            container.innerHTML = '';
            const listWithPromo = products.filter(p => p.promo);

            if(listWithPromo.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:var(--text-muted); font-size:0.9rem; padding:20px;">No hay promociones activas.</p>';
                return;
            }

            listWithPromo.forEach(p => {
                const item = document.createElement('div');
                item.className = 'product-card';
                const labelPromo = p.promo.type === 'descuento' ? `Descuento del ${p.promo.value}%` : `Especial: Lleva ${p.promo.buy} y paga ${p.promo.pay}`;

                item.innerHTML = `
                    <div class="product-title">${p.name}</div>
                    <div class="product-stock" style="margin-top:8px; background-color: var(--primary-light); color: var(--primary);">🔥 ${labelPromo}</div>
                    <div class="card-actions" style="margin-top:8px;">
                        <button class="btn-danger" onclick="removePromo(${p.id})">Remover Oferta</button>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        window.onload = () => { renderProducts(); };
    </script>
</body>
</html>
