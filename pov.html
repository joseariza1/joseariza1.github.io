<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Punto de Venta Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        @media (max-width: 640px) { .scanner-container { width: 100% !important; } }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen pb-20">

    <nav class="bg-blue-600 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <i data-lucide="shopping-cart"></i> POS Express
            </h1>
            <div id="expiry-alert" class="hidden bg-red-500 text-white px-3 py-1 rounded-full text-xs animate-pulse cursor-pointer">
                ¡Alerta de Caducidad!
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4 max-w-4xl">
        
        <section id="view-pos" class="space-y-4">
            <div class="bg-white p-4 rounded-xl shadow-md">
                <div class="flex gap-2 mb-4">
                    <button onclick="startScanner()" class="flex-1 bg-blue-500 text-white py-3 rounded-lg flex justify-center gap-2">
                        <i data-lucide="scan-barcode"></i> Escanear Código
                    </button>
                </div>
                <div id="reader" class="w-full"></div>
                
                <div class="mt-4">
                    <h2 class="font-bold text-gray-700 mb-2">Carrito de Venta</h2>
                    <div id="cart-items" class="divide-y divide-gray-100">
                        </div>
                    <div class="mt-4 pt-4 border-t border-gray-200">
                        <div class="flex justify-between text-2xl font-bold">
                            <span>Total:</span>
                            <span id="cart-total">$0.00</span>
                        </div>
                        <button onclick="completeSale()" class="w-full bg-green-600 text-white py-4 rounded-xl mt-4 font-bold text-xl shadow-lg active:scale-95 transition-transform">
                            COBRAR
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <section id="view-inventory" class="hidden space-y-4">
            <div class="bg-white p-6 rounded-xl shadow-md">
                <h2 class="text-xl font-bold mb-4">Agregar Producto</h2>
                <form id="product-form" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="p-name" placeholder="Nombre del producto" class="p-3 border rounded-lg" required>
                    <input type="number" id="p-price" placeholder="Precio ($)" step="0.01" class="p-3 border rounded-lg" required>
                    <input type="text" id="p-code" placeholder="Código de Barras" class="p-3 border rounded-lg" required>
                    <input type="date" id="p-expiry" class="p-3 border rounded-lg" required>
                    <button type="submit" class="md:col-span-2 bg-blue-600 text-white py-3 rounded-lg font-bold">Guardar Producto</button>
                </form>
            </div>

            <div class="bg-white p-4 rounded-xl shadow-md">
                <h2 class="font-bold mb-3">Productos Registrados</h2>
                <div id="inventory-list" class="space-y-2"></div>
            </div>
        </section>
    </main>

    <footer class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-2 shadow-[0_-2px_10px_rgba(0,0,0,0.1)]">
        <button onclick="switchView('pos')" class="flex flex-col items-center p-2 text-blue-600">
            <i data-lucide="layout-dashboard"></i>
            <span class="text-xs">Ventas</span>
        </button>
        <button onclick="switchView('inventory')" class="flex flex-col items-center p-2 text-gray-500">
            <i data-lucide="package"></i>
            <span class="text-xs">Inventario</span>
        </button>
    </footer>

    <script>
        let inventory = JSON.parse(localStorage.getItem('pos_inventory')) || [];
        let cart = [];
        let html5QrCode;

        // Inicializar iconos
        lucide.createIcons();

        // Guardar y Cargar
        function saveData() {
            localStorage.setItem('pos_inventory', JSON.stringify(inventory));
            checkExpirations();
        }

        // Navegación simple
        function switchView(view) {
            document.getElementById('view-pos').classList.toggle('hidden', view !== 'pos');
            document.getElementById('view-inventory').classList.toggle('hidden', view !== 'inventory');
            if(view === 'inventory') renderInventory();
        }

        // Gestión de Productos
        document.getElementById('product-form').onsubmit = (e) => {
            e.preventDefault();
            const newProd = {
                name: document.getElementById('p-name').value,
                price: parseFloat(document.getElementById('p-price').value),
                code: document.getElementById('p-code').value,
                expiry: document.getElementById('p-expiry').value
            };
            inventory.push(newProd);
            saveData();
            e.target.reset();
            renderInventory();
            alert("Producto agregado");
        };

        function renderInventory() {
            const list = document.getElementById('inventory-list');
            list.innerHTML = inventory.map((p, index) => `
                <div class="flex justify-between items-center p-3 bg-gray-50 rounded-lg">
                    <div>
                        <p class="font-bold">${p.name}</p>
                        <p class="text-sm text-gray-500">Cod: ${p.code} | Exp: ${p.expiry}</p>
                    </div>
                    <div class="text-right">
                        <p class="font-bold text-blue-600">$${p.price.toFixed(2)}</p>
                        <button onclick="deleteProduct(${index})" class="text-red-500 text-xs">Eliminar</button>
                    </div>
                </div>
            `).join('');
        }

        function deleteProduct(index) {
            inventory.splice(index, 1);
            saveData();
            renderInventory();
        }

        // Lógica de Escaneo
        function startScanner() {
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: { width: 250, height: 150 } },
                (decodedText) => {
                    addToCart(decodedText);
                    html5QrCode.stop();
                }
            ).catch(err => alert("Error de cámara: " + err));
        }

        function addToCart(code) {
            const product = inventory.find(p => p.code === code);
            if (product) {
                cart.push(product);
                renderCart();
            } else {
                alert("Producto no encontrado: " + code);
            }
        }

        function renderCart() {
            const container = document.getElementById('cart-items');
            let total = 0;
            container.innerHTML = cart.map((item, index) => {
                total += item.price;
                return `
                    <div class="flex justify-between py-2">
                        <span>${item.name}</span>
                        <div class="flex gap-4">
                            <span class="font-medium">$${item.price.toFixed(2)}</span>
                            <button onclick="removeFromCart(${index})" class="text-red-400">✕</button>
                        </div>
                    </div>
                `;
            }).join('');
            document.getElementById('cart-total').innerText = `$${total.toFixed(2)}`;
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            renderCart();
        }

        function completeSale() {
            if(cart.length === 0) return alert("Carrito vacío");
            alert("Venta completada con éxito");
            cart = [];
            renderCart();
        }

        // Sistema de Alertas de Caducidad
        function checkExpirations() {
            const today = new Date();
            const alertBadge = document.getElementById('expiry-alert');
            const expiredOrNear = inventory.some(p => {
                const expDate = new Date(p.expiry);
                const diffDays = (expDate - today) / (1000 * 60 * 60 * 24);
                return diffDays <= 7; // Avisa si faltan 7 días o menos
            });

            if(expiredOrNear) {
                alertBadge.classList.remove('hidden');
            } else {
                alertBadge.classList.add('hidden');
            }
        }

        // Inicializar
        checkExpirations();
    </script>
</body>
</html>
