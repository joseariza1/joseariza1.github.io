<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Flow - Cámara Dual</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        .hidden { display: none; }
        .grid-products { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; }
        #reader-pos video { object-fit: cover !important; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen pb-28 font-sans text-slate-800">

    <nav class="bg-indigo-700 text-white p-4 sticky top-0 z-50 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-black flex items-center gap-2"><i data-lucide="zap"></i> POS FLOW</h1>
        <div id="alert-stock" class="hidden bg-red-600 px-2 py-1 rounded text-[10px] animate-pulse uppercase">Stock Bajo</div>
    </nav>

    <main class="container mx-auto p-4 max-w-2xl">
        
        <section id="view-pos" class="space-y-4">
            
            <div class="relative bg-black rounded-3xl overflow-hidden shadow-xl border-4 border-white h-56">
                <div id="reader-pos" class="w-full h-full"></div>
                
                <div class="absolute top-3 right-3 flex flex-col gap-2">
                    <button onclick="toggleCamera()" class="bg-white/20 backdrop-blur-md text-white p-3 rounded-full hover:bg-white/40 transition-all">
                        <i data-lucide="refresh-cw"></i>
                    </button>
                </div>
                
                <div class="absolute inset-0 pointer-events-none flex items-center justify-center">
                    <div class="w-40 h-24 border-2 border-indigo-400/50 rounded-2xl shadow-[0_0_0_999px_rgba(0,0,0,0.4)]"></div>
                </div>
            </div>

            <div class="space-y-3">
                <div class="relative">
                    <i data-lucide="search" class="absolute left-3 top-3.5 text-slate-400 w-4 h-4"></i>
                    <input type="text" id="pos-search" oninput="renderCatalog(this.value)" placeholder="Buscar producto..." class="w-full pl-10 pr-4 py-3 rounded-2xl shadow-sm outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                
                <div id="product-catalog" class="grid-products max-h-40 overflow-y-auto p-1"></div>
            </div>
            
            <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-200">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-bold text-xs uppercase text-slate-400 tracking-widest">Carrito de Venta</h3>
                    <button onclick="clearCart()" class="text-[10px] bg-red-50 text-red-500 px-3 py-1 rounded-full font-bold">VACIAR</button>
                </div>
                
                <div id="cart-items" class="space-y-3 mb-6 max-h-52 overflow-y-auto"></div>
                
                <div class="bg-indigo-50 p-4 rounded-2xl border border-indigo-100">
                    <div class="flex justify-between items-center mb-4">
                        <span class="font-bold text-indigo-900/40">Total Neto</span>
                        <span id="cart-total" class="text-3xl font-black text-indigo-700">$0.00</span>
                    </div>
                    <button onclick="completeSale()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-4 rounded-2xl font-bold text-xl shadow-lg shadow-indigo-200 active:scale-95 transition-all">
                        REGISTRAR PAGO
                    </button>
                </div>
            </div>
        </section>

        <section id="view-inventory" class="hidden space-y-4">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                <h2 class="text-lg font-bold mb-4 flex items-center gap-2"><i data-lucide="plus-circle"></i> Nuevo Producto</h2>
                <form id="product-form" class="space-y-3">
                    <input type="text" id="p-name" placeholder="Nombre del Producto" class="w-full p-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-indigo-500" required>
                    
                    <div class="flex gap-2">
                        <input type="text" id="p-code" placeholder="Código de Barras" class="flex-1 p-4 bg-slate-50 border-none rounded-2xl text-sm">
                        <button type="button" onclick="startScannerReg()" class="bg-slate-900 text-white px-5 rounded-2xl shadow-lg"><i data-lucide="maximize"></i></button>
                    </div>
                    <div id="reader-reg" class="overflow-hidden rounded-2xl border-2 border-dashed border-slate-200"></div>

                    <div class="grid grid-cols-2 gap-3">
                        <div class="relative">
                            <span class="absolute left-4 top-4 text-slate-400">$</span>
                            <input type="number" id="p-price" placeholder="Precio" step="0.01" class="w-full p-4 pl-8 bg-slate-50 border-none rounded-2xl" required>
                        </div>
                        <select id="p-unit" class="p-4 bg-slate-50 border-none rounded-2xl text-sm appearance-none">
                            <option value="pza">Pieza (Pza)</option>
                            <option value="kg">Kilo (Kg)</option>
                            <option value="lt">Litro (Lt)</option>
                        </select>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3 text-xs text-slate-400">
                        <label>Stock Actual<input type="number" id="p-stock" class="w-full mt-1 p-4 bg-slate-50 border-none rounded-2xl text-slate-800" required></label>
                        <label>Aviso Stock Bajo<input type="number" id="p-min" class="w-full mt-1 p-4 bg-slate-50 border-none rounded-2xl text-slate-800" required></label>
                    </div>

                    <label class="block text-xs text-slate-400">Fecha de Caducidad
                        <input type="date" id="p-expiry" class="w-full mt-1 p-4 bg-slate-50 border-none rounded-2xl text-slate-800" required>
                    </label>
                    
                    <button type="submit" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold mt-2 shadow-xl active:scale-95">GUARDAR PRODUCTO</button>
                </form>
            </div>
            
            <div id="inventory-list" class="space-y-2"></div>
        </section>
    </main>

    <footer class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-xl border-t border-slate-100 flex justify-around p-4 shadow-2xl z-[100]">
        <button onclick="switchView('pos')" id="btn-pos" class="flex flex-col items-center text-indigo-600 transition-colors">
            <i data-lucide="layout-grid"></i><span class="text-[10px] font-black mt-1">VENTAS</span>
        </button>
        <button onclick="switchView('inventory')" id="btn-inv" class="flex flex-col items-center text-slate-400 transition-colors">
            <i data-lucide="package"></i><span class="text-[10px] font-black mt-1">STOCK</span>
        </button>
    </footer>

    <script>
        let inventory = JSON.parse(localStorage.getItem('pos_v5_data')) || [];
        let cart = [];
        let scannerActive = false;
        let html5QrCodePos;
        let currentFacingMode = "environment"; // Inicia con la trasera

        lucide.createIcons();

        function saveData() {
            localStorage.setItem('pos_v5_data', JSON.stringify(inventory));
            renderCatalog();
            checkAlerts();
        }

        async function switchView(view) {
            document.getElementById('view-pos').classList.toggle('hidden', view !== 'pos');
            document.getElementById('view-inventory').classList.toggle('hidden', view !== 'inventory');
            
            document.getElementById('btn-pos').className = view === 'pos' ? 'text-indigo-600 flex flex-col items-center' : 'text-slate-400 flex flex-col items-center';
            document.getElementById('btn-inv').className = view === 'inventory' ? 'text-indigo-600 flex flex-col items-center' : 'text-slate-400 flex flex-col items-center';

            if(view === 'pos') {
                renderCatalog();
                startScannerFlow();
            } else {
                stopScanner();
                renderInventory();
            }
        }

        // CONTROL DE CÁMARA
        async function startScannerFlow() {
            if(scannerActive) await stopScanner();
            
            html5QrCodePos = new Html5Qrcode("reader-pos");
            const config = { fps: 20, qrbox: { width: 220, height: 120 } };

            try {
                await html5QrCodePos.start({ facingMode: currentFacingMode }, config, (text) => {
                    const p = inventory.find(prod => prod.code === text);
                    if(p) {
                        addToCart(p.id);
                        navigator.vibrate?.(50); // Vibración al detectar (en móviles compatibles)
                    }
                });
                scannerActive = true;
            } catch (err) {
                console.error("Cámara no disponible", err);
            }
        }

        async function stopScanner() {
            if(html5QrCodePos && scannerActive) {
                await html5QrCodePos.stop();
                scannerActive = false;
            }
        }

        async function toggleCamera() {
            currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";
            await startScannerFlow();
        }

        // LÓGICA DE CARRITO (SUMA AUTOMÁTICA)
        function addToCart(id) {
            const product = inventory.find(p => p.id === id);
            if(!product || product.stock <= 0) return;

            const existing = cart.find(item => item.id === id);
            const qtyInCart = existing ? existing.qty : 0;

            if(qtyInCart + 1 > product.stock) {
                alert(`¡Stock insuficiente! Solo quedan ${product.stock} ${product.unit}`);
                return;
            }

            if(existing) {
                existing.qty += 1;
            } else {
                cart.push({ ...product, qty: 1 });
            }
            renderCart();
        }

        function renderCart() {
            const container = document.getElementById('cart-items');
            let total = 0;
            container.innerHTML = cart.map((item, idx) => {
                const sub = item.price * item.qty;
                total += sub;
                return `
                    <div class="flex justify-between items-center p-4 bg-slate-50 rounded-2xl animate-in fade-in zoom-in duration-200">
                        <div class="flex-1">
                            <p class="font-bold text-slate-800">${item.name}</p>
                            <p class="text-[10px] font-black text-indigo-500 uppercase">${item.qty} ${item.unit} x $${item.price.toFixed(2)}</p>
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="font-black text-slate-900">$${sub.toFixed(2)}</span>
                            <button onclick="removeFromCart(${idx})" class="bg-white text-red-500 w-8 h-8 rounded-full shadow-sm flex items-center justify-center font-bold">✕</button>
                        </div>
                    </div>
                `;
            }).join('');
            document.getElementById('cart-total').innerText = `$${total.toFixed(2)}`;
        }

        function removeFromCart(idx) {
            if(cart[idx].qty > 1) cart[idx].qty -= 1;
            else cart.splice(idx, 1);
            renderCart();
        }

        function clearCart() { cart = []; renderCart(); }

        function completeSale() {
            if(cart.length === 0) return;
            cart.forEach(item => {
                const p = inventory.find(inv => inv.id === item.id);
                if(p) p.stock -= item.qty;
            });
            saveData();
            clearCart();
            alert("Venta registrada. Inventario actualizado.");
        }

        // CATÁLOGO E INVENTARIO
        function renderCatalog(filter = "") {
            const catalog = document.getElementById('product-catalog');
            const filtered = inventory.filter(p => p.name.toLowerCase().includes(filter.toLowerCase()));
            catalog.innerHTML = filtered.map(p => `
                <button onclick="addToCart(${p.id})" class="flex flex-col items-center p-3 bg-white border border-slate-100 rounded-2xl active:scale-90 transition-all ${p.stock <= p.min ? 'bg-red-50 border-red-200' : ''}">
                    <span class="text-[11px] font-bold text-center leading-tight h-7 overflow-hidden text-slate-700">${p.name}</span>
                    <span class="text-indigo-600 font-black text-xs mt-1">$${p.price.toFixed(2)}</span>
                    <span class="text-[8px] text-slate-400 mt-1 uppercase">S: ${p.stock}</span>
                </button>
            `).join('');
        }

        document.getElementById('product-form').onsubmit = (e) => {
            e.preventDefault();
            inventory.push({
                id: Date.now(),
                name: document.getElementById('p-name').value,
                code: document.getElementById('p-code').value,
                price: parseFloat(document.getElementById('p-price').value),
                unit: document.getElementById('p-unit').value,
                stock: parseFloat(document.getElementById('p-stock').value),
                min: parseFloat(document.getElementById('p-min').value),
                expiry: document.getElementById('p-expiry').value
            });
            saveData();
            e.target.reset();
            alert("¡Producto añadido!");
        };

        function startScannerReg() {
            const scanner = new Html5Qrcode("reader-reg");
            scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 200 }, (text) => {
                document.getElementById('p-code').value = text;
                scanner.stop();
            });
        }

        function renderInventory() {
            const list = document.getElementById('inventory-list');
            list.innerHTML = inventory.map((p, idx) => `
                <div class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm">
                    <div class="text-xs">
                        <p class="font-bold text-slate-800 text-sm">${p.name}</p>
                        <p class="text-slate-400">Stock: <span class="${p.stock <= p.min ? 'text-red-500 font-bold' : ''}">${p.stock}</span> | Mín: ${p.min}</p>
                    </div>
                    <button onclick="inventory.splice(${idx},1); saveData(); renderInventory();" class="text-red-200 hover:text-red-500">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function checkAlerts() {
            const low = inventory.some(p => p.stock <= p.min);
            document.getElementById('alert-stock').classList.toggle('hidden', !low);
        }

        // Inicio
        switchView('pos');
    </script>
</body>
</html>
