<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Flow - Ultra Fast</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        .hidden { display: none; }
        .catalog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; }
        #reader-pos video, #reader-reg video { object-fit: cover !important; border-radius: 1.5rem; }
        .scanner-lock { border-color: #f59e0b !important; opacity: 0.6; }
        
        @media (min-width: 1024px) {
            .main-layout { display: grid; grid-template-columns: 1fr 420px; gap: 24px; height: calc(100vh - 100px); }
            .scroll-area { overflow-y: auto; height: 100%; padding-right: 10px; }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20 lg:pb-0 font-sans text-slate-900">

    <nav class="bg-indigo-700 text-white p-4 sticky top-0 z-50 shadow-lg flex justify-between items-center">
        <h1 class="text-xl font-black tracking-tighter flex items-center gap-2"><i data-lucide="zap"></i> POS FLOW</h1>
        <div id="scanner-status" class="text-[9px] font-black px-3 py-1 bg-green-500 rounded-full uppercase tracking-widest">Listo</div>
    </nav>

    <main class="container mx-auto p-4 lg:p-8 max-w-7xl">
        <section id="view-pos" class="main-layout">
            <div class="scroll-area space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div id="scanner-container" class="relative bg-slate-900 rounded-[2rem] overflow-hidden h-44 md:h-64 border-4 border-white transition-all">
                        <div id="reader-pos" class="w-full h-full"></div>
                    </div>
                    
                    <div class="space-y-4">
                        <div class="relative">
                            <i data-lucide="search" class="absolute left-4 top-4 text-slate-400 w-4 h-4"></i>
                            <input type="text" id="pos-search" oninput="renderCatalog(this.value)" placeholder="Buscar producto..." class="w-full pl-10 p-4 bg-white rounded-2xl shadow-sm border-none ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-500">
                        </div>
                        <div id="product-catalog" class="catalog-grid"></div>
                    </div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-[2.5rem] shadow-xl border border-slate-100 flex flex-col mt-6 lg:mt-0">
                <h3 class="font-black text-slate-400 text-[10px] uppercase mb-4 tracking-[0.2em]">Cuenta Actual</h3>
                <div id="cart-items" class="flex-1 overflow-y-auto space-y-2 mb-6 pr-2">
                    </div>
                
                <div class="bg-indigo-50 p-6 rounded-[2.5rem] border border-indigo-100">
                    <div class="flex justify-between items-end mb-4">
                        <span class="text-indigo-900/40 font-black text-[10px] uppercase">Total Neto</span>
                        <span id="cart-total" class="text-4xl font-black text-indigo-700">$0.00</span>
                    </div>
                    <button onclick="completeSale()" class="w-full bg-indigo-600 text-white py-5 rounded-[1.5rem] font-black text-xl shadow-lg active:scale-95 transition-all">COBRAR VENTA</button>
                </div>
            </div>
        </section>

        <section id="view-inventory" class="hidden max-w-2xl mx-auto space-y-6">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-xl">
                <h2 class="text-xl font-black mb-6">Registro de Inventario</h2>
                <form id="product-form" class="space-y-4">
                    <input type="text" id="p-name" placeholder="Nombre" class="w-full p-4 bg-slate-50 rounded-2xl outline-none" required>
                    <div class="flex gap-2">
                        <input type="text" id="p-code" placeholder="Código de Barras" class="flex-1 p-4 bg-slate-50 rounded-2xl outline-none">
                        <button type="button" onclick="startScannerReg()" class="bg-slate-800 text-white px-6 rounded-2xl"><i data-lucide="camera"></i></button>
                    </div>
                    <div id="reader-reg" class="hidden rounded-2xl overflow-hidden h-48 bg-black"></div>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="number" id="p-price" placeholder="Precio $" step="0.1" class="p-4 bg-slate-50 rounded-2xl outline-none" required>
                        <select id="p-unit" class="p-4 bg-slate-50 rounded-2xl outline-none"><option value="pza">Pieza</option><option value="kg">Kilo</option></select>
                        <input type="number" id="p-stock" placeholder="Stock" class="p-4 bg-slate-50 rounded-2xl outline-none" required>
                        <input type="number" id="p-min" placeholder="Mínimo" class="p-4 bg-slate-50 rounded-2xl outline-none" required>
                    </div>
                    <input type="date" id="p-expiry" class="w-full p-4 bg-slate-50 rounded-2xl outline-none">
                    <button type="submit" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black">GUARDAR</button>
                </form>
            </div>
            <div id="inventory-list" class="space-y-2"></div>
        </section>
    </main>

    <footer class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md p-4 flex justify-around border-t lg:hidden z-50">
        <button onclick="switchView('pos')" class="flex flex-col items-center text-indigo-600 font-bold"><i data-lucide="shopping-cart"></i><span class="text-[10px] mt-1">VENTA</span></button>
        <button onclick="switchView('inventory')" class="flex flex-col items-center text-slate-400 font-bold"><i data-lucide="package"></i><span class="text-[10px] mt-1">STOCK</span></button>
    </footer>

    <script>
        let inventory = JSON.parse(localStorage.getItem('pos_v11_data')) || [];
        let cart = [];
        let scannerIsLocked = false;
        let html5QrCodePos;
        let html5QrCodeReg;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playBeep() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        lucide.createIcons();

        // --- Lógica Directa de Venta (Sin Modal) ---
        function quickAdd(id) {
            const product = inventory.find(p => p.id === id);
            if (!product) return;

            const existingIdx = cart.findIndex(item => item.id === id);
            if (existingIdx !== -1) {
                if (cart[existingIdx].qty + 1 > product.stock) return alert("Sin stock");
                cart[existingIdx].qty += 1;
            } else {
                if (product.stock < 1) return alert("Producto agotado");
                cart.push({ ...product, qty: 1 });
            }
            renderCart();
            playBeep();
        }

        // --- Escáner ---
        async function startScannerFlow() {
            if(html5QrCodeReg) { await html5QrCodeReg.stop(); html5QrCodeReg = null; }
            html5QrCodePos = new Html5Qrcode("reader-pos");
            try {
                await html5QrCodePos.start({ facingMode: "environment" }, { fps: 20, qrbox: { width: 250, height: 120 } }, (text) => {
                    if (scannerIsLocked) return;
                    const p = inventory.find(prod => prod.code === text);
                    if (p) {
                        lockScanner();
                        quickAdd(p.id);
                    }
                });
            } catch (e) {}
        }

        function lockScanner() {
            scannerIsLocked = true;
            document.getElementById('scanner-container').classList.add('scanner-lock');
            document.getElementById('scanner-status').classList.replace('bg-green-500', 'bg-amber-500');
            document.getElementById('scanner-status').innerText = "Procesando...";
            setTimeout(() => {
                scannerIsLocked = false;
                document.getElementById('scanner-container').classList.remove('scanner-lock');
                document.getElementById('scanner-status').classList.replace('bg-amber-500', 'bg-green-500');
                document.getElementById('scanner-status').innerText = "Listo";
            }, 2000);
        }

        // --- Interfaz del Carrito ---
        function updateQty(id, change) {
            const idx = cart.findIndex(item => item.id === id);
            const p = inventory.find(prod => prod.id === id);
            if (idx !== -1) {
                const newQty = cart[idx].qty + change;
                if (newQty > p.stock) return alert("Límite de stock");
                if (newQty <= 0) cart.splice(idx, 1);
                else cart[idx].qty = newQty;
                renderCart();
            }
        }

        function renderCart() {
            const container = document.getElementById('cart-items');
            let total = 0;
            container.innerHTML = cart.map(item => {
                total += (item.price * item.qty);
                return `
                    <div class="flex justify-between items-center p-4 bg-slate-50 border border-slate-100 rounded-3xl animate-in slide-in-from-right duration-200">
                        <div class="flex-1"><p class="font-black text-xs text-slate-800 uppercase">${item.name}</p></div>
                        <div class="flex items-center gap-3">
                            <div class="flex items-center bg-white rounded-xl p-1 shadow-sm">
                                <button onclick="updateQty(${item.id}, -1)" class="w-8 h-8 flex items-center justify-center text-indigo-600 font-bold hover:bg-slate-50 rounded-lg">-</button>
                                <span class="px-3 font-black text-xs">${item.qty}</span>
                                <button onclick="updateQty(${item.id}, 1)" class="w-8 h-8 flex items-center justify-center text-indigo-600 font-bold hover:bg-slate-50 rounded-lg">+</button>
                            </div>
                            <span class="w-16 text-right font-black text-indigo-700">$${(item.price * item.qty).toFixed(2)}</span>
                        </div>
                    </div>
                `;
            }).join('');
            document.getElementById('cart-total').innerText = `$${total.toFixed(2)}`;
        }

        // --- Otras Funciones ---
        function completeSale() {
            if (cart.length === 0) return;
            cart.forEach(item => { const p = inventory.find(inv => inv.id === item.id); if (p) p.stock -= item.qty; });
            localStorage.setItem('pos_v11_data', JSON.stringify(inventory));
            cart = []; renderCart(); alert("✅ Venta Completada");
        }

        async function switchView(view) {
            document.getElementById('view-pos').classList.toggle('hidden', view !== 'pos');
            document.getElementById('view-inventory').classList.toggle('hidden', view !== 'inventory');
            if (view === 'pos') { stopScannerReg(); startScannerFlow(); renderCatalog(); } 
            else { if(html5QrCodePos) await html5QrCodePos.stop(); renderInventory(); }
        }

        function renderCatalog(f = "") {
            document.getElementById('product-catalog').innerHTML = inventory.filter(p => p.name.toLowerCase().includes(f.toLowerCase())).map(p => `
                <button onclick="quickAdd(${p.id})" class="p-3 bg-white border border-slate-100 rounded-2xl shadow-sm text-center active:scale-95 transition-all">
                    <p class="text-[9px] font-black truncate text-slate-500 mb-1">${p.name}</p>
                    <p class="text-indigo-600 font-black text-xs">$${p.price.toFixed(2)}</p>
                </button>
            `).join('');
        }

        async function startScannerReg() {
            document.getElementById('reader-reg').classList.remove('hidden');
            if(html5QrCodePos) { await html5QrCodePos.stop(); html5QrCodePos = null; }
            html5QrCodeReg = new Html5Qrcode("reader-reg");
            try { await html5QrCodeReg.start({ facingMode: "environment" }, { fps: 15, qrbox: 200 }, (text) => {
                document.getElementById('p-code').value = text;
                playBeep(); stopScannerReg();
            }); } catch (e) {}
        }

        async function stopScannerReg() { if(html5QrCodeReg) { await html5QrCodeReg.stop(); html5QrCodeReg = null; document.getElementById('reader-reg').classList.add('hidden'); } }

        document.getElementById('product-form').onsubmit = (e) => {
            e.preventDefault();
            inventory.push({
                id: Date.now(),
                name: document.getElementById('p-name').value,
                code: document.getElementById('p-code').value,
                price: parseFloat(document.getElementById('p-price').value),
                unit: document.getElementById('p-unit').value,
                stock: parseFloat(document.getElementById('p-stock').value),
                min: parseFloat(document.getElementById('p-min').value),
                expiry: document.getElementById('p-expiry').value || "N/A"
            });
            localStorage.setItem('pos_v11_data', JSON.stringify(inventory));
            e.target.reset(); renderInventory(); alert("Guardado");
        };

        function renderInventory() {
            document.getElementById('inventory-list').innerHTML = inventory.map((p, i) => `
                <div class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm">
                    <div><p class="font-bold text-sm">${p.name}</p><p class="text-[10px] text-slate-400 uppercase font-black">Stock: ${p.stock} | Exp: ${p.expiry}</p></div>
                    <button onclick="inventory.splice(${i}, 1); localStorage.setItem('pos_v11_data', JSON.stringify(inventory)); renderInventory();" class="text-red-200 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        switchView('pos');
    </script>
</body>
</html>
