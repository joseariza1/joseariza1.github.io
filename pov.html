<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Flow - Sonido y Cantidades</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        .hidden { display: none; }
        .grid-products { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 8px; }
        #reader-pos video { object-fit: cover !important; border-radius: 24px; }
        .modal-active { display: flex !important; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen pb-28 font-sans text-slate-800">

    <div id="modal-qty" class="hidden fixed inset-0 bg-black/60 z-[200] items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-xs rounded-3xl p-6 shadow-2xl animate-in zoom-in duration-200">
            <h3 id="modal-title" class="text-center font-black text-slate-700 mb-4 text-lg">Cantidad</h3>
            <input type="number" id="input-qty" value="1" min="1" class="w-full text-center text-4xl font-black p-4 bg-slate-100 rounded-2xl border-none focus:ring-4 focus:ring-indigo-500 mb-4">
            <div class="flex gap-2">
                <button onclick="closeModal()" class="flex-1 py-4 bg-slate-200 rounded-2xl font-bold text-slate-500">Cancelar</button>
                <button onclick="confirmAdd()" class="flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg shadow-indigo-200">Agregar</button>
            </div>
        </div>
    </div>

    <nav class="bg-indigo-700 text-white p-4 sticky top-0 z-50 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-black flex items-center gap-2"><i data-lucide="zap"></i> POS FLOW</h1>
        <div id="alert-stock" class="hidden bg-red-600 px-2 py-1 rounded text-[10px] animate-pulse">STOCK BAJO</div>
    </nav>

    <main class="container mx-auto p-4 max-w-2xl">
        
        <section id="view-pos" class="space-y-4">
            <div class="relative bg-black rounded-[2rem] overflow-hidden shadow-xl border-4 border-white h-52">
                <div id="reader-pos" class="w-full h-full"></div>
                <div class="absolute top-3 right-3">
                    <button onclick="toggleCamera()" class="bg-white/20 backdrop-blur-md text-white p-3 rounded-full"><i data-lucide="refresh-cw"></i></button>
                </div>
            </div>

            <div class="space-y-3">
                <input type="text" id="pos-search" oninput="renderCatalog(this.value)" placeholder="Buscar producto..." class="w-full p-4 rounded-2xl shadow-sm outline-none focus:ring-2 focus:ring-indigo-500 border-none">
                <div id="product-catalog" class="grid-products max-h-36 overflow-y-auto"></div>
            </div>
            
            <div class="bg-white p-5 rounded-[2rem] shadow-sm border border-slate-200">
                <div id="cart-items" class="space-y-3 mb-6 max-h-52 overflow-y-auto"></div>
                <div class="bg-indigo-50 p-5 rounded-2xl border border-indigo-100 text-center">
                    <span class="block text-indigo-900/40 font-bold uppercase text-[10px] tracking-widest mb-1">Total a cobrar</span>
                    <span id="cart-total" class="text-4xl font-black text-indigo-700 leading-none">$0.00</span>
                    <button onclick="completeSale()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold text-xl mt-4 shadow-lg active:scale-95 transition-all">TERMINAR VENTA</button>
                </div>
            </div>
        </section>

        <section id="view-inventory" class="hidden space-y-4">
            <div class="bg-white p-6 rounded-[2rem] shadow-sm">
                <h2 class="text-lg font-bold mb-4">Registrar Producto</h2>
                <form id="product-form" class="space-y-3">
                    <input type="text" id="p-name" placeholder="Nombre" class="w-full p-4 bg-slate-50 border-none rounded-2xl" required>
                    <div class="flex gap-2">
                        <input type="text" id="p-code" placeholder="Código de Barras" class="flex-1 p-4 bg-slate-50 border-none rounded-2xl">
                        <button type="button" onclick="startScannerReg()" class="bg-slate-900 text-white px-5 rounded-2xl"><i data-lucide="camera"></i></button>
                    </div>
                    <div id="reader-reg" class="overflow-hidden rounded-2xl"></div>
                    <div class="grid grid-cols-2 gap-3">
                        <input type="number" id="p-price" placeholder="Precio $" step="0.01" class="p-4 bg-slate-50 border-none rounded-2xl" required>
                        <select id="p-unit" class="p-4 bg-slate-50 border-none rounded-2xl text-sm"><option value="pza">Pieza</option><option value="kg">Kilo</option></select>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <input type="number" id="p-stock" placeholder="Stock" class="p-4 bg-slate-50 border-none rounded-2xl" required>
                        <input type="number" id="p-min" placeholder="Mínimo" class="p-4 bg-slate-50 border-none rounded-2xl" required>
                    </div>
                    <input type="date" id="p-expiry" class="w-full p-4 bg-slate-50 border-none rounded-2xl" required>
                    <button type="submit" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold shadow-xl">GUARDAR</button>
                </form>
            </div>
            <div id="inventory-list" class="space-y-2"></div>
        </section>
    </main>

    <footer class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md flex justify-around p-4 shadow-2xl z-50 border-t">
        <button onclick="switchView('pos')" id="btn-pos" class="flex flex-col items-center text-indigo-600"><i data-lucide="shopping-bag"></i><span class="text-[10px] font-bold mt-1 uppercase">Venta</span></button>
        <button onclick="switchView('inventory')" id="btn-inv" class="flex flex-col items-center text-slate-400"><i data-lucide="package"></i><span class="text-[10px] font-bold mt-1 uppercase">Stock</span></button>
    </footer>

    <script>
        let inventory = JSON.parse(localStorage.getItem('pos_v6_data')) || [];
        let cart = [];
        let scannerActive = false;
        let html5QrCodePos;
        let currentFacingMode = "environment";
        let tempProductId = null; // Para el modal

        lucide.createIcons();

        // FUNCIÓN PITIDO (BEEP)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playBeep() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = "sine";
            osc.frequency.setValueAtTime(880, audioCtx.currentTime); // Tono alto
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        async function switchView(view) {
            document.getElementById('view-pos').classList.toggle('hidden', view !== 'pos');
            document.getElementById('view-inventory').classList.toggle('hidden', view !== 'inventory');
            document.getElementById('btn-pos').className = view === 'pos' ? 'text-indigo-600 flex flex-col items-center' : 'text-slate-400 flex flex-col items-center';
            document.getElementById('btn-inv').className = view === 'inventory' ? 'text-indigo-600 flex flex-col items-center' : 'text-slate-400 flex flex-col items-center';
            if(view === 'pos') { renderCatalog(); startScannerFlow(); } else { stopScanner(); renderInventory(); }
        }

        // CONTROL ESCÁNER
        async function startScannerFlow() {
            if(scannerActive) await stopScanner();
            html5QrCodePos = new Html5Qrcode("reader-pos");
            try {
                await html5QrCodePos.start({ facingMode: currentFacingMode }, { fps: 20, qrbox: { width: 250, height: 150 } }, (text) => {
                    const p = inventory.find(prod => prod.code === text);
                    if(p && tempProductId === null) { // Evita abrir múltiples modales
                        playBeep();
                        openModal(p.id);
                    }
                });
                scannerActive = true;
            } catch (err) { console.error(err); }
        }

        async function stopScanner() {
            if(html5QrCodePos && scannerActive) { await html5QrCodePos.stop(); scannerActive = false; }
        }

        function toggleCamera() { currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment"; startScannerFlow(); }

        // LÓGICA DE MODAL Y CANTIDADES
        function openModal(id) {
            const p = inventory.find(prod => prod.id === id);
            tempProductId = id;
            document.getElementById('modal-title').innerText = p.name;
            document.getElementById('input-qty').value = 1;
            document.getElementById('modal-qty').classList.add('modal-active');
            setTimeout(() => document.getElementById('input-qty').select(), 100);
        }

        function closeModal() {
            document.getElementById('modal-qty').classList.remove('modal-active');
            tempProductId = null;
        }

        function confirmAdd() {
            const qty = parseFloat(document.getElementById('input-qty').value);
            if(qty > 0) {
                addToCart(tempProductId, qty);
                closeModal();
            }
        }

        function addToCart(id, qty) {
            const p = inventory.find(prod => prod.id === id);
            if(!p || p.stock < qty) return alert("¡Stock insuficiente!");

            const existing = cart.find(item => item.id === id);
            if(existing) {
                if(existing.qty + qty > p.stock) return alert("¡Stock insuficiente!");
                existing.qty += qty;
            } else {
                cart.push({ ...p, qty: qty });
            }
            renderCart();
        }

        function renderCart() {
            const container = document.getElementById('cart-items');
            let total = 0;
            container.innerHTML = cart.map((item, idx) => {
                total += (item.price * item.qty);
                return `<div class="flex justify-between items-center p-4 bg-slate-50 rounded-2xl">
                    <div><p class="font-bold text-sm text-slate-800">${item.name}</p>
                    <p class="text-[10px] font-black text-indigo-500 uppercase">${item.qty} ${item.unit} x $${item.price.toFixed(2)}</p></div>
                    <div class="flex items-center gap-4"><span class="font-black text-indigo-700">$${(item.price * item.qty).toFixed(2)}</span>
                    <button onclick="cart.splice(${idx},1); renderCart();" class="text-red-400">✕</button></div>
                </div>`;
            }).join('');
            document.getElementById('cart-total').innerText = `$${total.toFixed(2)}`;
        }

        function completeSale() {
            if(cart.length === 0) return;
            cart.forEach(item => { const p = inventory.find(inv => inv.id === item.id); if(p) p.stock -= item.qty; });
            saveData(); cart = []; renderCart(); alert("✅ Venta Completa");
        }

        function renderCatalog(filter = "") {
            const catalog = document.getElementById('product-catalog');
            const filtered = inventory.filter(p => p.name.toLowerCase().includes(filter.toLowerCase()));
            catalog.innerHTML = filtered.map(p => `
                <button onclick="openModal(${p.id})" class="flex flex-col items-center p-2 bg-white border border-slate-100 rounded-2xl active:scale-90 transition-all">
                    <span class="text-[10px] font-bold text-center leading-tight h-7 overflow-hidden text-slate-600">${p.name}</span>
                    <span class="text-indigo-600 font-black text-[11px] mt-1">$${p.price.toFixed(2)}</span>
                </button>
            `).join('');
        }

        // El resto de funciones de Inventario se mantienen igual
        document.getElementById('product-form').onsubmit = (e) => {
            e.preventDefault();
            inventory.push({
                id: Date.now(),
                name: document.getElementById('p-name').value,
                code: document.getElementById('p-code').value,
                price: parseFloat(document.getElementById('p-price').value),
                unit: document.getElementById('p-unit').value,
                stock: parseFloat(document.getElementById('p-stock').value),
                min: parseFloat(document.getElementById('p-min').value),
                expiry: document.getElementById('p-expiry').value
            });
            saveData(); e.target.reset(); alert("¡Guardado!");
        };

        function startScannerReg() {
            const sc = new Html5Qrcode("reader-reg");
            sc.start({ facingMode: "environment" }, { fps: 10, qrbox: 200 }, (t) => {
                document.getElementById('p-code').value = t; playBeep(); sc.stop();
            });
        }

        function renderInventory() {
            const list = document.getElementById('inventory-list');
            list.innerHTML = inventory.map((p, idx) => `<div class="bg-white p-4 rounded-2xl flex justify-between shadow-sm">
                <div class="text-xs"><p class="font-bold text-slate-800">${p.name}</p>
                <p class="text-slate-400">Stock: ${p.stock} | Mín: ${p.min}</p></div>
                <button onclick="inventory.splice(${idx},1); saveData(); renderInventory();" class="text-red-200">Eliminar</button>
            </div>`).join('');
        }

        function saveData() { localStorage.setItem('pos_v6_data', JSON.stringify(inventory)); renderCatalog(); }
        
        switchView('pos');
    </script>
</body>
</html>
