<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Flow Multidevice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        .hidden { display: none; }
        /* Grid dinámico: 2 columnas en móvil, hasta 6 en PC */
        .catalog-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); 
            gap: 12px; 
        }
        #reader-pos video { object-fit: cover !important; border-radius: 1.5rem; }
        
        /* Ajuste para pantallas grandes (Layout de Escritorio) */
        @media (min-width: 1024px) {
            .main-layout {
                display: grid;
                grid-template-columns: 1fr 400px;
                gap: 24px;
                align-items: start;
            }
            .sidebar-cart {
                position: sticky;
                top: 80px;
                height: calc(100vh - 120px);
            }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20 lg:pb-0 font-sans text-slate-900">

    <div id="modal-qty" class="hidden fixed inset-0 bg-slate-900/80 z-[200] items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl scale-up-center">
            <h3 id="modal-title" class="text-center font-black text-2xl text-slate-800 mb-6 uppercase tracking-tight">Producto</h3>
            <input type="number" id="input-qty" value="1" class="w-full text-center text-5xl font-black p-6 bg-slate-100 rounded-3xl border-none focus:ring-4 focus:ring-indigo-500 mb-6">
            <div class="flex gap-4">
                <button onclick="closeModal()" class="flex-1 py-5 bg-slate-200 rounded-3xl font-bold text-slate-600 hover:bg-slate-300 transition-all">Cancelar</button>
                <button onclick="confirmAdd()" class="flex-1 py-5 bg-indigo-600 text-white rounded-3xl font-bold shadow-lg shadow-indigo-200 hover:bg-indigo-700 active:scale-95 transition-all">Agregar</button>
            </div>
        </div>
    </div>

    <nav class="bg-indigo-700 text-white p-4 sticky top-0 z-50 shadow-lg">
        <div class="container mx-auto flex justify-between items-center max-w-7xl">
            <div class="flex items-center gap-3">
                <div class="bg-white/20 p-2 rounded-xl"><i data-lucide="layout-grid" class="w-6 h-6"></i></div>
                <h1 class="text-xl font-black tracking-tighter">POS <span class="text-indigo-200">FLOW</span></h1>
            </div>
            <div id="alert-stock" class="hidden bg-red-500 px-4 py-1.5 rounded-full text-[10px] font-black animate-pulse border-2 border-white/20">REVISAR STOCK</div>
        </div>
    </nav>

    <main class="container mx-auto p-4 lg:p-8 max-w-7xl">
        
        <section id="view-pos" class="main-layout">
            
            <div class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 items-center">
                    <div class="relative bg-slate-900 rounded-[2rem] overflow-hidden shadow-2xl h-52 md:h-64 border-4 border-white">
                        <div id="reader-pos" class="w-full h-full"></div>
                        <button onclick="toggleCamera()" class="absolute top-4 right-4 bg-white/10 backdrop-blur-md text-white p-3 rounded-2xl hover:bg-white/30 transition-all">
                            <i data-lucide="refresh-cw"></i>
                        </button>
                    </div>
                    
                    <div class="space-y-4">
                        <div class="relative group">
                            <i data-lucide="search" class="absolute left-4 top-4.5 text-slate-400 w-5 h-5 transition-colors group-focus-within:text-indigo-500"></i>
                            <input type="text" id="pos-search" oninput="renderCatalog(this.value)" placeholder="Buscar producto..." class="w-full pl-12 pr-4 py-4 bg-white rounded-2xl shadow-sm border-none focus:ring-4 focus:ring-indigo-100 outline-none text-lg">
                        </div>
                        <p class="text-slate-400 text-xs font-bold uppercase tracking-widest pl-2">Acceso Rápido</p>
                        <div id="product-catalog" class="catalog-grid overflow-y-auto max-h-[300px] lg:max-h-none pr-2"></div>
                    </div>
                </div>
            </div>

            <div class="sidebar-cart mt-6 lg:mt-0">
                <div class="bg-white p-6 rounded-[2.5rem] shadow-xl border border-slate-100 flex flex-col h-full">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="font-black text-slate-400 text-xs uppercase tracking-[0.2em]">Orden Actual</h3>
                        <button onclick="clearCart()" class="text-red-400 hover:text-red-600 transition-colors"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                    </div>
                    
                    <div id="cart-items" class="flex-1 space-y-3 overflow-y-auto mb-6 px-1">
                        </div>
                    
                    <div class="bg-slate-50 p-6 rounded-[2rem] border border-slate-100 space-y-4">
                        <div class="flex justify-between items-end">
                            <span class="text-slate-400 font-bold uppercase text-[10px]">Total Neto</span>
                            <span id="cart-total" class="text-4xl font-black text-indigo-700 leading-none">$0.00</span>
                        </div>
                        <button onclick="completeSale()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-5 rounded-[1.5rem] font-black text-xl shadow-xl shadow-indigo-100 active:scale-95 transition-all">
                            REGISTRAR PAGO
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <section id="view-inventory" class="hidden max-w-4xl mx-auto space-y-6">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-xl">
                <h2 class="text-2xl font-black mb-6 text-slate-800">Panel de Inventario</h2>
                <form id="product-form" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="p-name" placeholder="Nombre del producto" class="p-4 bg-slate-50 border-none rounded-2xl md:col-span-2 focus:ring-4 focus:ring-indigo-50" required>
                    <div class="flex gap-2 md:col-span-2">
                        <input type="text" id="p-code" placeholder="Código de Barras" class="flex-1 p-4 bg-slate-50 border-none rounded-2xl">
                        <button type="button" onclick="startScannerReg()" class="bg-slate-800 text-white px-6 rounded-2xl"><i data-lucide="camera"></i></button>
                    </div>
                    <div id="reader-reg" class="md:col-span-2 overflow-hidden rounded-3xl"></div>
                    <input type="number" id="p-price" placeholder="Precio $" step="0.01" class="p-4 bg-slate-50 border-none rounded-2xl" required>
                    <select id="p-unit" class="p-4 bg-slate-50 border-none rounded-2xl"><option value="pza">Pieza</option><option value="kg">Kilo</option></select>
                    <input type="number" id="p-stock" placeholder="Stock Inicial" class="p-4 bg-slate-50 border-none rounded-2xl" required>
                    <input type="number" id="p-min" placeholder="Stock Mínimo" class="p-4 bg-slate-50 border-none rounded-2xl" required>
                    <input type="date" id="p-expiry" class="p-4 bg-slate-50 border-none rounded-2xl md:col-span-2" required>
                    <button type="submit" class="md:col-span-2 bg-indigo-600 text-white py-5 rounded-2xl font-black text-lg shadow-xl shadow-indigo-100 hover:bg-indigo-700">GUARDAR EN SISTEMA</button>
                </form>
            </div>
            <div id="inventory-list" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
        </section>
    </main>

    <footer class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-xl border-t border-slate-100 flex justify-around p-4 shadow-2xl z-50 lg:hidden">
        <button onclick="switchView('pos')" id="btn-pos" class="flex flex-col items-center text-indigo-600 font-black"><i data-lucide="shopping-bag"></i><span class="text-[9px] mt-1">VENTAS</span></button>
        <button onclick="switchView('inventory')" id="btn-inv" class="flex flex-col items-center text-slate-400 font-black"><i data-lucide="package"></i><span class="text-[9px] mt-1">INVENTARIO</span></button>
    </footer>

    <div class="hidden lg:flex fixed left-6 top-1/2 -translate-y-1/2 flex-col gap-4 z-50">
        <button onclick="switchView('pos')" class="bg-white p-4 rounded-2xl shadow-lg hover:bg-indigo-50 text-indigo-600 transition-all"><i data-lucide="shopping-cart"></i></button>
        <button onclick="switchView('inventory')" class="bg-white p-4 rounded-2xl shadow-lg hover:bg-indigo-50 text-slate-400 transition-all"><i data-lucide="package"></i></button>
    </div>

    <script>
        // Lógica de datos y sonido
        let inventory = JSON.parse(localStorage.getItem('pos_v7_data')) || [];
        let cart = [];
        let scannerActive = false;
        let html5QrCodePos;
        let currentFacingMode = "environment";
        let tempProductId = null;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playBeep() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = "sine"; osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        lucide.createIcons();

        function switchView(view) {
            document.getElementById('view-pos').classList.toggle('hidden', view !== 'pos');
            document.getElementById('view-inventory').classList.toggle('hidden', view !== 'inventory');
            
            // Actualizar botones (Móvil)
            document.getElementById('btn-pos').className = view === 'pos' ? 'text-indigo-600 flex flex-col items-center font-black' : 'text-slate-400 flex flex-col items-center font-black';
            document.getElementById('btn-inv').className = view === 'inventory' ? 'text-indigo-600 flex flex-col items-center font-black' : 'text-slate-400 flex flex-col items-center font-black';

            if(view === 'pos') { renderCatalog(); startScannerFlow(); } else { stopScanner(); renderInventory(); }
        }

        // --- Lógica de Escáner y Ventas ---
        async function startScannerFlow() {
            if(scannerActive) await stopScanner();
            html5QrCodePos = new Html5Qrcode("reader-pos");
            try {
                await html5QrCodePos.start({ facingMode: currentFacingMode }, { fps: 20, qrbox: { width: 250, height: 150 } }, (text) => {
                    const p = inventory.find(prod => prod.code === text);
                    if(p && tempProductId === null) { playBeep(); openModal(p.id); }
                });
                scannerActive = true;
            } catch (err) {}
        }

        async function stopScanner() { if(html5QrCodePos && scannerActive) { await html5QrCodePos.stop(); scannerActive = false; } }
        function toggleCamera() { currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment"; startScannerFlow(); }

        function openModal(id) {
            const p = inventory.find(prod => prod.id === id);
            tempProductId = id;
            document.getElementById('modal-title').innerText = p.name;
            document.getElementById('input-qty').value = 1;
            document.getElementById('modal-qty').classList.add('modal-active');
            setTimeout(() => document.getElementById('input-qty').focus(), 100);
        }

        function closeModal() { document.getElementById('modal-qty').classList.remove('modal-active'); tempProductId = null; }

        function confirmAdd() {
            const qty = parseFloat(document.getElementById('input-qty').value);
            if(qty > 0) { addToCart(tempProductId, qty); closeModal(); }
        }

        function addToCart(id, qty) {
            const p = inventory.find(prod => prod.id === id);
            if(!p || p.stock < qty) return alert("Stock insuficiente");
            const existing = cart.find(item => item.id === id);
            if(existing) existing.qty += qty;
            else cart.push({ ...p, qty: qty });
            renderCart();
        }

        function renderCart() {
            const container = document.getElementById('cart-items');
            let total = 0;
            container.innerHTML = cart.map((item, idx) => {
                total += (item.price * item.qty);
                return `
                    <div class="flex justify-between items-center p-4 bg-white border border-slate-100 rounded-3xl shadow-sm hover:border-indigo-200 transition-all">
                        <div class="flex-1"><p class="font-black text-slate-800">${item.name}</p>
                        <p class="text-[10px] font-black text-indigo-500 uppercase">${item.qty} ${item.unit} × $${item.price.toFixed(2)}</p></div>
                        <div class="flex items-center gap-4"><span class="font-black text-slate-900">$${(item.price * item.qty).toFixed(2)}</span>
                        <button onclick="cart.splice(${idx},1); renderCart();" class="text-slate-300 hover:text-red-500 transition-colors"><i data-lucide="x-circle" class="w-5 h-5"></i></button></div>
                    </div>
                `;
            }).join('');
            document.getElementById('cart-total').innerText = `$${total.toFixed(2)}`;
            lucide.createIcons();
        }

        function completeSale() {
            if(cart.length === 0) return;
            cart.forEach(item => { const p = inventory.find(inv => inv.id === item.id); if(p) p.stock -= item.qty; });
            saveData(); cart = []; renderCart(); alert("✅ Venta Registrada");
        }

        function renderCatalog(filter = "") {
            const catalog = document.getElementById('product-catalog');
            const filtered = inventory.filter(p => p.name.toLowerCase().includes(filter.toLowerCase()));
            catalog.innerHTML = filtered.map(p => `
                <button onclick="openModal(${p.id})" class="flex flex-col items-center p-4 bg-white rounded-3xl border border-slate-100 shadow-sm hover:shadow-indigo-100 hover:border-indigo-200 transition-all active:scale-95 group">
                    <span class="text-[9px] font-black text-slate-400 group-hover:text-indigo-400 transition-colors mb-1 uppercase tracking-tighter">${p.unit}</span>
                    <span class="text-[11px] font-black text-center leading-tight h-8 overflow-hidden text-slate-600">${p.name}</span>
                    <span class="text-indigo-600 font-black text-lg mt-1">$${p.price.toFixed(2)}</span>
                </button>
            `).join('');
        }

        // --- Inventario ---
        document.getElementById('product-form').onsubmit = (e) => {
            e.preventDefault();
            inventory.push({
                id: Date.now(),
                name: document.getElementById('p-name').value,
                code: document.getElementById('p-code').value,
                price: parseFloat(document.getElementById('p-price').value),
                unit: document.getElementById('p-unit').value,
                stock: parseFloat(document.getElementById('p-stock').value),
                min: parseFloat(document.getElementById('p-min').value),
                expiry: document.getElementById('p-expiry').value
            });
            saveData(); e.target.reset(); alert("¡Guardado!");
        };

        function startScannerReg() {
            const sc = new Html5Qrcode("reader-reg");
            sc.start({ facingMode: "environment" }, { fps: 10, qrbox: 200 }, (t) => {
                document.getElementById('p-code').value = t; playBeep(); sc.stop();
            });
        }

        function renderInventory() {
            const list = document.getElementById('inventory-list');
            list.innerHTML = inventory.map((p, idx) => `
                <div class="bg-white p-6 rounded-3xl flex justify-between items-center shadow-sm border border-slate-100">
                    <div class="text-xs space-y-1"><p class="font-black text-slate-800 text-sm">${p.name}</p>
                    <p class="text-slate-400 font-bold uppercase tracking-widest text-[9px]">Stock: <span class="${p.stock <= p.min ? 'text-red-500 font-black' : ''}">${p.stock} ${p.unit}</span> | Mín: ${p.min}</p></div>
                    <button onclick="inventory.splice(${idx},1); saveData(); renderInventory();" class="text-slate-200 hover:text-red-400 transition-colors"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function saveData() { localStorage.setItem('pos_v7_data', JSON.stringify(inventory)); renderCatalog(); }
        
        switchView('pos');
    </script>
</body>
</html>
