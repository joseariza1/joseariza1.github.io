<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Pro - Catálogo e Inventario</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        .hidden { display: none; }
        .grid-products { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; }
        .low-stock-border { border: 2px solid #ef4444 !important; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen pb-24 font-sans text-slate-800">

    <nav class="bg-indigo-700 text-white p-4 sticky top-0 z-50 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black flex items-center gap-2">
                <i data-lucide="layout-grid"></i> MI TIENDITA
            </h1>
            <div class="flex gap-2">
                <div id="alert-stock" class="hidden bg-red-600 px-2 py-1 rounded text-[10px] animate-bounce">STOCK BAJO</div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4 max-w-2xl">
        
        <section id="view-pos" class="space-y-4">
            <div class="relative">
                <i data-lucide="search" class="absolute left-3 top-3 text-slate-400 w-5 h-5"></i>
                <input type="text" id="pos-search" oninput="renderCatalog(this.value)" placeholder="Buscar producto..." class="w-full pl-10 pr-4 py-3 bg-white rounded-xl shadow-sm focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>

            <div class="bg-white p-4 rounded-2xl shadow-sm">
                <div class="flex justify-between items-center mb-3">
                    <h3 class="font-bold text-slate-600 text-sm uppercase">Productos en Tienda</h3>
                    <button onclick="startScanner('pos')" class="text-indigo-600 bg-indigo-50 p-2 rounded-lg">
                        <i data-lucide="scan-barcode"></i>
                    </button>
                </div>
                <div id="reader-pos" class="mb-4 overflow-hidden rounded-lg"></div>
                <div id="product-catalog" class="grid-products">
                    </div>
            </div>
            
            <div class="bg-white p-4 rounded-2xl shadow-sm border-t-4 border-indigo-500">
                <h3 class="font-bold text-xs uppercase text-slate-400 mb-3">Carrito de Venta</h3>
                <div id="cart-items" class="space-y-2 mb-4"></div>
                <div class="flex justify-between items-center py-3 border-t">
                    <span class="font-bold text-slate-500">Total:</span>
                    <span id="cart-total" class="text-2xl font-black text-indigo-700">$0.00</span>
                </div>
                <button onclick="completeSale()" class="w-full bg-green-500 text-white py-4 rounded-xl font-bold text-lg shadow-lg active:scale-95 transition-all">
                    COBRAR AHORA
                </button>
            </div>
        </section>

        <section id="view-inventory" class="hidden space-y-4">
            <div class="bg-white p-6 rounded-2xl shadow-sm">
                <h2 class="text-lg font-bold mb-4">Registrar Mercancía</h2>
                <form id="product-form" class="space-y-3">
                    <input type="text" id="p-name" placeholder="Nombre del Producto" class="w-full p-3 bg-slate-50 border rounded-xl" required>
                    
                    <div class="flex gap-2">
                        <input type="text" id="p-code" placeholder="Código de Barras" class="flex-1 p-3 bg-slate-50 border rounded-xl text-sm">
                        <button type="button" onclick="startScanner('reg')" class="bg-slate-800 text-white px-4 rounded-xl">
                            <i data-lucide="camera"></i>
                        </button>
                    </div>
                    <div id="reader-reg" class="overflow-hidden rounded-lg"></div>

                    <div class="grid grid-cols-2 gap-3">
                        <input type="number" id="p-price" placeholder="Precio $" step="0.01" class="p-3 bg-slate-50 border rounded-xl" required>
                        <select id="p-unit" class="p-3 bg-slate-50 border rounded-xl text-sm">
                            <option value="pza">Pieza</option>
                            <option value="kg">Kilo</option>
                            <option value="lt">Litro</option>
                        </select>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <input type="number" id="p-stock" placeholder="Cantidad" class="p-3 bg-slate-50 border rounded-xl" required>
                        <input type="number" id="p-min" placeholder="Mínimo" class="p-3 bg-slate-50 border rounded-xl" required>
                    </div>
                    <input type="date" id="p-expiry" class="w-full p-3 bg-slate-50 border rounded-xl" required>
                    <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold">Guardar Producto</button>
                </form>
            </div>

            <div id="inventory-list" class="space-y-2"></div>
        </section>
    </main>

    <footer class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-3 shadow-2xl">
        <button onclick="switchView('pos')" id="btn-pos" class="flex flex-col items-center text-indigo-600">
            <i data-lucide="shopping-cart"></i>
            <span class="text-[10px] font-bold">VENTAS</span>
        </button>
        <button onclick="switchView('inventory')" id="btn-inv" class="flex flex-col items-center text-slate-400">
            <i data-lucide="package"></i>
            <span class="text-[10px] font-bold">INVENTARIO</span>
        </button>
    </footer>

    <script>
        let inventory = JSON.parse(localStorage.getItem('pos_v3_data')) || [];
        let cart = [];
        let html5QrCode;

        lucide.createIcons();

        function saveData() {
            localStorage.setItem('pos_v3_data', JSON.stringify(inventory));
            renderCatalog();
            checkAlerts();
        }

        function switchView(view) {
            document.getElementById('view-pos').classList.toggle('hidden', view !== 'pos');
            document.getElementById('view-inventory').classList.toggle('hidden', view !== 'inventory');
            document.getElementById('btn-pos').className = view === 'pos' ? 'text-indigo-600 flex flex-col items-center' : 'text-slate-400 flex flex-col items-center';
            document.getElementById('btn-inv').className = view === 'inventory' ? 'text-indigo-600 flex flex-col items-center' : 'text-slate-400 flex flex-col items-center';
            if(view === 'pos') renderCatalog();
            if(view === 'inventory') renderInventory();
        }

        // RENDER CATALOGO (Pantalla Principal)
        function renderCatalog(filter = "") {
            const catalog = document.getElementById('product-catalog');
            const filtered = inventory.filter(p => p.name.toLowerCase().includes(filter.toLowerCase()));
            
            if(filtered.length === 0) {
                catalog.innerHTML = `<p class="col-span-full text-center text-xs text-slate-400 py-4">No hay productos. Agrégalos en Inventario.</p>`;
                return;
            }

            catalog.innerHTML = filtered.map(p => `
                <button onclick="addToCart(${p.id})" class="flex flex-col items-center p-3 bg-slate-50 border border-slate-200 rounded-xl hover:bg-indigo-50 active:scale-90 transition-all ${p.stock <= p.min ? 'low-stock-border' : ''}">
                    <span class="text-[10px] font-bold text-slate-400 uppercase">${p.unit}</span>
                    <span class="text-xs font-bold text-center leading-tight h-8 overflow-hidden">${p.name}</span>
                    <span class="text-indigo-600 font-black mt-1">$${p.price.toFixed(2)}</span>
                    <span class="text-[9px] mt-1 ${p.stock <= p.min ? 'text-red-500 font-bold' : 'text-slate-400'}">Stock: ${p.stock}</span>
                </button>
            `).join('');
        }

        // REGISTRO
        document.getElementById('product-form').onsubmit = (e) => {
            e.preventDefault();
            const newProd = {
                id: Date.now(),
                name: document.getElementById('p-name').value,
                code: document.getElementById('p-code').value,
                price: parseFloat(document.getElementById('p-price').value),
                unit: document.getElementById('p-unit').value,
                stock: parseFloat(document.getElementById('p-stock').value),
                min: parseFloat(document.getElementById('p-min').value),
                expiry: document.getElementById('p-expiry').value
            };
            inventory.push(newProd);
            saveData();
            e.target.reset();
            alert("Producto Guardado");
        };

        // CARRITO
        function addToCart(id) {
            const product = inventory.find(p => p.id === id);
            if(product.stock <= 0) return alert("Producto agotado");
            cart.push({...product});
            renderCart();
        }

        function renderCart() {
            const container = document.getElementById('cart-items');
            let total = 0;
            container.innerHTML = cart.map((item, idx) => {
                total += item.price;
                return `
                    <div class="flex justify-between items-center text-sm p-2 bg-slate-50 rounded-lg">
                        <span>${item.name}</span>
                        <div class="flex items-center gap-2">
                            <span class="font-bold">$${item.price.toFixed(2)}</span>
                            <button onclick="removeFromCart(${idx})" class="text-red-500 px-2 font-black">×</button>
                        </div>
                    </div>
                `;
            }).join('');
            document.getElementById('cart-total').innerText = `$${total.toFixed(2)}`;
        }

        function removeFromCart(idx) {
            cart.splice(idx, 1);
            renderCart();
        }

        function completeSale() {
            if(cart.length === 0) return;
            cart.forEach(item => {
                const p = inventory.find(invP => invP.id === item.id);
                if(p) p.stock -= 1;
            });
            saveData();
            cart = [];
            renderCart();
            alert("Venta registrada y stock actualizado");
        }

        // ESCÁNER DUAL
        function startScanner(target) {
            const elementId = target === 'pos' ? "reader-pos" : "reader-reg";
            html5QrCode = new Html5Qrcode(elementId);
            html5QrCode.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: { width: 250, height: 150 } },
                (text) => {
                    if(target === 'reg') {
                        document.getElementById('p-code').value = text;
                    } else {
                        const p = inventory.find(prod => prod.code === text);
                        if(p) addToCart(p.id);
                        else alert("No encontrado: " + text);
                    }
                    html5QrCode.stop();
                }
            ).catch(err => alert("Error: " + err));
        }

        function renderInventory() {
            const list = document.getElementById('inventory-list');
            list.innerHTML = inventory.map((p, idx) => `
                <div class="bg-white p-3 rounded-xl shadow-sm flex justify-between border-l-4 ${p.stock <= p.min ? 'border-red-500' : 'border-indigo-500'}">
                    <div class="text-xs">
                        <p class="font-bold text-sm">${p.name}</p>
                        <p>Código: ${p.code || 'N/A'}</p>
                        <p class="${p.stock <= p.min ? 'text-red-600 font-bold' : ''}">Stock: ${p.stock} / Mín: ${p.min}</p>
                    </div>
                    <button onclick="deleteProduct(${idx})" class="text-slate-300">Eliminar</button>
                </div>
            `).join('');
        }

        function deleteProduct(idx) {
            if(confirm("¿Borrar?")) { inventory.splice(idx, 1); saveData(); renderInventory(); }
        }

        function checkAlerts() {
            const low = inventory.some(p => p.stock <= p.min);
            document.getElementById('alert-stock').classList.toggle('hidden', !low);
        }

        // Inicio
        renderCatalog();
        checkAlerts();
    </script>
</body>
</html>
