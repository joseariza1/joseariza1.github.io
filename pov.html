<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POS Flow Pro - Ultra Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        .hidden { display: none; }
        #reader-pos, #reader-reg { background: #000 !important; border: none !important; }
        #reader-pos video { object-fit: cover !important; border-radius: 2rem; }
        
        /* Guía visual de escaneo */
        .scanner-overlay {
            position: absolute;
            inset: 0;
            border: 2px solid rgba(255,255,255,0.1);
            background: linear-gradient(rgba(79, 70, 229, 0.1) 2px, transparent 2px) 0 0 / 100% 40px;
            pointer-events: none;
            z-index: 10;
        }
        .scanner-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: #ff004c;
            top: 50%;
            box-shadow: 0 0 15px #ff004c;
            animation: scan 2s infinite ease-in-out;
        }
        @keyframes scan {
            0%, 100% { top: 20%; }
            50% { top: 80%; }
        }

        .catalog-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); 
            gap: 8px; 
        }

        @media (min-width: 1024px) {
            .main-layout { display: grid; grid-template-columns: 1fr 400px; gap: 20px; height: 85vh; }
            .scroll-area { overflow-y: auto; padding-right: 10px; }
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen font-sans text-slate-900 overflow-x-hidden">

    <nav class="bg-slate-900 text-white p-4 sticky top-0 z-[100] shadow-2xl">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-indigo-600 p-2 rounded-xl shadow-lg shadow-indigo-500/30">
                    <i data-lucide="zap" class="w-5 h-5 fill-current"></i>
                </div>
                <span class="font-black tracking-tighter text-lg">POS FLOW <span class="text-indigo-400">V13</span></span>
            </div>
            <div id="cam-status" class="flex items-center gap-2 bg-slate-800 px-3 py-1.5 rounded-full border border-slate-700">
                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                <span class="text-[10px] font-bold uppercase tracking-widest text-slate-300">Cámara Lista</span>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4 lg:p-6">
        <section id="view-pos" class="main-layout animate-in fade-in duration-500">
            <div class="scroll-area space-y-6">
                <div class="relative group">
                    <div id="scanner-box" class="relative bg-black rounded-[2.5rem] overflow-hidden h-60 md:h-80 shadow-2xl border-4 border-white transition-all">
                        <div id="reader-pos" class="w-full h-full"></div>
                        <div class="scanner-overlay">
                            <div class="scanner-line"></div>
                            <div class="absolute inset-0 border-[40px] border-black/40"></div>
                        </div>
                        <div class="absolute bottom-4 left-4 right-4 flex justify-between items-center z-20">
                            <button onclick="restartCamera()" class="bg-white/10 backdrop-blur-xl p-4 rounded-2xl text-white hover:bg-white/20 active:scale-90 transition-all">
                                <i data-lucide="refresh-ccw" class="w-5 h-5"></i>
                            </button>
                            <span class="bg-black/60 backdrop-blur-md px-4 py-2 rounded-xl text-[10px] font-bold text-white uppercase tracking-widest border border-white/10">Alinea el código al centro</span>
                        </div>
                    </div>
                </div>

                <div class="space-y-4">
                    <div class="relative">
                        <i data-lucide="search" class="absolute left-4 top-4 text-slate-400 w-5 h-5"></i>
                        <input type="text" id="pos-search" oninput="renderCatalog(this.value)" placeholder="Buscar por nombre..." class="w-full pl-12 p-4 bg-white rounded-2xl shadow-sm border-none ring-1 ring-slate-200 focus:ring-4 focus:ring-indigo-500/20 outline-none transition-all">
                    </div>
                    <div id="product-catalog" class="catalog-grid"></div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-[2.5rem] shadow-2xl border border-slate-200/50 flex flex-col h-full mt-6 lg:mt-0">
                <div class="flex items-center justify-between mb-6">
                    <h3 class="font-black text-slate-400 text-[10px] uppercase tracking-widest">Carrito de Venta</h3>
                    <button onclick="clearCart()" class="text-slate-300 hover:text-red-500 transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>
                
                <div id="cart-items" class="flex-1 overflow-y-auto space-y-3 mb-6 pr-2 min-h-[200px]">
                    </div>

                <div class="bg-slate-900 p-6 rounded-[2rem] shadow-xl text-white">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-slate-400 font-bold text-xs uppercase">Total a Pagar</span>
                        <span id="cart-total" class="text-4xl font-black text-indigo-400">$0.00</span>
                    </div>
                    <button onclick="completeSale()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-5 rounded-2xl font-black text-xl shadow-lg shadow-indigo-900/40 active:scale-95 transition-all flex items-center justify-center gap-3">
                        <i data-lucide="check-circle" class="w-6 h-6"></i> FINALIZAR VENTA
                    </button>
                </div>
            </div>
        </section>

        <section id="view-inventory" class="hidden max-w-2xl mx-auto space-y-6 pb-24 animate-in slide-in-from-bottom duration-500">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-200">
                <h2 class="text-2xl font-black mb-6 flex items-center gap-2"><i data-lucide="package-plus" class="text-indigo-600"></i> Nuevo Producto</h2>
                <form id="product-form" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="p-name" placeholder="Nombre" class="md:col-span-2 p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500" required>
                    <div class="md:col-span-2 flex gap-2">
                        <input type="text" id="p-code" placeholder="Código de Barras" class="flex-1 p-4 bg-slate-50 rounded-2xl outline-none">
                        <button type="button" onclick="startScannerReg()" class="bg-slate-800 text-white px-6 rounded-2xl active:scale-90 transition-transform"><i data-lucide="scan-barcode"></i></button>
                    </div>
                    <div id="reader-reg" class="hidden md:col-span-2 rounded-3xl overflow-hidden h-48 bg-black mb-4"></div>
                    
                    <input type="number" id="p-price" placeholder="Precio $" step="0.1" class="p-4 bg-slate-50 rounded-2xl outline-none" required>
                    <select id="p-unit" class="p-4 bg-slate-50 rounded-2xl outline-none font-bold"><option value="pza">Pieza</option><option value="kg">Kilo</option></select>
                    <input type="number" id="p-stock" placeholder="Stock" class="p-4 bg-slate-50 rounded-2xl outline-none" required>
                    <input type="number" id="p-min" placeholder="Aviso Mínimo" class="p-4 bg-slate-50 rounded-2xl outline-none" required>
                    
                    <button type="submit" class="md:col-span-2 bg-slate-900 text-white py-5 rounded-2xl font-black text-lg shadow-lg">REGISTRAR EN ALMACÉN</button>
                </form>
            </div>
            <div id="inventory-list" class="space-y-3"></div>
        </section>
    </main>

    <footer class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-xl border-t border-slate-200 p-4 flex justify-around lg:hidden z-[100]">
        <button onclick="switchView('pos')" class="flex flex-col items-center gap-1 text-indigo-600">
            <i data-lucide="layout-grid" class="w-6 h-6"></i><span class="text-[10px] font-black uppercase tracking-widest">Ventas</span>
        </button>
        <button onclick="switchView('inventory')" class="flex flex-col items-center gap-1 text-slate-400">
            <i data-lucide="layers" class="w-6 h-6"></i><span class="text-[10px] font-black uppercase tracking-widest">Almacén</span>
        </button>
    </footer>

    <script>
        let inventory = JSON.parse(localStorage.getItem('pos_pro_v13')) || [];
        let cart = [];
        let scannerLocked = false;
        let html5QrCode = null;

        // --- Sistema de Audio ---
        const playBeep = () => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const g = ctx.createGain();
                osc.connect(g); g.connect(ctx.destination);
                osc.frequency.value = 1000; g.gain.value = 0.1;
                osc.start(); osc.stop(ctx.currentTime + 0.1);
            } catch(e) {}
        };

        lucide.createIcons();

        // --- CONTROL DE CÁMARA ROBUSTO ---
        async function stopCamera() {
            if (html5QrCode && html5QrCode.isScanning) {
                await html5QrCode.stop();
                html5QrCode.clear();
            }
            html5QrCode = null;
        }

        async function startScannerFlow() {
            await stopCamera();
            html5QrCode = new Html5Qrcode("reader-pos");
            
            // Configuración optimizada para códigos de barras largos
            const config = { 
                fps: 25, 
                qrbox: (w, h) => { return { width: w * 0.8, height: h * 0.4 } }, // Área ancha para códigos de barras
                aspectRatio: 1.0
            };

            try {
                await html5QrCode.start({ facingMode: "environment" }, config, (text) => {
                    if (scannerLocked) return;
                    const p = inventory.find(prod => prod.code === text);
                    if (p) {
                        handleLock();
                        addToCart(p.id);
                        playBeep();
                    }
                });
                updateCamStatus(true);
            } catch (err) {
                console.error(err);
                updateCamStatus(false);
            }
        }

        async function restartCamera() {
            const btn = event.currentTarget;
            btn.classList.add('animate-spin');
            await startScannerFlow();
            setTimeout(() => btn.classList.remove('animate-spin'), 1000);
        }

        function handleLock() {
            scannerLocked = true;
            document.getElementById('scanner-box').style.borderColor = "#4f46e5";
            setTimeout(() => {
                scannerLocked = false;
                document.getElementById('scanner-box').style.borderColor = "white";
            }, 2000);
        }

        function updateCamStatus(ok) {
            const status = document.getElementById('cam-status');
            status.innerHTML = ok ? 
                `<div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div><span class="text-[10px] font-bold text-slate-300">Cámara Activa</span>` :
                `<div class="w-2 h-2 bg-red-500 rounded-full"></div><span class="text-[10px] font-bold text-slate-300">Cámara Error</span>`;
        }

        // --- LÓGICA DE VENTA ---
        function addToCart(id) {
            const product = inventory.find(p => p.id === id);
            if (!product) return;
            const existing = cart.find(i => i.id === id);
            
            if (existing) {
                if (existing.qty + 1 > product.stock) return alert("Stock agotado");
                existing.qty++;
            } else {
                if (product.stock < 1) return alert("Sin existencias");
                cart.push({ ...product, qty: 1 });
            }
            renderCart();
        }

        function updateQty(id, delta) {
            const item = cart.find(i => i.id === id);
            const p = inventory.find(prod => prod.id === id);
            if (item) {
                if (item.qty + delta > p.stock) return alert("Máximo stock");
                item.qty += delta;
                if (item.qty <= 0) cart = cart.filter(i => i.id !== id);
                renderCart();
            }
        }

        function renderCart() {
            const container = document.getElementById('cart-items');
            let total = 0;
            container.innerHTML = cart.map(item => {
                const sub = item.price * item.qty;
                total += sub;
                return `
                    <div class="bg-slate-50 border border-slate-200 p-4 rounded-3xl flex items-center justify-between animate-in slide-in-from-right duration-300">
                        <div class="flex-1">
                            <p class="font-black text-xs text-slate-800 uppercase leading-tight">${item.name}</p>
                            <p class="text-[10px] font-bold text-indigo-600 mt-1">$${item.price.toFixed(2)} c/u</p>
                        </div>
                        <div class="flex items-center gap-3">
                            <div class="flex items-center bg-white rounded-2xl p-1 shadow-sm border border-slate-100">
                                <button onclick="updateQty(${item.id}, -1)" class="w-8 h-8 flex items-center justify-center text-slate-400 hover:text-red-500">-</button>
                                <span class="px-3 font-black text-sm">${item.qty}</span>
                                <button onclick="updateQty(${item.id}, 1)" class="w-8 h-8 flex items-center justify-center text-indigo-600 font-bold">+</button>
                            </div>
                            <span class="w-20 text-right font-black text-slate-900">$${sub.toFixed(2)}</span>
                        </div>
                    </div>
                `;
            }).join('');
            document.getElementById('cart-total').innerText = `$${total.toFixed(2)}`;
            lucide.createIcons();
        }

        function completeSale() {
            if (cart.length === 0) return;
            cart.forEach(item => {
                const p = inventory.find(inv => inv.id === item.id);
                if (p) p.stock -= item.qty;
            });
            localStorage.setItem('pos_pro_v13', JSON.stringify(inventory));
            cart = []; renderCart();
            alert("Venta procesada con éxito.");
        }

        function clearCart() { if(confirm("¿Vaciar carrito?")) { cart = []; renderCart(); } }

        // --- GESTIÓN DE VISTAS ---
        async function switchView(view) {
            document.getElementById('view-pos').classList.toggle('hidden', view !== 'pos');
            document.getElementById('view-inventory').classList.toggle('hidden', view !== 'inventory');
            await stopCamera();
            if (view === 'pos') { startScannerFlow(); renderCatalog(); } else { renderInventory(); }
            lucide.createIcons();
        }

        // --- INVENTARIO ---
        async function startScannerReg() {
            await stopCamera();
            document.getElementById('reader-reg').classList.remove('hidden');
            html5QrCode = new Html5Qrcode("reader-reg");
            try {
                await html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (text) => {
                    document.getElementById('p-code').value = text;
                    playBeep();
                    stopCamera();
                    document.getElementById('reader-reg').classList.add('hidden');
                });
            } catch (err) { alert("Permiso denegado."); }
        }

        document.getElementById('product-form').onsubmit = (e) => {
            e.preventDefault();
            inventory.push({
                id: Date.now(),
                name: document.getElementById('p-name').value,
                code: document.getElementById('p-code').value,
                price: parseFloat(document.getElementById('p-price').value),
                unit: document.getElementById('p-unit').value,
                stock: parseFloat(document.getElementById('p-stock').value),
                min: parseFloat(document.getElementById('p-min').value)
            });
            localStorage.setItem('pos_pro_v13', JSON.stringify(inventory));
            e.target.reset(); renderInventory(); alert("Producto Guardado");
        };

        function renderCatalog(f = "") {
            document.getElementById('product-catalog').innerHTML = inventory
                .filter(p => p.name.toLowerCase().includes(f.toLowerCase()))
                .map(p => `
                    <button onclick="addToCart(${p.id})" class="bg-white p-3 rounded-2xl border border-slate-200 shadow-sm active:scale-95 transition-all text-center group">
                        <p class="text-[9px] font-black text-slate-400 truncate uppercase group-hover:text-indigo-600">${p.name}</p>
                        <p class="text-xs font-black text-slate-900 mt-1">$${p.price.toFixed(2)}</p>
                    </button>
                `).join('');
        }

        function renderInventory() {
            document.getElementById('inventory-list').innerHTML = inventory.map((p, i) => `
                <div class="bg-white p-5 rounded-[2rem] flex justify-between items-center shadow-sm border border-slate-100">
                    <div class="flex items-center gap-4">
                        <div class="bg-indigo-50 p-3 rounded-2xl text-indigo-600"><i data-lucide="box"></i></div>
                        <div>
                            <p class="font-black text-slate-800 text-sm uppercase">${p.name}</p>
                            <p class="text-[10px] font-bold text-slate-400 uppercase">Stock: ${p.stock} | Mín: ${p.min}</p>
                        </div>
                    </div>
                    <button onclick="deleteProduct(${i})" class="bg-red-50 p-3 rounded-xl text-red-400 hover:bg-red-500 hover:text-white transition-all"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function deleteProduct(i) { if(confirm("¿Eliminar producto?")) { inventory.splice(i, 1); localStorage.setItem('pos_pro_v13', JSON.stringify(inventory)); renderInventory(); } }

        // Inicio
        switchView('pos');
    </script>
</body>
</html>
