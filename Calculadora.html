<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OmniCalc Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/564/564429.png">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    
    <style>
        :root {
            --bg: #000000;
            --card: #1c1c1e;
            --accent: #ff9f0a;
            --text: #ffffff;
            --btn: #2c2c2e;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body {
            margin: 0;
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .content { flex: 1; overflow-y: auto; padding: 20px 20px 100px; }
        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Estética Premium */
        .card { background: var(--card); border-radius: 18px; padding: 20px; margin-bottom: 15px; }
        input, select { 
            width: 100%; background: var(--btn); border: none; padding: 15px; 
            border-radius: 12px; color: white; font-size: 1rem; margin-top: 10px;
        }

        /* Calculadora */
        .calc-screen { text-align: right; padding: 60px 10px 20px; }
        #calc-res { font-size: 4.5rem; font-weight: 200; overflow-x: auto; white-space: nowrap; }
        #calc-exp { color: #888; font-size: 1.3rem; min-height: 1.6rem; }

        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .calc-grid button {
            aspect-ratio: 1/1; border-radius: 50%; border: none;
            font-size: 1.8rem; background: var(--btn); color: white;
            transition: background 0.2s;
        }
        .calc-grid button:active { background: #505050; }
        .calc-grid .op { background: var(--accent); color: white; }
        .calc-grid .top { background: #a5a5a5; color: black; }
        .calc-grid .zero { grid-column: span 2; aspect-ratio: initial; border-radius: 50px; text-align: left; padding-left: 35px; }

        /* Navegación */
        nav {
            position: fixed; bottom: 0; width: 100%;
            background: rgba(28,28,30,0.9); backdrop-filter: blur(15px);
            display: flex; justify-content: space-around;
            padding: 10px 0 calc(15px + env(safe-area-inset-bottom));
            border-top: 0.5px solid #333;
        }
        .nav-item { color: #888; text-align: center; font-size: 0.75rem; flex: 1; cursor: pointer; }
        .nav-item.active { color: var(--accent); }
        .nav-item b { font-size: 1.6rem; display: block; margin-bottom: 2px; }

        /* Banner de Ayuda para Instalar */
        #install-guide {
            position: fixed; top: 20px; left: 20px; right: 20px;
            background: var(--accent); color: black; padding: 15px;
            border-radius: 12px; z-index: 100; font-weight: bold;
            display: flex; justify-content: space-between; align-items: center;
        }
    </style>
</head>
<body>

    <div id="install-guide">
        <span>📲 ¡Instálame! Dale a "Añadir a inicio"</span>
        <button onclick="this.parentElement.style.display='none'" style="background:none; border:none; font-size:1.2rem; font-weight:bold;">✕</button>
    </div>

    <div class="content">
        <div id="v-calc" class="view active">
            <div class="calc-screen">
                <div id="calc-exp"></div>
                <div id="calc-res">0</div>
            </div>
            <div class="calc-grid">
                <button class="top" onclick="cAC()">AC</button>
                <button class="top" onclick="cAdd('sqrt(')">√</button>
                <button class="top" onclick="cAdd('%')">%</button>
                <button class="op" onclick="cAdd('/')">÷</button>
                
                <button onclick="cAdd('7')">7</button>
                <button onclick="cAdd('8')">8</button>
                <button onclick="cAdd('9')">9</button>
                <button class="op" onclick="cAdd('*')">×</button>
                
                <button onclick="cAdd('4')">4</button>
                <button onclick="cAdd('5')">5</button>
                <button onclick="cAdd('6')">6</button>
                <button class="op" onclick="cAdd('-')">−</button>
                
                <button onclick="cAdd('1')">1</button>
                <button onclick="cAdd('2')">2</button>
                <button onclick="cAdd('3')">3</button>
                <button class="op" onclick="cAdd('+')">+</button>
                
                <button class="zero" onclick="cAdd('0')">0</button>
                <button onclick="cAdd('.')">.</button>
                <button class="op" onclick="cSolve()">=</button>
            </div>
        </div>

        <div id="v-conv" class="view">
            <h2>Conversor</h2>
            <div class="card">
                <input type="number" id="u-in" value="1" oninput="uRun()">
                <div style="display:flex; gap:10px; margin-top:15px">
                    <select id="u-f" onchange="uRun()"><option value="m">Metros</option><option value="kg">Kilos</option></select>
                    <select id="u-t" onchange="uRun()"><option value="cm">cm</option><option value="lb">Libras</option></select>
                </div>
                <div id="u-res" style="font-size:1.5rem; color:var(--accent); margin-top:15px;">100 cm</div>
            </div>
        </div>
    </div>

    <nav>
        <div class="nav-item active" onclick="showV('v-calc', this)"><b>🔢</b>Calc</div>
        <div class="nav-item" onclick="showV('v-conv', this)"><b>📏</b>Unid</div>
        <div class="nav-item" onclick="window.location.reload()"><b>🔄</b>Reset</div>
    </nav>

    <script>
        function showV(id, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        let exp = "";
        const resD = document.getElementById('calc-res');
        const expD = document.getElementById('calc-exp');

        function cAdd(v) { exp += v; resD.innerText = exp; }
        function cAC() { exp = ""; resD.innerText = "0"; expD.innerText = ""; }
        function cSolve() {
            try {
                const r = math.evaluate(exp);
                expD.innerText = exp + " =";
                exp = math.format(r, {precision: 10}).toString();
                resD.innerText = exp;
            } catch { resD.innerText = "Error"; exp = ""; }
        }

        function uRun() {
            const v = document.getElementById('u-in').value;
            const f = document.getElementById('u-f').value;
            const t = document.getElementById('u-t').value;
            try {
                const r = math.evaluate(`${v} ${f} to ${t}`);
                document.getElementById('u-res').innerText = math.format(r, 4);
            } catch { document.getElementById('u-res').innerText = "---"; }
        }
    </script>
</body>
</html>
